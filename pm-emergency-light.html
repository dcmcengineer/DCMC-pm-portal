        }

                  <div>
                    <span className="text-xs text-slate-400 font-semibold">สถานที่ปฏิบัติการ</span>
                    <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3 h-3 shrink-0">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                      </svg>
                      ศูนย์กระจายสินค้า DC
                    </p>
                  </div>
                </section>

                {/* ข้อมูลวันที่ 1 */}
                <section className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-3 text-xs">
                  <div className="font-bold text-green-700 flex items-center space-x-1 text-xs">
                    <span>📅 ช่องบันทึกการทำงาน (วันที่ 1)</span>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="font-bold text-slate-400">วันที่ทำ PM 1</label>
                      <input type="date" name="pmDate1" value={formData.pmDate1} onChange={handleInputChange} className="w-full mt-1 p-2 border rounded-xl bg-slate-50/50" />
                    </div>
                    <div>
                      <label className="font-bold text-slate-400">ผู้มอบหมายงาน</label>
                      <input list="assigners" name="assigner" value={formData.assigner} onChange={handleInputChange} className="w-full mt-1 p-2 border rounded-xl bg-slate-50/50 font-bold" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="font-bold text-slate-400">เวลาเริ่ม 1</label>
                      <input type="time" name="startTime1" value={formData.startTime1} onChange={handleInputChange} className="w-full mt-1 p-2 border rounded-xl bg-slate-50/50" />
                    </div>
                    <div>
                      <label className="font-bold text-slate-400">เวลาสิ้นสุด 1</label>
                      <input type="time" name="endTime1" value={formData.endTime1} onChange={handleInputChange} className="w-full mt-1 p-2 border rounded-xl bg-slate-50/50" />
                    </div>
                  </div>
                  <div>
                    <label className="font-bold text-slate-400">รายชื่อช่างปฏิบัติงาน วันที่ 1 (ระบุสูงสุด 4 คน)</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1,2,3,4].map(n => (
                        <input key={n} list="operators" name={`operator1_${n}`} value={formData[`operator1_${n}`]} onChange={handleInputChange} placeholder={`ช่างคนที่ ${n}`} className="p-2 border rounded-xl text-xs bg-slate-50/50 font-semibold" />
                      ))}
                    </div>
                  </div>
                </section>

                {/* ข้อมูลวันที่ 2 */}
                <section className="bg-indigo-50/20 p-5 rounded-3xl border border-indigo-100 space-y-3 text-xs">
                  <div className="font-bold text-indigo-700">📅 ช่องบันทึกเพิ่มเติม (วันที่ 2)</div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="font-bold text-indigo-400">วันที่ทำ PM 2</label>
                      <input type="date" name="pmDate2" value={formData.pmDate2} onChange={handleInputChange} className="w-full mt-1 p-2 border bg-white rounded-xl" />
                    </div>
                    <div>
                      <label className="font-bold text-indigo-400">เวลาเริ่ม 2</label>
                      <input type="time" name="startTime2" value={formData.startTime2} onChange={handleInputChange} className="w-full mt-1 p-2 border bg-white rounded-xl" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="font-bold text-indigo-400">เวลาสิ้นสุด 2</label>
                      <input type="time" name="endTime2" value={formData.endTime2} onChange={handleInputChange} className="w-full mt-1 p-2 border bg-white rounded-xl" />
                    </div>
                  </div>
                  <div>
                    <label className="font-bold text-indigo-400">รายชื่อช่างปฏิบัติงาน วันที่ 2</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1,2,3,4].map(n => (
                        <input key={n} list="operators" name={`operator2_${n}`} value={formData[`operator2_${n}`]} onChange={handleInputChange} placeholder={`ช่างวันที่สองคนที่ ${n}`} className="p-2 border bg-white rounded-xl text-xs font-semibold" />
                      ))}
                    </div>
                  </div>
                </section>

                {/* ตัวกรองปุ่มด้านบนตาราง (ปรับเหลือ 3 เมนูหลัก) */}
                <div className="space-y-2">
                  <div className="flex justify-between items-center text-xs font-bold">
                    <span className="text-slate-400 uppercase">ตารางไฟฉุกเฉิน ({filteredLamps.length} ตัว)</span>
                    <button type="button" onClick={openManagementModal} className="text-teal-600 hover:underline">🔧 แก้ไขชื่อสถานที่</button>
                  </div>
                  <input type="text" placeholder="🔍 ค้นหารหัส หรือสถานที่..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full p-2.5 bg-white border rounded-xl text-xs outline-none shadow-xs" />
                  <div className="flex bg-slate-200 p-0.5 rounded-xl text-[10px] font-bold text-center">
                    {["ทั้งหมด", "ปกติ", "ไม่ปกติ"].map(st => (
                      <button key={st} type="button" onClick={() => setFilterStatus(st)} className={`flex-1 py-1.5 rounded-lg ${filterStatus === st ? "bg-white text-slate-800 shadow-xs" : "text-slate-500"}`}>{st}</button>
                    ))}
                  </div>
                </div>

                {/* รายการตรวจสอบ 90 ตัว */}
                <section className="space-y-2 max-h-[380px] overflow-y-auto no-scrollbar pr-0.5 pb-2">
                  {filteredLamps.map((lamp) => (
                    <div key={lamp.id} className="bg-white p-3 rounded-xl border border-slate-100 space-y-2 shadow-xs">
                      <div className="flex justify-between text-xs font-bold">
                        <span className="text-green-700 bg-green-50 px-2 py-0.5 rounded">{lamp.id}</span>
                        <span className="text-slate-500 truncate max-w-[240px]">📍 {lamp.location}</span>
                      </div>
                      <div className="grid grid-cols-3 gap-1">
                        <button type="button" onClick={() => changeLampStatus(lamp.id, "ปกติ")} className={`py-1.5 border text-[10px] font-bold rounded-lg ${lamp.status === "ปกติ" ? 'bg-green-600 text-white border-green-600' : 'bg-slate-50 text-slate-600'}`}>🟢 ปกติ</button>
                        <button type="button" onClick={() => changeLampStatus(lamp.id, "ไม่ปกติ")} className={`py-1.5 border text-[10px] font-bold rounded-lg ${(lamp.status === "ไม่ปกติ" && lamp.testResult !== "ไม่ผ่าน") ? 'bg-red-500 text-white border-red-500' : (lamp.status === "ไม่ปกติ" && lamp.testResult === "ไม่ผ่าน") ? 'bg-amber-600 text-white border-amber-600' : 'bg-slate-50 text-slate-600'}`}>
                          {lamp.testResult === "ไม่ผ่าน" ? "🔴 เทสไม่ผ่าน" : "🔴 ไม่ปกติ"}
                        </button>
                        <button type="button" onClick={() => changeLampStatus(lamp.id, "ใช้รีโมทเทส 30 นาที")} className={`py-1.5 border text-[10px] font-bold rounded-lg ${(lamp.status === "ใช้รีโมทเทส 30 นาที" || lamp.testResult === "ไม่ผ่าน") ? 'bg-blue-600 text-white border-blue-600' : 'bg-slate-50 text-slate-600'}`}>⚡ รีโมท 30น.</button>
                      </div>

                      {/* แผงควบคุมกรณีเลือก รีโมทเทส 30 นาที */}
                      {(lamp.status === "ใช้รีโมทเทส 30 นาที" || lamp.testResult === "ไม่ผ่าน") && (
                        <div className="flex items-center justify-between bg-blue-50 border border-blue-200 p-2 rounded-xl mt-1">
                          <span className="text-[10px] font-bold text-blue-800">📊 ผลการเทสรีโมท:</span>
                          <div className="flex space-x-1 w-2/3">
                            <button type="button" onClick={() => changeTestResult(lamp.id, "ผ่าน")} className={`flex-1 py-1 text-[10px] font-extrabold rounded-md border ${lamp.testResult === "ผ่าน" ? "bg-emerald-600 text-white" : "bg-white text-slate-500"}`}>✅ ผ่าน</button>
                            <button type="button" onClick={() => changeTestResult(lamp.id, "ไม่ผ่าน")} className={`flex-1 py-1 text-[10px] font-extrabold rounded-md border ${lamp.testResult === "ไม่ผ่าน" ? "bg-rose-600 text-white" : "bg-white text-slate-500"}`}>❌ ไม่ผ่าน</button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </section>

                {/* ผลสรุปภาพรวม */}
                <section className="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 space-y-3 text-xs">
                  <div className="font-bold text-slate-400 uppercase">📌 สรุปผลการ PM ภาพรวม</div>
                  <div className="grid grid-cols-2 gap-2">
                    <button type="button" onClick={() => setFormData(p => ({ ...p, overallStatus: "ปกติ" }))} className={`p-2.5 rounded-xl border font-bold text-center ${formData.overallStatus === "ปกติ" ? "bg-green-600 text-white" : "bg-white"}`}>🟢 ปกติ</button>
                    <button type="button" onClick={() => setFormData(p => ({ ...p, overallStatus: "ไม่ปกติ" }))} className={`p-2.5 rounded-xl border font-bold text-center ${formData.overallStatus === "ไม่ปกติ" ? "bg-red-500 text-white" : "bg-white"}`}>🔴 ไม่ปกติ</button>
                  </div>
                  <textarea name="summaryText" value={formData.summaryText} onChange={handleInputChange} rows="2" placeholder="พิมพ์รายงานเพิ่มเติม..." className="w-full p-2.5 border rounded-xl outline-none text-xs" />
                </section>

                <div className="bg-white p-3 rounded-3xl shadow-sm border border-slate-100">
                  <button type="submit" disabled={isSubmitting} className="w-full py-3.5 bg-green-600 hover:bg-green-700 text-white text-xs font-bold rounded-xl shadow-md transition-all active:scale-95">
                    {isSubmitting ? "🚀 กำลังส่งประวัติเข้าคลาวด์แผ่นงาน..." : "💾 ยืนยันส่งรายงานเข้า Google Sheets"}
                  </button>
                </div>
              </form>
            </main>
          </div>

          {/* ฟุตเตอร์ */}
          <footer className="text-center text-[10px] text-slate-400 font-medium my-4">
            <p>© 2026 CP ALL DC MAHACHAI ENGINEERING DEPARTMENT</p>
          </footer>

          {/* หน้าต่างจัดการย้ายสถานที่ */}
          {isManageModalOpen && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-50 flex items-end justify-center">
              <div className="bg-white w-full max-w-md rounded-t-3xl p-4 flex flex-col max-h-[80vh]">
                <div className="flex justify-between items-center pb-2 border-b">
                  <h3 className="text-xs font-bold text-slate-700">🔧 จัดการพิกัดตำแหน่งหลอดไฟ</h3>
                  <button type="button" onClick={() => setIsManageModalOpen(false)} className="text-xs font-bold text-slate-400">ปิด</button>
                </div>
                <div className="flex-1 overflow-y-auto py-2 space-y-2 no-scrollbar">
                  {editableLamps.map((lamp, i) => (
                    <div key={lamp.id} className="flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl">
                      <span className="text-[11px] font-bold text-slate-500 w-14 text-center">{lamp.id}</span>
                      <input type="text" value={lamp.location} onChange={(e) => {
                        const targetVal = e.target.value;
                        setEditableLamps(prev => prev.map(item => item.id === lamp.id ? { ...item, location: targetVal } : item))
                      }} className="flex-1 p-1.5 border rounded-lg text-xs font-semibold" />
                    </div>
                  ))}
                </div>
                <button type="button" onClick={saveManagementChanges} className="w-full mt-2 py-2.5 bg-green-600 text-white text-xs font-bold rounded-xl">💾 บันทึกโครงสร้างตำแหน่งใหม่</button>
              </div>
            </div>
          )}

          <datalist id="assigners">{assignerList.map((n, i) => <option key={i} value={n} />)}</datalist>
          <datalist id="operators">{operatorList.map((n, i) => <option key={i} value={n} />)}</datalist>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
