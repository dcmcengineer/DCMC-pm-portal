<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์ - ระบบผลิตไฟฟ้าโซล่าร์เซลล์</title>
  
  <!-- Tailwind CSS for Premium Web App Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDN for Interactive Mobile View -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Anuphan', sans-serif;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ลิงก์ Google Apps Script Web App จริงของคุณเกรียงศักดิ์สำหรับระบบโซล่าร์เซลล์
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxSjT0KlsGQCmORWO_-_PKSZfbeJPfdC0Iyk9Z7h71enW-7dmlNHEr2iopeheBOq4R8yA/exec";

    function App() {
      const assignerList = ["เกรียงศักดิ์", "ณรงค์", "รัฐชานนท์"];
      const operatorList = ["ณรงค์", "รัฐชานนท์", "บัญชา", "วสุพล", "ศรายุทธ", "พิพัฒน์", "ศรราม เอี่ยมอาจ", "วงศธร", "เกรียงศักดิ์"];

      // --- State ข้อมูลหัวเรื่องและการมอบหมาย ---
      const [formData, setFormData] = useState({
        assigner: "เกรียงศักดิ์",
        operator1: "",
        operator2: "",
        operator3: "",
        operator4: "",
        pmDate: new Date().toISOString().split('T')[0],
        startTime: "",
        endTime: "",
        summaryText: "",
        overallStatus: "ปกติ",
      });

      // --- State รายการตรวจบนหลังคา DC (Visual Check) ---
      const [roofData, setRoofData] = useState({
        cleanliness: "สะอาด", // สะอาด / มีฝุ่น / ล้างแผง
        lastCleanDateInput: "",
        structure: "ปกติ",    // ปกติ / ไม่ปกติ
        cables: "ปกติ"         // ปกติ / ไม่ปกติ
      });

      // ดึงจากฐานข้อมูล Google Sheet มาแสดงผลแบบ Real-time
      const [lastWashDateFromDb, setLastWashDateFromDb] = useState("กำลังโหลดข้อมูล...");

      // --- State รายการ Inverter (INV-01 ถึง INV-05) ---
      const [inverters, setInverters] = useState({
        "INV-01": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
        "INV-02": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
        "INV-03": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
        "INV-04": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
        "INV-05": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" }
      });
      const [selectedInvTab, setSelectedInvTab] = useState("INV-01");

      // --- State รายการตรวจตู้ MDB และค่าไฟฟ้า (Janitza & Schneider) ---
      const [mdbData, setMdbData] = useState({
        mdbCabinetTemp: "",
        // Janitza Meter (UMG 511)
        l1_n_v: "", l1_n_a: "", l1_n_kw: "", l1_n_pf: "",
        l2_n_v: "", l2_n_a: "", l2_n_kw: "", l2_n_pf: "",
        l3_n_v: "", l3_n_a: "", l3_n_kw: "", l3_n_pf: "",
        frequencyHz: "",
        avgCurrentA: "",
        // Schneider Meter (PM5100)
        schneiderVavg: "",
        schneiderIavg: "",
        schneiderPtot: "",
        schneiderEdel: "",
        schneiderEdelUnit: "kWh", // kWh / GWh
        // อุปกรณ์ต่อพ่วงอื่น ๆ
        inverterOnline: "ปกติ",   // ปกติ / ไม่ปกติ
        monitorDisplay: "ปกติ"     // ปกติ / ไม่ปกติ
      });

      // --- State เพิ่มรายการตรวจเช็คแบบยืดหยุ่นในภายหลัง (Custom Items) ---
      const [customItems, setCustomItems] = useState([]);
      const [newCustomText, setNewCustomText] = useState("");

      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null); // 'success', 'error'
      const [customError, setCustomError] = useState("");

      // --- ดึงข้อมูลวันล้างแผงล่าสุดจากระบบ Google Sheet ของคุณ ---
      const fetchLastWashDate = async () => {
        try {
          const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=getLastWashDate`);
          const result = await response.json();
          if (result && result.status === "success" && result.lastWashDate) {
            setLastWashDateFromDb(result.lastWashDate);
          } else {
            setLastWashDateFromDb("ไม่พบประวัติการล้างแผงล่าสุด");
          }
        } catch (error) {
          console.error("Fetch wash date error:", error);
          setLastWashDateFromDb("ล้มเหลวในการเชื่อมโยงข้อมูล");
        }
      };

      useEffect(() => {
        fetchLastWashDate();
      }, []);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleRoofChange = (field, value) => {
        setRoofData(prev => ({ ...prev, [field]: value }));
      };

      const handleMdbChange = (e) => {
        const { name, value } = e.target;
        setMdbData(prev => ({ ...prev, [name]: value }));
      };

      const handleMdbRadioChange = (field, value) => {
        setMdbData(prev => ({ ...prev, [field]: value }));
      };

      const handleInvChange = (field, value) => {
        setInverters(prev => ({
          ...prev,
          [selectedInvTab]: {
            ...prev[selectedInvTab],
            [field]: value
          }
        }));
      };

      // --- จัดการส่วนคำถามที่พิมพ์เพิ่มเติมในอนาคต ---
      const addCustomItem = (e) => {
        e.preventDefault();
        if (!newCustomText.trim()) return;
        setCustomItems([...customItems, {
          id: Date.now(),
          text: newCustomText.trim(),
          value: "ปกติ"
        }]);
        setNewCustomText("");
      };

      const removeCustomItem = (id) => {
        setCustomItems(customItems.filter(item => item.id !== id));
      };

      const handleCustomValueChange = (id, value) => {
        setCustomItems(prev => prev.map(item => 
          item.id === id ? { ...item, value } : item
        ));
      };

      // --- บันทึกส่งข้อมูลใบงานเข้ากูเกิลชีตส่วนกลาง ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        // ตรวจสอบความถูกต้องของข้อมูลเวลา
        if (!formData.startTime || !formData.endTime) {
          setCustomError("กรุณาระบุ 'เวลาเริ่ม' และ 'เวลาสิ้นสุด' ของงาน PM เพื่อบันทึกข้อมูล");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        // ตรวจสอบช่างผู้ปฏิบัติงานหลักอย่างน้อย 1 คน
        if (!formData.operator1 && !formData.operator2 && !formData.operator3 && !formData.operator4) {
          setCustomError("กรุณาระบุชื่อช่าง 'ผู้ปฏิบัติงาน' ร่วมทีมอย่างน้อย 1 คน");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        setIsSubmitting(true);

        const payload = {
          action: "saveSolarPm",
          timestamp: new Date().toLocaleString('th-TH'),
          ...formData,
          ...roofData,
          inverters: inverters,
          ...mdbData,
          customItems: customItems
        };

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: "smooth" });

          // คืนค่าฟิลด์เพื่อให้พร้อมกรอกใบงานรอบถัดไป
          setFormData(prev => ({
            ...prev,
            operator1: "", operator2: "", operator3: "", operator4: "",
            startTime: "", endTime: "", summaryText: "", overallStatus: "ปกติ"
          }));
          setRoofData({ cleanliness: "สะอาด", lastCleanDateInput: "", structure: "ปกติ", cables: "ปกติ" });
          setInverters({
            "INV-01": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
            "INV-02": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
            "INV-03": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
            "INV-04": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" },
            "INV-05": { fan: "ปกติ", led: "ปกติ", temp: "", seal: "ปกติ" }
          });
          setMdbData({
            mdbCabinetTemp: "",
            l1_n_v: "", l1_n_a: "", l1_n_kw: "", l1_n_pf: "",
            l2_n_v: "", l2_n_a: "", l2_n_kw: "", l2_n_pf: "",
            l3_n_v: "", l3_n_a: "", l3_n_kw: "", l3_n_pf: "",
            frequencyHz: "", avgCurrentA: "",
            schneiderVavg: "", schneiderIavg: "", schneiderPtot: "", schneiderEdel: "", schneiderEdelUnit: "kWh",
            inverterOnline: "ปกติ", monitorDisplay: "ปกติ"
          });
          setCustomItems([]);
          
          // รีเฟรชวันที่ล้างแผงล่าสุดจากชีต
          fetchLastWashDate();

        } catch (error) {
          console.error("Submit error:", error);
          setSubmitStatus('error');
          setCustomError("ไม่สามารถบันทึกข้อมูลเข้า Google Sheets ได้ชั่วคราว กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ต");
          window.scrollTo({ top: 0, behavior: "smooth" });
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
          
          <div>
            {/* Header คลีนพรีเมียม สเปก บริษัท ซีพีออลล์ จำกัด (มหาชน) */}
            <header className="bg-white shadow-sm border-b-4 border-green-600 sticky top-0 z-30">
              <div className="p-4">
                <div className="flex items-center justify-between">
                  <span className="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded">CP ALL</span>
                  <span className="text-[10px] text-slate-400 font-bold flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3 h-3 mr-1 text-slate-400">
                      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                      <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                    ระบบมือถือหน้างาน
                  </span>
                </div>
                <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
                <h2 className="text-xs font-bold text-slate-600 mt-0.5 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 mr-1.5 w-3 h-3">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                  Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์
                </h2>
                
                <div className="grid grid-cols-3 gap-1 mt-2.5 pt-2 border-t border-slate-100 text-[10px] text-slate-500 font-semibold">
                  <div>รหัส: <span className="text-slate-800 font-bold">B3-FM-10-01-06</span></div>
                  <div className="text-center">ปรับปรุงครั้งที่: <span className="text-slate-800 font-bold">0</span></div>
                  <div className="text-right">ประกาศใช้: <span className="text-slate-800 font-bold">1 เม.ย. 2560</span></div>
                </div>
              </div>
            </header>

            {/* ส่วนเนื้อหาฟอร์มการ PM */}
            <main className="p-4 space-y-5 animate-fadeIn">
              
              {submitStatus === 'success' && (
                <div className="bg-green-100 border-2 border-green-400 text-green-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">ส่งผลการตรวจสำเร็จ!</p>
                    <p className="text-xs mt-0.5 font-semibold">จัดเก็บข้อมูลการ PM โซล่าร์เซลล์ เข้า Google Sheet เรียบร้อยแล้ว</p>
                  </div>
                </div>
              )}

              {customError && (
                <div className="bg-red-100 border-2 border-red-400 text-red-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">การป้อนข้อมูลขัดข้อง</p>
                    <p className="text-xs mt-0.5 font-bold leading-relaxed">{customError}</p>
                  </div>
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-5">
                
                {/* ส่วนที่ 1: ข้อมูลสเปกและวันเวลาปฏิบัติงาน */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-green-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>ข้อมูลงานตรวจเช็คหลัก</span>
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <span className="text-slate-400 font-semibold">เครื่องจักร/อุปกรณ์</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">ระบบผลิตไฟฟ้าโซล่าห์เซลล์</p>
                    </div>
                    <div>
                      <span className="text-slate-400 font-semibold">ความถี่แผนงาน</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">รอบประจำเดือน</p>
                    </div>
                  </div>

                  <div>
                    <span className="text-xs text-slate-400 font-semibold">สถานที่ปฏิบัติการ</span>
                    <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3 h-3 shrink-0">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                      </svg>
                      หลังคาและห้อง MDB
                    </p>
                  </div>

                  {/* วันที่ทำ PM */}
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">วันที่ทำ PM</label>
                    <div className="flex items-center border rounded-xl px-3 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3.5 h-3.5">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                      </svg>
                      <input 
                        type="date" 
                        name="pmDate" 
                        value={formData.pmDate} 
                        onChange={handleInputChange} 
                        required 
                        className="w-full py-1.5 text-xs outline-none bg-transparent font-bold" 
                      />
                    </div>
                  </div>

                  {/* เวลาเริ่ม & เวลาสิ้นสุด */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาเริ่ม</label>
                      <div className="flex items-center border rounded-xl px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3 h-3 shrink-0">
                          <circle cx="12" cy="12" r="10" />
                          <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input 
                          type="time" 
                          name="startTime" 
                          value={formData.startTime} 
                          onChange={handleInputChange} 
                          className="w-full py-1.5 text-xs outline-none bg-transparent" 
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาสิ้นสุด</label>
                      <div className="flex items-center border rounded-xl px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3 h-3 shrink-0">
                          <circle cx="12" cy="12" r="10" />
                          <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input 
                          type="time" 
                          name="endTime" 
                          value={formData.endTime} 
                          onChange={handleInputChange} 
                          className="w-full py-1.5 text-xs outline-none bg-transparent" 
                        />
                      </div>
                    </div>
                  </div>
                </section>

                {/* ส่วนที่ 2: รายชื่อทีมวิศวกรรมปฏิบัติการ */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                      <circle cx="9" cy="7" r="4" />
                      <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                      <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span>ทีมงานที่ปฏิบัติการ</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้มอบหมายงาน</label>
                    <input 
                      list="assigners" 
                      name="assigner" 
                      value={formData.assigner} 
                      onChange={handleInputChange} 
                      placeholder="พิมพ์หรือค้นหาชื่อผู้มอบหมาย..."
                      className="w-full p-2 text-xs border rounded-xl bg-slate-50/30 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold"
                    />
                    <datalist id="assigners">
                      {assignerList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงาน (ใส่ได้สูงสุด 4 คน)</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1, 2, 3, 4].map(num => (
                        <div key={num} className="flex items-center border rounded-xl px-2 bg-white focus-within:ring-2 focus-within:ring-blue-500">
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-1.5 w-3 h-3 shrink-0">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                          </svg>
                          <input 
                            list="operators" 
                            name={`operator${num}`} 
                            value={formData[`operator${num}`]} 
                            onChange={handleInputChange}
                            placeholder={`คนที่ ${num}`}
                            className="w-full py-2 text-xs outline-none bg-transparent font-semibold"
                          />
                        </div>
                      ))}
                    </div>
                    <datalist id="operators">
                      {operatorList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>
                </section>

                {/* ส่วนที่ 3: จุดที่ 1 บนหลังคาฝั่ง DC */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-teal-700 font-bold border-b pb-2 text-xs">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41" />
                    </svg>
                    <span>จุดที่ 1 บนหลังคา ฝั่ง DC</span>
                  </div>

                  {/* 1.1 ความสะอาดแผง */}
                  <div className="p-3.5 bg-slate-50/70 border rounded-2xl space-y-2.5">
                    <span className="text-xs font-bold text-slate-800">1.1 ความสะอาดแผง *</span>
                    <div className="grid grid-cols-3 gap-2">
                      {["สะอาด", "มีฝุ่น", "ล้างแผง"].map((v) => (
                        <label key={v} className="flex items-center justify-center p-2.5 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white has-[:checked]:border-emerald-600 transition-all shadow-sm">
                          <input type="radio" name="cleanliness" value={v} checked={roofData.cleanliness === v} onChange={() => handleRoofChange("cleanliness", v)} className="hidden" />
                          <span>{v}</span>
                        </label>
                      ))}
                    </div>

                    {/* แสดงผลการล้างแผงล่าสุดดึงจากฐานข้อมูล Google Sheet */}
                    <div className="pt-1.5 border-t border-slate-200/50">
                      <span className="text-[10px] text-slate-400 font-bold block">วันที่ล้างแผงล่าสุดจากระบบ:</span>
                      <p className="text-xs font-extrabold text-teal-700 mt-0.5">🗓️ {lastWashDateFromDb}</p>
                    </div>

                    {/* ช่องระบุหากเลือกล้างแผงรอบวันนี้ */}
                    {roofData.cleanliness === "ล้างแผง" && (
                      <div className="pt-2 animate-fadeIn">
                        <label className="block text-[10px] text-slate-500 font-bold mb-1">ระบุวันที่ทำความสะอาด/ล้างแผงล่าสุดรอบนี้:</label>
                        <input type="date" value={roofData.lastCleanDateInput} onChange={(e) => handleRoofChange("lastCleanDateInput", e.target.value)} className="w-full p-2 text-xs border rounded-lg focus:ring-1 focus:ring-emerald-500 outline-none font-bold" />
                      </div>
                    )}
                  </div>

                  {/* 1.2 โครงสร้างแผง */}
                  <div className="p-3.5 bg-slate-50/70 border rounded-2xl space-y-2.5">
                    <span className="text-xs font-bold text-slate-800">1.2 โครงสร้างแผง: น็อตยึด, รอยสนิม, การบิดงอ *</span>
                    <div className="grid grid-cols-2 gap-2">
                      {["ปกติ", "ไม่ปกติ"].map((v) => (
                        <label key={v} className="flex items-center justify-center p-2.5 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white has-[:checked]:border-emerald-600 transition-all shadow-sm">
                          <input type="radio" name="structure" value={v} checked={roofData.structure === v} onChange={() => handleRoofChange("structure", v)} className="hidden" />
                          <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ไม่ปกติ"}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  {/* 1.3 ท่อและสายไฟ */}
                  <div className="p-3.5 bg-slate-50/70 border rounded-2xl space-y-2.5">
                    <span className="text-xs font-bold text-slate-800">1.3 ท่อและสายไฟ: สาย DC บนหลังคา แตก/กรอบ/หนูกัด *</span>
                    <div className="grid grid-cols-2 gap-2">
                      {["ปกติ", "ไม่ปกติ"].map((v) => (
                        <label key={v} className="flex items-center justify-center p-2.5 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white has-[:checked]:border-emerald-600 transition-all shadow-sm">
                          <input type="radio" name="cables" value={v} checked={roofData.cables === v} onChange={() => handleRoofChange("cables", v)} className="hidden" />
                          <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ไม่ปกติ"}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                </section>

                {/* ส่วนที่ 4: งานตรวจสอบตู้ Inverter (บันทึกแยกตู้ 1-5) */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-teal-700 font-bold border-b pb-2 text-xs">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <rect x="2" y="2" width="20" height="20" rx="4" />
                      <line x1="6" y1="6" x2="18" y2="6" />
                    </svg>
                    <span>2. งานตรวจสอบตู้ Inverter (INV-01 ถึง INV-05)</span>
                  </div>

                  {/* แท็บปุ่มสลับเลือกตู้อินเวอร์เตอร์เพื่อความสวยงามประหยัดหน้าจอ */}
                  <div className="flex space-x-1 overflow-x-auto no-scrollbar pb-1">
                    {Object.keys(inverters).map((invKey) => (
                      <button
                        key={invKey}
                        type="button"
                        onClick={() => setSelectedInvTab(invKey)}
                        className={`px-3 py-1.5 rounded-lg text-[10px] font-black shrink-0 transition-all border ${selectedInvTab === invKey ? 'bg-emerald-600 text-white border-emerald-600 shadow' : 'bg-white text-slate-500 border-slate-200'}`}
                      >
                        {invKey}
                      </button>
                    ))}
                  </div>

                  {/* รายการฟอร์มย่อยของ Inverter ที่เลือก */}
                  <div className="p-4 bg-slate-50/70 border border-slate-100 rounded-2xl space-y-3 animate-fadeIn text-xs">
                    <div className="flex items-center justify-between border-b pb-2">
                      <span className="font-extrabold text-slate-700 text-xs">ข้อมูล: {selectedInvTab}</span>
                      <span className="text-[9px] text-teal-600 font-bold bg-teal-50 px-2 py-0.5 rounded border border-teal-200">บันทึกแยกช่องคลาวด์</span>
                    </div>

                    {/* พัดลมระบายความร้อน */}
                    <div className="space-y-1">
                      <span className="font-bold text-slate-600">พัดลมระบายความร้อน *</span>
                      <div className="grid grid-cols-2 gap-2">
                        {["ปกติ", "ผิดปกติ"].map(v => (
                          <label key={v} className="flex items-center justify-center p-2.5 border rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white transition-all shadow-sm">
                            <input type="radio" name={`fan_${selectedInvTab}`} value={v} checked={inverters[selectedInvTab].fan === v} onChange={() => handleInvChange("fan", v)} className="hidden" />
                            <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ผิดปกติ"}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* ไฟสถานะ LED */}
                    <div className="space-y-1 mt-2">
                      <span className="font-bold text-slate-600">ไฟสถานะ LED *</span>
                      <div className="grid grid-cols-2 gap-2">
                        {["ปกติ", "ผิดปกติ"].map(v => (
                          <label key={v} className="flex items-center justify-center p-2.5 border rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white transition-all shadow-sm">
                            <input type="radio" name={`led_${selectedInvTab}`} value={v} checked={inverters[selectedInvTab].led === v} onChange={() => handleInvChange("led", v)} className="hidden" />
                            <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ผิดปกติ"}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                    {/* อุณหภูมิจุดต่อสาย */}
                    <div className="space-y-1 mt-2">
                      <span className="font-bold text-slate-600">อุณหภูมิจุดต่อสาย (Thermal) *</span>
                      <div className="relative">
                        <input 
                          type="number" 
                          step="0.1" 
                          placeholder="อุณหภูมิวัดได้" 
                          value={inverters[selectedInvTab].temp} 
                          onChange={(e) => handleInvChange("temp", e.target.value)} 
                          className="w-full p-2.5 border rounded-lg outline-none font-bold bg-white" 
                          required 
                        />
                        <span className="absolute right-3 top-3 text-[10px] text-slate-400 font-bold">°C</span>
                      </div>
                    </div>

                    {/* หน้าต่างตู้ / ซีลยาง */}
                    <div className="space-y-1 mt-2">
                      <span className="font-bold text-slate-600">หน้าต่างตู้ / ซีลยาง กันน้ำ *</span>
                      <div className="grid grid-cols-2 gap-2">
                        {["ปกติ", "ผิดปกติ"].map(v => (
                          <label key={v} className="flex items-center justify-center p-2.5 border rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white transition-all shadow-sm">
                            <input type="radio" name={`seal_${selectedInvTab}`} value={v} checked={inverters[selectedInvTab].seal === v} onChange={() => handleInvChange("seal", v)} className="hidden" />
                            <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ผิดปกติ"}</span>
                          </label>
                        ))}
                      </div>
                    </div>

                  </div>
                </section>

                {/* ส่วนที่ 5: ห้อง MDB ฝั่ง DC และหน้าจอสถานะ */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-teal-700 font-bold border-b pb-2 text-xs">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <rect x="4" y="4" width="16" height="16" rx="2" />
                      <line x1="9" y1="9" x2="15" y2="9" />
                      <line x1="9" y1="13" x2="15" y2="13" />
                    </svg>
                    <span>จุดที่ 2 ห้อง MDB ฝั่ง DC</span>
                  </div>

                  {/* 3.1 อุณหภูมิรวมในตู้ MDB */}
                  <div className="p-3.5 bg-slate-50/70 border border-slate-100 rounded-2xl space-y-2">
                    <div className="flex justify-between items-center">
                      <span className="text-xs font-bold text-slate-800">3.1 อุณหภูมิรวมในตู้ MDB *</span>
                      <span className="text-[9px] bg-red-100 text-red-700 px-2 py-0.5 rounded font-bold">ไม่เกิน 45°C</span>
                    </div>
                    <div className="relative">
                      <input type="number" name="mdbCabinetTemp" value={mdbData.mdbCabinetTemp} onChange={handleMdbChange} step="0.1" placeholder="วัดด้วยปืนยิง Temp" className="w-full p-2.5 text-xs font-bold border rounded-lg bg-white outline-none" required />
                      <span className="absolute right-3 top-3 text-[10px] text-slate-400 font-bold">°C</span>
                    </div>
                  </div>

                  {/* 3.2 มิเตอร์ Janitza */}
                  <div className="p-3.5 bg-slate-50/70 border border-slate-100 rounded-2xl space-y-3">
                    <span className="text-xs font-bold text-slate-800 block border-b pb-1">3.2 มิเตอร์ Janitza (UMG 511) *</span>
                    
                    {/* เฟส L1-N */}
                    <div className="space-y-1">
                      <span className="text-[10px] font-bold text-emerald-700 block">เฟส L1-N:</span>
                      <div className="grid grid-cols-2 gap-2 text-[11px]">
                        <input type="number" step="0.1" name="l1_n_v" value={mdbData.l1_n_v} onChange={handleMdbChange} placeholder="แรงดัน (V)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.1" name="l1_n_a" value={mdbData.l1_n_a} onChange={handleMdbChange} placeholder="กระแส (A)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.1" name="l1_n_kw" value={mdbData.l1_n_kw} onChange={handleMdbChange} placeholder="กำลังจริง (kW)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.01" name="l1_n_pf" value={mdbData.l1_n_pf} onChange={handleMdbChange} placeholder="ค่า PF" className="p-2 border rounded bg-white" required />
                      </div>
                    </div>

                    {/* เฟส L2-N */}
                    <div className="space-y-1 pt-1.5 border-t border-dashed">
                      <span className="text-[10px] font-bold text-emerald-700 block">เฟส L2-N:</span>
                      <div className="grid grid-cols-2 gap-2 text-[11px]">
                        <input type="number" step="0.1" name="l2_n_v" value={mdbData.l2_n_v} onChange={handleMdbChange} placeholder="แรงดัน (V)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.1" name="l2_n_a" value={mdbData.l2_n_a} onChange={handleMdbChange} placeholder="กระแส (A)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.1" name="l2_n_kw" value={mdbData.l2_n_kw} onChange={handleMdbChange} placeholder="กำลังจริง (kW)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.01" name="l2_n_pf" value={mdbData.l2_n_pf} onChange={handleMdbChange} placeholder="ค่า PF" className="p-2 border rounded bg-white" required />
                      </div>
                    </div>

                    {/* เฟส L3-N */}
                    <div className="space-y-1 pt-1.5 border-t border-dashed">
                      <span className="text-[10px] font-bold text-emerald-700 block">เฟส L3-N:</span>
                      <div className="grid grid-cols-2 gap-2 text-[11px]">
                        <input type="number" step="0.1" name="l3_n_v" value={mdbData.l3_n_v} onChange={handleMdbChange} placeholder="แรงดัน (V)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.1" name="l3_n_a" value={mdbData.l3_n_a} onChange={handleMdbChange} placeholder="กระแส (A)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.1" name="l3_n_kw" value={mdbData.l3_n_kw} onChange={handleMdbChange} placeholder="กำลังจริง (kW)" className="p-2 border rounded bg-white" required />
                        <input type="number" step="0.01" name="l3_n_pf" value={mdbData.l3_n_pf} onChange={handleMdbChange} placeholder="ค่า PF" className="p-2 border rounded bg-white" required />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-2 pt-2 border-t">
                      <div className="space-y-1">
                        <span className="text-[10px] font-bold text-slate-500 block">ความถี่ (Hz)</span>
                        <input type="number" step="0.01" name="frequencyHz" value={mdbData.frequencyHz} onChange={handleMdbChange} placeholder="Hz" className="p-2 border rounded w-full bg-white text-xs" required />
                      </div>
                      <div className="space-y-1">
                        <span className="text-[10px] font-bold text-slate-500 block">กระแสเฉลี่ย L1..L3 (A)</span>
                        <input type="number" step="0.1" name="avgCurrentA" value={mdbData.avgCurrentA} onChange={handleMdbChange} placeholder="แอมป์เฉลี่ย" className="p-2 border rounded w-full bg-white text-xs" required />
                      </div>
                    </div>
                  </div>

                  {/* 3.3 มิเตอร์ Schneider */}
                  <div className="p-3.5 bg-slate-50/70 border border-slate-100 rounded-2xl space-y-3">
                    <span className="text-xs font-bold text-slate-800 block border-b pb-1">3.3 มิเตอร์หน้าตู้ Breaker: Schneider (PM5100) *</span>
                    <div className="space-y-2 text-xs">
                      <div>
                        <span className="text-[10px] font-bold text-slate-500 block">Vavg (แรงดันไฟฟ้าเฉลี่ย)</span>
                        <input type="number" step="0.1" name="schneiderVavg" value={mdbData.schneiderVavg} onChange={handleMdbChange} placeholder="โวลท์เฉลี่ย" className="w-full p-2 border rounded bg-white mt-1" required />
                      </div>
                      <div>
                        <span className="text-[10px] font-bold text-slate-500 block">Iavg (กระแสไฟฟ้าเฉลี่ย)</span>
                        <input type="number" step="0.1" name="schneiderIavg" value={mdbData.schneiderIavg} onChange={handleMdbChange} placeholder="แอมป์เฉลี่ย" className="w-full p-2 border rounded bg-white mt-1" required />
                      </div>
                      <div>
                        <span className="text-[10px] font-bold text-slate-500 block">Ptot (กำลังไฟฟ้ารวม ณ ขณะนั้น)</span>
                        <input type="number" step="0.1" name="schneiderPtot" value={mdbData.schneiderPtot} onChange={handleMdbChange} placeholder="kW รวม" className="w-full p-2 border rounded bg-white mt-1" required />
                      </div>
                      <div>
                        <span className="text-[10px] font-bold text-slate-500 block">E Del (พลังงานสะสมทั้งหมด)</span>
                        <div className="flex space-x-2 mt-1">
                          <input type="number" step="0.1" name="schneiderEdel" value={mdbData.schneiderEdel} onChange={handleMdbChange} placeholder="ค่าพลังงานสะสม" className="flex-1 p-2 border rounded bg-white" required />
                          <select name="schneiderEdelUnit" value={mdbData.schneiderEdelUnit} onChange={handleMdbChange} className="p-2 border rounded bg-white text-xs font-bold">
                            <option value="kWh">kWh</option>
                            <option value="GWh">GWh</option>
                          </select>
                        </div>
                      </div>
                    </div>
                  </div>

                  {/* 3.4 ระบบเชื่อมต่อ */}
                  <div className="p-3.5 bg-slate-50/70 border border-slate-100 rounded-2xl space-y-2.5">
                    <span className="text-xs font-bold text-slate-800">3.4 การเชื่อมต่อ: Inverter ออนไลน์ครบ 5 ตัว Breaker 1-5 ที่ห้องควบคุม *</span>
                    <div className="grid grid-cols-2 gap-2">
                      {["ปกติ", "ไม่ปกติ"].map((v) => (
                        <label key={v} className="flex items-center justify-center p-2.5 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white has-[:checked]:border-emerald-600 transition-all shadow-sm">
                          <input type="radio" name="inverterOnline" value={v} checked={mdbData.inverterOnline === v} onChange={() => handleMdbRadioChange("inverterOnline", v)} className="hidden" />
                          <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ไม่ปกติ"}</span>
                        </label>
                      ))}
                    </div>
                  </div>

                  {/* 3.5 หน้าจอแสดงผล */}
                  <div className="p-3.5 bg-slate-50/70 border border-slate-100 rounded-2xl space-y-2.5">
                    <span className="text-xs font-bold text-slate-800">3.5 หน้าจอแสดงผล: หน้าตู้/คอมพิวเตอร์ ทำงานปกติ ไม่ค้าง *</span>
                    <div className="grid grid-cols-2 gap-2">
                      {["ปกติ", "ไม่ปกติ"].map((v) => (
                        <label key={v} className="flex items-center justify-center p-2.5 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 has-[:checked]:bg-emerald-500 has-[:checked]:text-white has-[:checked]:border-emerald-600 transition-all shadow-sm">
                          <input type="radio" name="monitorDisplay" value={v} checked={mdbData.monitorDisplay === v} onChange={() => handleMdbRadioChange("monitorDisplay", v)} className="hidden" />
                          <span>{v === "ปกติ" ? "🟢 ปกติ" : "🔴 ไม่ปกติ"}</span>
                        </label>
                      ))}
                    </div>
                  </div>
                </section>

                {/* ส่วนที่ 6: การเพิ่มรายการตรวจเช็คอื่นๆ (พิมพ์เพื่อรองรับการขยายอนาคต) */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center justify-between border-b pb-2">
                    <span className="text-teal-700 font-bold text-xs flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4 mr-1.5 text-teal-600">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v6m3-3H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" />
                      </svg>
                      รายการตรวจสอบเพิ่มเติม (พิมพ์ขยายภายหลัง)
                    </span>
                  </div>

                  <div className="flex space-x-2">
                    <input 
                      type="text" 
                      placeholder="พิมพ์หัวข้อตรวจใหม่..." 
                      value={newCustomText} 
                      onChange={(e) => setNewCustomText(e.target.value)} 
                      className="flex-1 px-3 py-2 text-xs border rounded-xl outline-none focus:ring-1 focus:ring-teal-500 bg-white" 
                    />
                    <button type="button" onClick={addCustomItem} className="px-4 py-2 bg-teal-600 hover:bg-teal-700 text-white font-bold text-xs rounded-xl shadow-sm">เพิ่ม</button>
                  </div>

                  {customItems.length > 0 && (
                    <div className="space-y-2.5">
                      {customItems.map((item) => (
                        <div key={item.id} className="p-3 bg-slate-50/70 border border-slate-100 rounded-xl space-y-2 text-xs animate-fadeIn flex justify-between items-start">
                          <div className="space-y-1.5 flex-1 pr-4">
                            <p className="font-bold text-slate-800">{item.text}</p>
                            <div className="flex gap-2">
                              {["ปกติ", "ไม่ปกติ"].map(opt => (
                                <button
                                  key={opt}
                                  type="button"
                                  onClick={() => handleCustomValueChange(item.id, opt)}
                                  className={`px-3 py-1 border rounded text-[10px] font-bold ${item.value === opt ? 'bg-emerald-500 text-white border-emerald-600' : 'bg-white text-slate-500'}`}
                                >
                                  {opt}
                                </button>
                              ))}
                            </div>
                          </div>
                          <button type="button" onClick={() => removeCustomItem(item.id)} className="text-red-500 hover:text-red-700 text-[10px] font-bold shrink-0 mt-0.5">ลบ 🗑️</button>
                        </div>
                      ))}
                    </div>
                  )}
                </section>

                {/* ส่วนที่ 7: สรุปผลการ PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-orange-600 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <line x1="16" y1="13" x2="8" y2="13"></line>
                      <line x1="16" y1="17" x2="8" y2="17"></line>
                      <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>สรุปผลการ PM</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-2 font-bold">สรุปผลภาพรวม</label>
                    <div className="flex gap-2">
                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ปกติ"
                          checked={formData.overallStatus === "ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ปกติ" }))}
                          className="w-3.5 h-3.5 text-green-600 border-slate-300 focus:ring-green-500" 
                        />
                        <span>🟢 ปกติ</span>
                      </label>

                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ไม่ปกติ"
                          checked={formData.overallStatus === "ไม่ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ไม่ปกติ" }))}
                          className="w-3.5 h-3.5 text-red-600 border-slate-300 focus:ring-red-500" 
                        />
                        <span>🔴 พบจุดไม่ปกติ</span>
                      </label>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-1 font-bold">บันทึกรายละเอียดสรุปอาการ / ปัญหาหลังคา โซล่าร์เซลล์ที่เจอ</label>
                    <textarea 
                      name="summaryText" 
                      value={formData.summaryText} 
                      onChange={handleInputChange}
                      rows="3" 
                      className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-xs"
                      placeholder="ระบุข้อความสรุปอาการ หรือจุดขัดข้องที่ทำการแก้ไข..."
                    ></textarea>
                  </div>
                </section>

                {/* ส่วนที่ 8: ปุ่มกดรายงานส่งข้อมูล PM */}
                <div className="bg-white p-3.5 rounded-3xl shadow-sm border border-slate-100">
                  <button 
                    type="submit" 
                    disabled={isSubmitting}
                    className={`w-full py-4 rounded-xl font-bold text-sm text-white shadow-md flex justify-center items-center transition-all ${isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 active:scale-95'}`}
                  >
                    {isSubmitting ? (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin mr-2 w-4 h-4">
                          <polyline points="23 4 23 10 17 10" />
                          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                        </svg>
                        กำลังตรวจสอบและส่งรายงาน MDB...
                      </span>
                    ) : (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                          <polyline points="17 21 17 13 7 13 7 21" />
                          <polyline points="7 3 7 8 15 8" />
                        </svg>
                        <span>ยืนยันส่งรายงาน Solar PM เข้า Google Sheet</span>
                      </span>
                    )}
                  </button>
                </div>

              </form>
            </main>
          </div>

          <footer className="text-center text-[10px] text-slate-400 font-medium my-4">
            <p>© 2026 CP ALL DC MAHACHAI ENGINEERING DEPARTMENT</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
