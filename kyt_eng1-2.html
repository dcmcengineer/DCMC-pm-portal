<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KYT MODULAR ENG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #F6F3EC;
    --ink: #1C1F1E;
    --yellow: #F5C518;
    --orange: #E1531F;
    --green: #2F7A52;
    --line: #D8D2C2;
    --input-focus: #1A73E8;
  }
  
  * {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* ป้องกันแถบสีฟ้าเวลาแตะปุ่มบนมือถือ */
  }
  
  body {
    margin: 0;
    background: repeating-linear-gradient(135deg, var(--yellow) 0 18px, var(--ink) 18px 36px);
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 10px 0 30px;
  }
  
  .tag {
    width: 100%;
    max-width: 480px;
    background: var(--paper);
    margin: 0 10px;
    border-radius: 12px; /* โค้งมนเข้ากับดีไซน์มือถือสมัยใหม่ */
    box-shadow: 0 10px 30px rgba(0,0,0,.35);
    position: relative;
    overflow: hidden;
  }
  
  .punch {
    width: 22px;
    height: 22px;
    background: repeating-linear-gradient(135deg, var(--yellow) 0 8px, var(--ink) 8px 16px);
    border-radius: 50%;
    position: absolute;
    top: 10px; 
    left: 50%;
    transform: translateX(-50%);
    box-shadow: inset 0 0 0 5px var(--paper), inset 0 0 0 7px var(--ink);
    z-index: 2;
  }
  
  header {
    background: var(--ink);
    color: var(--paper);
    padding: 30px 16px 16px;
    text-align: center;
    position: relative;
  }
  
  .kicker {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: .15em;
    color: var(--yellow);
    text-transform: uppercase;
  }
  
  h1 {
    font-family: 'Oswald', sans-serif;
    font-size: 24px;
    letter-spacing: .02em;
    margin: 6px 0 2px;
    text-transform: uppercase;
  }
  
  .sub {
    font-size: 11.5px;
    color: #C9C4B4;
    line-height: 1.4;
  }
  
  .stripe {
    height: 8px;
    background: repeating-linear-gradient(90deg, var(--yellow) 0 16px, var(--ink) 16px 32px);
  }
  
  form {
    padding: 16px 16px 4px;
  }
  
  .field {
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px dashed var(--line);
  }
  
  .field:last-of-type {
    border-bottom: none;
    margin-bottom: 8px;
  }
  
  .step-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }
  
  .step-num {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 13px;
    color: var(--paper);
    background: var(--orange);
    width: 22px;
    height: 22px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  
  label {
    font-family: 'Oswald', sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: .01em;
  }
  
  .hint {
    font-size: 11px;
    color: #7A7568;
    margin: -2px 0 6px 32px;
    line-height: 1.3;
  }
  
  /* ปรับปรุงขนาดและ UI ของ Input ให้แตะง่ายบนมือถือ */
  input, textarea {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 16px; /* ป้องกันหน้าจอซูมอัตโนมัติใน iOS ด้วยการใช้ขนาด 16px */
    padding: 12px;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    background: #fff;
    color: var(--ink);
    margin-top: 4px;
    -webkit-appearance: none; /* ล้างรูปแบบดั้งเดิมของ Safari */
  }
  
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(225,83,31,.15);
  }
  
  input[type="date"], input[type="number"] {
    font-family: 'JetBrains Mono', monospace;
  }
  
  textarea {
    resize: none;
    min-height: 80px;
  }
  
  /* แผงปุ่มบวกลบสำหรับจำนวนคน */
  .participants-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 6px;
  }
  
  .stepper {
    display: flex;
    border: 1.5px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    width: 150px;
  }
  
  .stepper button {
    width: 46px;
    height: 44px;
    border: none;
    background: var(--paper);
    font-size: 20px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--ink);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  
  .stepper button:active {
    background: var(--yellow);
  }
  
  .stepper input {
    width: 58px;
    height: 44px;
    text-align: center;
    border: none;
    border-left: 1.5px solid var(--line);
    border-right: 1.5px solid var(--line);
    border-radius: 0;
    margin: 0;
    padding: 0;
    font-size: 16px;
    font-weight: 600;
  }
  
  /* ซ่อนปุ่มหมุนตัวเลขแบบพื้นฐาน */
  input[type=number]::-webkit-inner-spin-button, 
  input[type=number]::-webkit-outer-spin-button { 
    -webkit-appearance: none; 
    margin: 0; 
  }
  input[type=number] {
    -moz-appearance: textfield;
  }
  
  .unit {
    font-size: 14px;
    font-weight: 600;
    color: #555043;
  }
  
  .submit-wrap {
    padding: 4px 16px 20px;
  }
  
  /* ขยายขนาดปุ่มส่งข้อมูลให้โดดเด่น */
  button.submit {
    width: 100%;
    background: var(--green);
    color: #fff;
    border: none;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Oswald', sans-serif;
    font-size: 17px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(47, 122, 82, 0.25);
    transition: background-color 0.2s, transform .1s;
  }
  
  button.submit:active {
    transform: scale(.98);
  }
  
  button.submit:disabled {
    background: #9AA79E;
    box-shadow: none;
    cursor: wait;
  }
  
  .status {
    margin: 4px 16px 12px;
    padding: 14px;
    border-radius: 8px;
    font-size: 14px;
    display: none;
    line-height: 1.5;
  }
  
  .status.ok {
    display: block;
    background: #E5F1EA;
    color: var(--green);
    border: 1px solid #BFDFCC;
  }
  
  .status.err {
    display: block;
    background: #FBE7E0;
    color: var(--orange);
    border: 1px solid #F3C3AF;
  }
  
  .config-note {
    margin: 0 16px 20px;
    font-size: 11px;
    color: #9C9686;
    line-height: 1.5;
    border-top: 1px solid var(--line);
    padding-top: 10px;
  }
  
  .config-note code {
    background: #EFEBDD;
    padding: 1px 4px;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }

  /* ปรับแต่งส่วนติดต่อบนหน้าจอขนาดเล็กพิเศษ (เช่น iPhone SE หรือมือถือขนาดเล็ก) */
  @media (max-width: 360px) {
    h1 {
      font-size: 21px;
    }
    form {
      padding: 12px 12px 2px;
    }
    input, textarea {
      padding: 10px;
    }
    .submit-wrap {
      padding: 4px 12px 16px;
    }
  }
</style>
</head>
<body>
  <div class="tag">
    <div class="punch"></div>
    <header>
      <div class="kicker">Kiken Yochi Training · ประจำวัน</div>
      <h1>KYT MODULAR ENG1-2</h1>
      <div class="sub">บันทึกกิจกรรมวิเคราะห์และทำนายอันตรายก่อนปฏิบัติงาน</div>
    </header>
    <div class="stripe"></div>

    <form id="kytForm">
      <div class="field">
        <div class="step-row">
          <div class="step-num">1</div>
          <label for="date">วันที่</label>
        </div>
        <input type="date" id="date" name="date" required>
      </div>

      <div class="field">
        <div class="step-row">
          <div class="step-num">2</div>
          <label for="process">กระบวนการทำงาน</label>
        </div>
        <input type="text" id="process" name="process" placeholder="เช่น การเปลี่ยนเสาอัพไร้ท์" required>
      </div>

      <div class="field">
        <div class="step-row">
          <div class="step-num">3</div>
          <label for="hazard">อุบัติเหตุหรืออันตรายที่อาจเกิดขึ้น</label>
        </div>
        <textarea id="hazard" name="hazard" placeholder="ระบุจุดเสี่ยงหรือสิ่งที่เป็นอันตรายในหน้างาน" required></textarea>
      </div>

      <div class="field">
        <div class="step-row">
          <div class="step-num">4</div>
          <label for="control">มาตรการควบคุมและป้องกัน</label>
        </div>
        <textarea id="control" name="control" placeholder="ระบุมาตรการหรือขั้นตอนที่จะทำเพื่อเลี่ยงความเสี่ยง" required></textarea>
      </div>

      <div class="field">
        <div class="step-row">
          <div class="step-num">5</div>
          <label for="kytPhrase">คำชี้นิ้วเรียกขาน (KYT)</label>
        </div>
        <div class="hint">ข้อความที่สมาชิกเปล่งเสียงพูดพร้อมเพรียงกัน</div>
        <input type="text" id="kytPhrase" name="kytPhrase" placeholder="เช่น ปฏิบัติงานปลอดภัย อุบัติเหตุเป็นศูนย์ โอเค!" required>
      </div>

      <div class="field">
        <div class="step-row">
          <div class="step-num">6</div>
          <label for="participants">จำนวนผู้ร่วมกิจกรรม</label>
        </div>
        <div class="participants-row">
          <div class="stepper">
            <button type="button" id="dec" aria-label="ลดจำนวน">−</button>
            <input type="number" id="participants" name="participants" min="1" value="1" required readonly>
            <button type="button" id="inc" aria-label="เพิ่มจำนวน">+</button>
          </div>
          <span class="unit">คน</span>
        </div>
      </div>
    </form>

    <div class="status" id="status"></div>

    <div class="submit-wrap">
      <button class="submit" id="submitBtn" type="submit" form="kytForm">บันทึกข้อมูล</button>
    </div>

    <div class="config-note">
      หมายเหตุ: กรุณาตั้งค่าเชื่อมต่อโดยนำ URL เว็บแอปของ Google Sheet มาใส่แทนที่ข้อความ <code>WEB_APP_URL</code> ในส่วนสคริปต์
    </div>
  </div>

<script>
  // คัดลอก URL ของ Web App หลังจากทำการ Deploy บน Google Sheets มาใส่ในช่องด้านล่างนี้
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxOOffCrnxk7hEQ_JwQzHkX_UQm7kacgHjJ70mOsBQ9tc26lSFSn2-T2fQdRvzcZ4or0w/exec";

  // กำหนดวันที่เริ่มต้นเป็นวันปัจจุบัน
  const dateInput = document.getElementById('date');
  const today = new Date();
  dateInput.value = today.toISOString().split('T')[0];

  // ควบคุมปุ่มบวกและลบจำนวนผู้เข้าร่วมกิจกรรม
  const participants = document.getElementById('participants');
  document.getElementById('inc').addEventListener('click', () => {
    participants.value = Math.max(1, parseInt(participants.value || 1) + 1);
  });
  document.getElementById('dec').addEventListener('click', () => {
    participants.value = Math.max(1, parseInt(participants.value || 1) - 1);
  });

  const form = document.getElementById('kytForm');
  const statusBox = document.getElementById('status');
  const submitBtn = document.getElementById('submitBtn');

  // จัดการการส่งฟอร์มข้อมูลแบบ POST
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    statusBox.className = 'status';
    statusBox.style.display = 'none';

    if (WEB_APP_URL.includes('PASTE_YOUR')) {
      statusBox.className = 'status err';
      statusBox.textContent = '❌ ข้อมูลไม่สามารถบันทึกได้เนื่องจากยังไม่ได้ตั้งค่าคีย์เชื่อมโยง WEB_APP_URL ในส่วนสคริปต์';
      return;
    }

    const payload = {
      date: dateInput.value,
      process: document.getElementById('process').value,
      hazard: document.getElementById('hazard').value,
      control: document.getElementById('control').value,
      kytPhrase: document.getElementById('kytPhrase').value,
      participants: participants.value
    };

    submitBtn.disabled = true;
    submitBtn.textContent = 'กำลังส่งข้อมูล...';

    try {
      await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      statusBox.className = 'status ok';
      statusBox.textContent = '✔️ บันทึกกิจกรรม KYT ลงในระบบ Google Sheets สำเร็จเรียบร้อยแล้ว!';
      form.reset();
      dateInput.value = new Date().toISOString().split('T')[0];
      participants.value = 1;
    } catch (err) {
      statusBox.className = 'status err';
      statusBox.textContent = '❌ เกิดปัญหาขัดข้องชั่วคราวในการส่งข้อมูล กรุณาตรวจสอบอินเทอร์เน็ตหรือ URL ปลายทางของคุณ';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'บันทึกข้อมูล';
    }
  });
</script>
</body>
</html>
