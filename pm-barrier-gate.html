<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Sheet PM ระบบไม้กั้นรถอัตโนมัติ</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Anuphan', sans-serif;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // 🔴 หลังจาก Deploy ใน Google Apps Script แล้ว ให้นำ URL เว็บแอปมาใส่ที่นี่ครับ
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwTTgiHkZmJExYa8452WCUf16rcKSVtcmNm_8ktM32FE44qObkbr31mdlHoHrIVe9RNTQ/exec";

    function App() {
      const assignerList = ["เกรียงศักดิ์", "ณรงค์", "รัฐชานนท์"];
      const operatorList = ["ณรงค์", "รัฐชานนท์", "บัญชา", "วสุพล", "ศรายุทธ", "พิพัฒน์", "ศรราม เอี่ยมอาจ", "วงศธร", "เกรียงศักดิ์"];

      // รายการตรวจเช็คหลักมาตรฐานตามที่คุณเกรียงศักดิ์กำหนด
      const defaultChecklist = [
        { id: 1, text: "สภาพตู้และไม้กั้น", sub: "ยึดแน่น, ไม่โยก, ไม้ตรง", type: "status" },
        { id: 2, text: "เสียงมอเตอร์ & เฟือง", sub: "เสียงนิ่ม, ไม่ดังผิดปกติ", type: "status" },
        { id: 3, text: "การหล่อลื่น", sub: "ข้อต่อ, สปริง, จุดหมุน มีจาระบี", type: "status" },
        { id: 4, text: "เซนเซอร์กันไม้ตี", sub: "Loop/Photo ทำงานถูกต้อง", type: "status", imp: true },
        { id: 5, text: "ระดับไม้กั้น", sub: "เปิดสุดตั้งฉาก, ปิดสุดขนานพื้น", type: "status" },
        { id: 6, text: "ระบบปลดล็อกมือ (Clutch)", sub: "ไขปลดล็อกยกง่าย", type: "status" },
        { id: 7, text: "ปุ่มกด & รีโมท", sub: "สั่งงานเปิด-ปิดได้ปกติ", type: "status" },
        { id: 8, text: "ความสะอาด", sub: "ปัดกวาดฝุ่น/หยากไย่/แมลงในตู้", type: "clean" }
      ];

      // --- State ข้อมูลทั่วไปและการมอบหมายเหมือน PM โซล่าร์ ---
      const [formData, setFormData] = useState({
        assigner: "เกรียงศักดิ์",
        operator1: "", operator2: "", operator3: "", operator4: "",
        pmDate: new Date().toISOString().split('T')[0],
        startTime: "",
        endTime: "",
        summaryText: "",
        overallStatus: "ปกติ",
      });

      // --- State สำหรับเก็บผลการตรวจเช็คของ "ฝั่งขาเข้า" และ "ฝั่งขาออก" ---
      const [checks, setChecks] = useState({
        in_1: "ปกติ", out_1: "ปกติ",
        in_2: "ปกติ", out_2: "ปกติ",
        in_3: "ปกติ", out_3: "ปกติ",
        in_4: "ปกติ", out_4: "ปกติ",
        in_5: "ปกติ", out_5: "ปกติ",
        in_6: "ปกติ", out_6: "ปกติ",
        in_7: "ปกติ", out_7: "ปกติ",
        in_8: "เรียบร้อย", out_8: "เรียบร้อย"
      });

      // แท็บเลือกว่ากำลังตรวจฝั่งไหนเพื่อประหยัดหน้าจอมือถือ
      const [activeTab, setActiveTab] = useState("INBOUND");

      // --- State สำหรับรองรับการเพิ่มรายการตรวจสอบเพิ่มภายหลังหน้างาน ---
      const [customItems, setCustomItems] = useState([]);
      const [newCustomText, setNewCustomText] = useState("");

      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null);
      const [customError, setCustomError] = useState("");

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleRadioChange = (key, value) => {
        setChecks(prev => ({ ...prev, [key]: value }));
      };

      // --- ฟังก์ชันจัดทำรายการตรวจเช็คเพิ่มเติม ---
      const addCustomItem = (e) => {
        e.preventDefault();
        if (!newCustomText.trim()) return;
        const newId = Date.now();
        setCustomItems([...customItems, { id: newId, text: newCustomText.trim() }]);
        
        setChecks(prev => ({
          ...prev,
          [`custom_in_${newId}`]: "ปกติ",
          [`custom_out_${newId}`]: "ปกติ"
        }));
        setNewCustomText("");
      };

      const removeCustomItem = (id) => {
        setCustomItems(customItems.filter(item => item.id !== id));
      };

      // --- ฟังก์ชันบันทึกรายงานเข้าสู่ Google Sheet ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        if (!formData.startTime || !formData.endTime) {
          setCustomError("กรุณาระบุ 'เวลาเริ่ม' และ 'เวลาสิ้นสุด' ของงาน PM เพื่อจัดเก็บข้อมูล");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (!formData.operator1) {
          setCustomError("กรุณาระบุอย่างน้อยชื่อ 'ผู้ปฏิบัติงานคนที่ 1' หลัก");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        setIsSubmitting(true);

        // รวมโครงสร้างข้อมูลส่งไปยัง Apps Script แบบเดียวกับระบบ Solar PM
        const payload = {
          action: "saveBarrierPm",
          timestamp: new Date().toLocaleString('th-TH'),
          location: "ป้อม 1 ทางเข้าศูนย์กระจาย",
          machineType: "ระบบไม้กั้นรถอัตโนมัติ",
          frequency: "รอบประจำเดือน",
          ...formData,
          checks: checks,
          customItems: customItems
        };

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: "smooth" });

          // คืนค่าฟิลด์ฟอร์มเพื่อรอการทำรอบใหม่ในเดือนถัดไป
          setFormData(prev => ({
            ...prev,
            operator1: "", operator2: "", operator3: "", operator4: "",
            startTime: "", endTime: "", summaryText: "", overallStatus: "ปกติ"
          }));
          
          setChecks({
            in_1: "ปกติ", out_1: "ปกติ", in_2: "ปกติ", out_2: "ปกติ",
            in_3: "ปกติ", out_3: "ปกติ", in_4: "ปกติ", out_4: "ปกติ",
            in_5: "ปกติ", out_5: "ปกติ", in_6: "ปกติ", out_6: "ปกติ",
            in_7: "ปกติ", out_7: "ปกติ", in_8: "เรียบร้อย", out_8: "เรียบร้อย"
          });
          setCustomItems([]);

        } catch (error) {
          console.error("Submit error:", error);
          setSubmitStatus('error');
          setCustomError("การเชื่อมต่อขัดข้อง ไม่สามารถส่งรายงานเข้า Google Sheets ได้ชั่วคราว");
          window.scrollTo({ top: 0, behavior: "smooth" });
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
          
          <div>
            {/* Header ส่วนหัวกระดาษคงสเปกตามแบบฟอร์มบริษัท ซีพีออลล์ จำกัด (มหาชน) */}
            <header className="bg-white shadow-sm border-b-4 border-blue-600 sticky top-0 z-30">
              <div className="p-4">
                <div className="flex items-center justify-between">
                  <span className="bg-blue-600 text-white text-[10px] font-black px-2 py-0.5 rounded">CP ALL</span>
                  <span className="text-[10px] text-slate-400 font-bold flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3 h-3 mr-1 text-slate-400">
                      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                      <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                    ระบบมือถือหน้างาน
                  </span>
                </div>
                <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
                <h2 className="text-xs font-bold text-slate-600 mt-0.5 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-blue-600 mr-1.5 w-3 h-3">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                  </svg>
                  Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์
                </h2>
                
                <div className="grid grid-cols-3 gap-1 mt-2.5 pt-2 border-t border-slate-100 text-[10px] text-slate-500 font-semibold">
                  <div>รหัส: <span className="text-slate-800 font-bold">B3-FM-10-01-06</span></div>
                  <div className="text-center">ปรับปรุงครั้งที่: <span className="text-slate-800 font-bold">0</span></div>
                  <div className="text-right">ประกาศใช้: <span className="text-slate-800 font-bold">1 เม.ย. 2560</span></div>
                </div>
              </div>
            </header>

            {/* ส่วนแบบฟอร์มแอปมือถือ */}
            <main className="p-4 space-y-5 animate-fadeIn">
              
              {submitStatus === 'success' && (
                <div className="bg-green-100 border-2 border-green-400 text-green-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">ส่งผลการตรวจสำเร็จ!</p>
                    <p className="text-xs mt-0.5 font-semibold">จัดเก็บข้อมูลการ PM ระบบไม้กั้นรถเรียบร้อยแล้วครับ</p>
                  </div>
                </div>
              )}

              {customError && (
                <div className="bg-red-100 border-2 border-red-400 text-red-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">การป้อนข้อมูลไม่ครบถ้วน</p>
                    <p className="text-xs mt-0.5 font-bold leading-relaxed">{customError}</p>
                  </div>
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-5">
                
                {/* ข้อมูลอุปกรณ์และสถานที่ */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>ข้อมูลงานตรวจเช็คหลัก</span>
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <span className="text-slate-400 font-semibold">เครื่องจักร/อุปกรณ์</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">ระบบไม้กั้นรถอัตโนมัติ</p>
                    </div>
                    <div>
                      <span className="text-slate-400 font-semibold">ความถี่แผนงาน</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">รอบประจำเดือน</p>
                    </div>
                  </div>

                  <div>
                    <span className="text-xs text-slate-400 font-semibold">สถานที่ปฏิบัติการ</span>
                    <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3 h-3 shrink-0">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                      </svg>
                      ป้อม 1 ทางเข้าศูนย์กระจาย
                    </p>
                  </div>

                  {/* วันที่ทำ PM อยู่ใต้กล่องสถานที่ตามเงื่อนไข */}
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">วันที่ทำ PM</label>
                    <div className="flex items-center border rounded-xl px-3 py-1 bg-white focus-within:ring-2 focus-within:ring-blue-500">
                      <input 
                        type="date" 
                        name="pmDate" 
                        value={formData.pmDate} 
                        onChange={handleInputChange} 
                        required 
                        className="w-full py-1.5 text-xs outline-none bg-transparent font-bold" 
                      />
                    </div>
                  </div>

                  {/* เวลาเริ่ม & เวลาสิ้นสุด */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาเริ่ม</label>
                      <input 
                        type="time" 
                        name="startTime" 
                        value={formData.startTime} 
                        onChange={handleInputChange} 
                        className="w-full p-2.5 text-xs border rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold" 
                      />
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาสิ้นสุด</label>
                      <input 
                        type="time" 
                        name="endTime" 
                        value={formData.endTime} 
                        onChange={handleInputChange} 
                        className="w-full p-2.5 text-xs border rounded-xl bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold" 
                      />
                    </div>
                  </div>
                </section>

                {/* รายชื่อผู้มอบหมายและทีมช่างหน้างาน */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                      <circle cx="9" cy="7" r="4" />
                    </svg>
                    <span>ทีมวิศวกรรมผู้ปฏิบัติงาน</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้มอบหมายงาน</label>
                    <input 
                      list="assigners" 
                      name="assigner" 
                      value={formData.assigner} 
                      onChange={handleInputChange} 
                      className="w-full p-2.5 text-xs border rounded-xl bg-slate-50/50 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold"
                    />
                    <datalist id="assigners">
                      {assignerList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงานร่วมทีม (พิมพ์เพิ่มและเลือกชื่อได้ 4 คน)</label>
                    <div className="grid grid-cols-2 gap-2">
                      {[1, 2, 3, 4].map(num => (
                        <input 
                          key={num}
                          list="operators" 
                          name={`operator${num}`} 
                          value={formData[`operator${num}`]} 
                          onChange={handleInputChange}
                          placeholder={`คนที่ ${num} ${num === 1 ? '*' : ''}`}
                          className="w-full p-2 text-xs border rounded-xl bg-white outline-none font-semibold focus:ring-2 focus:ring-blue-500"
                        />
                      ))}
                    </div>
                    <datalist id="operators">
                      {operatorList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>
                </section>

                {/* รายการตรวจรายจุดแบบสลับแท็บเพื่อประหยัดพื้นที่มือถือ */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center justify-between border-b pb-2">
                    <span className="text-blue-800 font-bold text-xs flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-1.5 text-blue-600">
                        <path d="M9 11l3 3L22 4" />
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11" />
                      </svg>
                      รายการตรวจสอบรายจุด
                    </span>
                    
                    {/* ปุ่มสลับแท็บตรวจฝั่งขาเข้า / ฝั่งขาออก เพื่อใช้งานง่ายด้วยนิ้วสัมผัส */}
                    <div className="flex bg-slate-100 p-0.5 rounded-lg border text-[11px] font-bold">
                      <button type="button" onClick={() => setActiveTab("INBOUND")} className={`px-2.5 py-1 rounded-md transition-all ${activeTab === "INBOUND" ? "bg-blue-600 text-white shadow-sm" : "text-slate-500"}`}>ฝั่งขาเข้า</button>
                      <button type="button" onClick={() => setActiveTab("OUTBOUND")} className={`px-2.5 py-1 rounded-md transition-all ${activeTab === "OUTBOUND" ? "bg-blue-600 text-white shadow-sm" : "text-slate-500"}`}>ฝั่งขาออก</button>
                    </div>
                  </div>

                  {/* ลูปเรนเดอร์คำถาม 8 ข้อมาตรฐาน */}
                  <div className="space-y-3.5">
                    {defaultChecklist.map((item) => {
                      const prefix = activeTab === "INBOUND" ? "in_" : "out_";
                      const currentKey = `${prefix}${item.id}`;
                      const currentValue = checks[currentKey];
                      const options = item.type === "clean" ? ["เรียบร้อย", "ไม่เรียบร้อย"] : ["ปกติ", "ผิดปกติ"];

                      return (
                        <div key={item.id} className="p-3 bg-slate-50 rounded-2xl border border-slate-100 space-y-2 text-xs">
                          <div className="flex justify-between items-start">
                            <div>
                              <span className="font-bold text-slate-800">{item.id}. {item.text}</span>
                              <p className="text-[10px] text-slate-400 font-medium">{item.sub}</p>
                            </div>
                            {item.imp && <span className="bg-red-50 text-red-600 text-[9px] px-1.5 py-0.5 rounded font-black border border-red-200">สำคัญมาก</span>}
                          </div>

                          <div className="grid grid-cols-2 gap-2 pt-1">
                            {options.map(opt => {
                              const isChecked = currentValue === opt;
                              const isBad = opt === "ผิดปกติ" || opt === "ไม่เรียบร้อย";
                              return (
                                <label 
                                  key={opt} 
                                  className={`flex items-center justify-center p-2.5 border rounded-xl cursor-pointer text-xs font-bold transition-all shadow-sm select-none ${isChecked ? (isBad ? 'bg-red-500 text-white border-red-600' : 'bg-blue-600 text-white border-blue-700') : 'bg-white text-slate-600 border-slate-200'}`}
                                >
                                  <input 
                                    type="radio" 
                                    name={currentKey} 
                                    value={opt} 
                                    checked={isChecked} 
                                    onChange={() => handleRadioChange(currentKey, opt)} 
                                    className="hidden" 
                                  />
                                  <span>{opt === "ปกติ" || opt === "เรียบร้อย" ? "🟢 " : "🔴 "}{opt}</span>
                                </label>
                              );
                            })}
                          </div>
                        </div>
                      );
                    })}

                    {/* เรนเดอร์หัวข้อพิเศษที่คุณเกรียงศักดิ์สั่งเพิ่มขยายทีหลัง */}
                    {customItems.map((cItem) => {
                      const prefix = activeTab === "INBOUND" ? "custom_in_" : "custom_out_";
                      const currentKey = `${prefix}${cItem.id}`;
                      const currentValue = checks[currentKey];

                      return (
                        <div key={cItem.id} className="p-3 bg-teal-50/60 rounded-2xl border border-teal-100 space-y-2 text-xs animate-fadeIn">
                          <div className="flex justify-between items-center">
                            <span className="font-bold text-slate-800">➕ {cItem.text}</span>
                            <button type="button" onClick={() => removeCustomItem(cItem.id)} className="text-red-500 font-bold text-[10px]">ลบออก 🗑️</button>
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            {["ปกติ", "ผิดปกติ"].map(opt => (
                              <label key={opt} className={`flex items-center justify-center p-2 border rounded-xl cursor-pointer text-xs font-bold shadow-sm ${currentValue === opt ? (opt === 'ผิดปกติ'?'bg-red-500 text-white':'bg-teal-600 text-white') : 'bg-white text-slate-600 border-slate-200'}`}>
                                <input type="radio" name={currentKey} value={opt} checked={currentValue === opt} onChange={() => handleRadioChange(currentKey, opt)} className="hidden" />
                                <span>{opt}</span>
                              </label>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </section>

                {/* กล่องเพิ่มรายการตรวจภายหลัง */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-3">
                  <span className="text-blue-800 font-bold text-xs flex items-center border-b pb-1">
                    ➕ พิมพ์เพิ่มหัวข้อตรวจสอบหน้างานภายหลัง
                  </span>
                  <div className="flex space-x-2">
                    <input 
                      type="text" 
                      placeholder="เช่น แบตเตอรี่สำรองไฟป้อม..." 
                      value={newCustomText} 
                      onChange={(e) => setNewCustomText(e.target.value)} 
                      className="flex-1 px-3 py-2 text-xs border rounded-xl outline-none bg-white focus:ring-1 focus:ring-blue-500" 
                    />
                    <button type="button" onClick={addCustomItem} className="px-4 py-2 bg-blue-600 text-white font-bold text-xs rounded-xl shadow-sm hover:bg-blue-700">เพิ่ม</button>
                  </div>
                </section>

                {/* ส่วนสรุปผลการ PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-orange-600 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    </svg>
                    <span>สรุปผลการ PM ภาพรวม</span>
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <label className="flex items-center justify-center space-x-2 p-2.5 border rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 has-[:checked]:bg-green-500 has-[:checked]:text-white transition-all shadow-sm">
                      <input 
                        type="radio" 
                        name="overallStatus" 
                        value="ปกติ"
                        checked={formData.overallStatus === "ปกติ"}
                        onChange={() => setFormData(p => ({ ...p, overallStatus: "ปกติ" }))}
                        className="hidden" 
                      />
                      <span>🟢 เรียบร้อย / ปกติ</span>
                    </label>

                    <label className="flex items-center justify-center space-x-2 p-2.5 border rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 has-[:checked]:bg-red-500 has-[:checked]:text-white transition-all shadow-sm">
                      <input 
                        type="radio" 
                        name="overallStatus" 
                        value="ไม่ปกติ"
                        checked={formData.overallStatus === "ไม่ปกติ"}
                        onChange={() => setFormData(p => ({ ...p, overallStatus: "ไม่ปกติ" }))}
                        className="hidden" 
                      />
                      <span>🔴 พบจุดผิดปกติ</span>
                    </label>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-1 font-bold">บันทึกรายละเอียดสรุปอาการ / ปัญหา / หมายเหตุ</label>
                    <textarea 
                      name="summaryText" 
                      value={formData.summaryText} 
                      onChange={handleInputChange}
                      rows="3" 
                      className="w-full p-3 border rounded-xl text-xs outline-none focus:ring-2 focus:ring-blue-500 text-slate-700"
                      placeholder="ระบุสิ่งที่แก้ไข หรือจุดขัดข้องเพิ่มเติม..."
                    ></textarea>
                  </div>
                </section>

                {/* หน้าสุดท้ายยืนยันการส่งข้อมูล */}
                <div className="bg-white p-3.5 rounded-3xl shadow-sm border border-slate-100">
                  <button 
                    type="submit" 
                    disabled={isSubmitting}
                    className={`w-full py-4 rounded-xl font-bold text-sm text-white shadow-md flex justify-center items-center transition-all ${isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-blue-600 hover:bg-blue-700 active:scale-95'}`}
                  >
                    {isSubmitting ? (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin mr-2 w-4 h-4"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line></svg>
                        กำลังอัปโหลดรายงานเข้าคลาวด์ชีต...
                      </span>
                    ) : (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-2">
                          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        </svg>
                        <span>ยืนยันส่งรายงานไม้กั้นรถยนต์</span>
                      </span>
                    )}
                  </button>
                </div>

              </form>
            </main>
          </div>

          <footer className="text-center text-[10px] text-slate-400 font-medium my-4">
            <p>© 2026 CP ALL DC MAHACHAI ENGINEERING DEPARTMENT</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
