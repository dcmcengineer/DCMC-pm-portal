<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์ - หม้อแปลงไฟฟ้า</title>
  
  <!-- Tailwind CSS for Premium Web App Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDN for Interactive Mobile View -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Anuphan', sans-serif;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ลิงก์ Google Apps Script Web App (เชื่อมตรงเข้ากับ Sheet ID ของหม้อแปลงไฟฟ้า)
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzc3CukDAOzDIBDpRE__1RUFFOLvPQopfknNcGnILcp0BtXwXuKWZU47JvZnuCCxPoM/exec";

    // รายการตรวจสอบประจำเดือน (M) และประจำปี (Y) สำหรับหม้อแปลงไฟฟ้า
    const defaultChecklistItems = [
      // รายการบำรุงรักษาประจำเดือน (M)
      { id: 1, text: "ลำดับที่ 1: ทำความสะอาดรอบๆ บริเวณใต้หม้อแปลง", value: "ปกติ", required: true, type: "status" },
      { id: 2, text: "ลำดับที่ 2: ตรวจอุปกรณ์วัดอุณหภูมิภายในตัวหม้อแปลง (วัดค่าด้วยเทอร์โมสแกน)", value: "", required: true, type: "input", placeholder: "ระบุอุณหภูมิที่วัดได้ (°C)" },
      { id: 3, text: "ลำดับที่ 3: ตรวจอุปกรณ์ระบายความร้อน", value: "ปกติ", required: true, type: "status" },
      { id: 4, text: "ลำดับที่ 4: ตรวจระดับน้ำมัน อยู่ในเกณฑ์", value: "ปกติ", required: true, type: "status" },
      { id: 5, text: "ลำดับที่ 5: ตรวจเช็คสภาพ Drop Fuse ทั้งหมด", value: "ปกติ", required: true, type: "status" },
      { id: 6, text: "ลำดับที่ 6: ตรวจถ้วยลูกแรงสูง และแรงต่ำ (วัดค่าด้วยเทอร์โมสแกน)", value: "ปกติ", required: true, type: "status" },
      
      // รายการบำรุงรักษาประจำปี (Y) - ไม่บังคับกรอก (ข้ามได้)
      { id: 7, text: "ลำดับที่ 7: ตรวจและขันอัดสกรูขั้วต่อสายแรงสูง, แรงต่ำ และสายดิน", value: "ยังไม่ได้ทำ", required: false, type: "status_annual" },
      { id: 8, text: "ลำดับที่ 8: ทดสอบความคล่องตัวของตัวเปลี่ยนจุดแยกแรงดัน (TAP)", value: "ยังไม่ได้ทำ", required: false, type: "status_annual" },
      { id: 9, text: "ลำดับที่ 9: ตรวจการรั่วซึมของตัวเปลี่ยนจุดแยกแรงดัน (TAP)", value: "ยังไม่ได้ทำ", required: false, type: "status_annual" },
      { id: 10, text: "ลำดับที่ 10: การรั่วซึมซีลยางฝาถัง", value: "ยังไม่ได้ทำ", required: false, type: "leak_annual" },
      { id: 11, text: "ลำดับที่ 11: การรั่วซึมซีลยางลูกถ้วยแรงสูง - แรงต่ำ", value: "ยังไม่ได้ทำ", required: false, type: "leak_annual" },
      { id: 12, text: "ลำดับที่ 12: การรั่วซึมประตูน้ำมัน", value: "ยังไม่ได้ทำ", required: false, type: "leak_annual" },
      { id: 13, text: "ลำดับที่ 13: การรั่วซึมรอยเชื่อมตัวถัง", value: "ยังไม่ได้ทำ", required: false, type: "leak_annual" },
      { id: 14, text: "ลำดับที่ 14: การรั่วซึมรอยเชื่อมครีบระบายความร้อน", value: "ยังไม่ได้ทำ", required: false, type: "leak_annual" },
      { id: 15, text: "ลำดับที่ 15: เปลี่ยนสารกรองความชื้น", value: "ยังไม่ได้ทำ", required: false, type: "change_annual" },
      { id: 16, text: "ลำดับที่ 16: ตรวจสอบสภาพน้ำมันหม้อแปลงและทดสอบสภาพความเป็นฉนวนไฟฟ้า", value: "ยังไม่ได้ทำ", required: false, type: "test_annual" }
    ];

    function App() {
      const assignerList = ["เกรียงศักดิ์", "ณรงค์", "รัฐชานนท์"];
      const operatorList = ["ณรงค์", "รัฐชานนท์", "บัญชา", "วสุพล", "ศรายุทธ", "พิพัฒน์", "ศรราม เอี่ยมอาจ", "วงศธร", "เกรียงศักดิ์"];

      // --- State สำหรับข้อมูลแบบฟอร์มเอกสารหลัก ---
      const [formData, setFormData] = useState({
        assigner: "เกรียงศักดิ์", 
        operator1: "",
        operator2: "",
        operator3: "",
        operator4: "",
        pmDate: new Date().toISOString().split('T')[0],
        startTime: "",
        endTime: "",
        summaryText: "",
        overallStatus: "ปกติ",
      });

      // --- State สำหรับรายการข้อตรวจสอบ ( Checklist ) ---
      const [checklist, setChecklist] = useState(() => {
        const saved = localStorage.getItem("pm_transformer_checklist");
        return saved ? JSON.parse(saved) : defaultChecklistItems;
      });

      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null); // 'success', 'error'
      const [customError, setCustomError] = useState("");
      const [searchTerm, setSearchTerm] = useState("");

      // --- State สำหรับหน้าต่างตั้งค่าจัดการ Checklist ยืดหยุ่น ---
      const [isManageModalOpen, setIsManageModalOpen] = useState(false);
      const [editableItems, setEditableItems] = useState([]);
      const [newItemText, setNewItemText] = useState("");
      const [newItemRequired, setNewItemRequired] = useState(true);
      const [newItemType, setNewItemType] = useState("status");

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleCheckChange = (id, value) => {
        setChecklist(prev => prev.map(item => 
          item.id === id ? { ...item, value: value } : item
        ));
      };

      const handleInputCheckChange = (id, value) => {
        setChecklist(prev => prev.map(item => 
          item.id === id ? { ...item, value: value } : item
        ));
      };

      const setAllAnswers = (targetValue) => {
        setChecklist(prev => prev.map(item => {
          if (item.type === "status" || item.type === "status_annual") {
            return { ...item, value: targetValue };
          }
          if (item.type === "leak_annual") {
            return { ...item, value: "ไม่รั่วซึม" };
          }
          return item;
        }));
      };

      // --- เปิดปิดหน้าต่างตั้งค่าจัดการรายการเช็คย่อยเพิ่มเติม ---
      const openManageModal = () => {
        setEditableItems(checklist.map(c => ({ ...c })));
        setNewItemText("");
        setIsManageModalOpen(true);
      };

      const handleAddItem = (e) => {
        e.preventDefault();
        if (!newItemText.trim()) return;
        const nextId = editableItems.length > 0 
          ? Math.max(...editableItems.map(c => c.id)) + 1 
          : 1;
        setEditableItems([...editableItems, {
          id: nextId,
          text: `ลำดับที่ ${nextId}: ${newItemText.trim()}`,
          value: newItemType === "status" ? "ปกติ" : newItemType === "status_annual" ? "ยังไม่ได้ทำ" : "",
          required: newItemRequired,
          type: newItemType
        }]);
        setNewItemText("");
      };

      const handleRemoveItem = (id) => {
        const filtered = editableItems.filter(c => c.id !== id);
        const reordered = filtered.map((item, idx) => {
          const cleanedText = item.text.replace(/^ลำดับที่ \d+:\s*/, "");
          return {
            ...item,
            text: `ลำดับที่ ${idx + 1}: ${cleanedText}`
          };
        });
        setEditableItems(reordered);
      };

      const handleEditItemText = (id, newText) => {
        setEditableItems(editableItems.map(c => 
          c.id === id ? { ...c, text: newText } : c
        ));
      };

      const saveChecklistSettings = () => {
        setChecklist(editableItems);
        localStorage.setItem("pm_transformer_checklist", JSON.stringify(editableItems));
        setIsManageModalOpen(false);
      };

      // --- บันทึกส่งข้อมูลใบงานเข้ากูเกิลชีตส่วนกลาง ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        // ตรวจสอบความถูกต้องของข้อมูลเวลา
        if (!formData.startTime || !formData.endTime) {
          setCustomError("กรุณาระบุ 'เวลาเริ่ม' และ 'เวลาสิ้นสุด' เพื่อความถูกต้องของใบรายงาน");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        // ตรวจสอบว่าเลือกช่างเทคนิคซ่อมบำรุงมาอย่างน้อย 1 คน
        if (!formData.operator1 && !formData.operator2 && !formData.operator3 && !formData.operator4) {
          setCustomError("กรุณาระบุรายชื่อช่าง 'ผู้ปฏิบัติงาน' ร่วมทีมอย่างน้อย 1 คน");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        // ตรวจสอบข้อมูลวัดอุณหภูมิในตู้ (ลำดับที่ 2)
        const tempItem = checklist.find(c => c.id === 2);
        if (tempItem && tempItem.value === "") {
          setCustomError("กรุณากรอกข้อมูล 'อุณหภูมิภายในตัวหม้อแปลง' ในลำดับที่ 2");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        setIsSubmitting(true);

        const payload = {
          action: "saveCanteenDrain", // ฟังก์ชันหลักที่หลังบ้านสามารถใช้รับค่าได้โดยตรง
          timestamp: new Date().toLocaleString('th-TH'),
          ...formData,
          checklist: checklist
        };

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: "smooth" });

          // คืนค่าฟิลด์หลักให้พร้อมทำงานรอบถัดไป
          setFormData(prev => ({
            ...prev,
            operator1: "", operator2: "", operator3: "", operator4: "",
            startTime: "", endTime: "", summaryText: "", overallStatus: "ปกติ"
          }));
          setChecklist(defaultChecklistItems);

        } catch (error) {
          console.error("Submit Error:", error);
          setSubmitStatus('error');
          setCustomError("ไม่สามารถซิงก์ข้อมูลไปที่เซิร์ฟเวอร์กูเกิลได้ชั่วคราว กรุณาตรวจสอบอินเทอร์เน็ตหน้างาน");
          window.scrollTo({ top: 0, behavior: "smooth" });
        } finally {
          setIsSubmitting(false);
        }
      };

      const filteredChecklist = checklist.filter(item => 
        item.text.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
          
          <div>
            {/* Header คลีนพรีเมียม สเปก บริษัท ซีพีออลล์ จำกัด (มหาชน) */}
            <header className="bg-white shadow-sm border-b-4 border-green-600 sticky top-0 z-30">
              <div className="p-4">
                <div className="flex items-center justify-between">
                  <span className="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded">CP ALL</span>
                  <span className="text-[10px] text-slate-400 font-bold flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3 h-3 mr-1 text-slate-400">
                      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                      <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                    ระบบมือถือหน้างาน
                  </span>
                </div>
                <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
                <h2 className="text-xs font-bold text-slate-600 mt-0.5 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 mr-1.5 w-3 h-3">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                  Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์
                </h2>
                
                <div className="grid grid-cols-3 gap-1 mt-2.5 pt-2 border-t border-slate-100 text-[10px] text-slate-500 font-semibold">
                  <div>รหัส: <span className="text-slate-800 font-bold">B3-FM-10-01-06</span></div>
                  <div className="text-center">ปรับปรุงครั้งที่: <span className="text-slate-800 font-bold">0</span></div>
                  <div className="text-right">ประกาศใช้: <span className="text-slate-800 font-bold">1 เม.ย. 2560</span></div>
                </div>
              </div>
            </header>

            {/* ส่วนแสดงผลหลัก (Main Content) */}
            <main className="p-4 space-y-5 animate-fadeIn">
              
              {/* ส่วนหัวเตือนบันทึกผลสำเร็จ/ไม่สำเร็จ */}
              {submitStatus === 'success' && (
                <div className="bg-green-100 border-2 border-green-400 text-green-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">บันทึกส่งข้อมูลสำเร็จ!</p>
                    <p className="text-xs mt-0.5 font-semibold">ส่งผลรายงานใบงาน PM หม้อแปลงเข้าฐานข้อมูล Google Sheet เรียบร้อยแล้ว</p>
                  </div>
                </div>
              )}

              {customError && (
                <div className="bg-red-100 border-2 border-red-400 text-red-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">การกรอกข้อมูลไม่ถูกต้อง</p>
                    <p className="text-xs mt-0.5 font-bold leading-relaxed">{customError}</p>
                  </div>
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-5">
                
                {/* 1. ส่วนข้อมูลสเปกจุด PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-green-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>ข้อมูลงานตรวจเช็คหลัก</span>
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <span className="text-slate-400 font-semibold">เครื่องจักร/อุปกรณ์</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">หม้อแปลง</p>
                    </div>
                    <div>
                      <span className="text-slate-400 font-semibold">ความถี่แผนงาน</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">รอบประจำเดือน</p>
                    </div>
                  </div>

                  <div>
                    <span className="text-xs text-slate-400 font-semibold">สถานที่ปฏิบัติการ</span>
                    <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3 h-3 shrink-0">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                      </svg>
                      ห้อง MDB
                    </p>
                  </div>

                  {/* วันที่ทำ PM */}
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">วันที่ทำ PM</label>
                    <div className="flex items-center border rounded-xl px-3 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3.5 h-3.5">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                      </svg>
                      <input 
                        type="date" 
                        name="pmDate" 
                        value={formData.pmDate} 
                        onChange={handleInputChange} 
                        required 
                        className="w-full py-1.5 text-xs outline-none bg-transparent font-bold" 
                      />
                    </div>
                  </div>

                  {/* เวลาปฏิบัติงาน */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาเริ่ม</label>
                      <div className="flex items-center border rounded-xl px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3 h-3 shrink-0">
                          <circle cx="12" cy="12" r="10" />
                          <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input 
                          type="time" 
                          name="startTime" 
                          value={formData.startTime} 
                          onChange={handleInputChange} 
                          className="w-full py-1.5 text-xs outline-none bg-transparent" 
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาสิ้นสุด</label>
                      <div className="flex items-center border rounded-xl px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3 h-3 shrink-0">
                          <circle cx="12" cy="12" r="10" />
                          <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input 
                          type="time" 
                          name="endTime" 
                          value={formData.endTime} 
                          onChange={handleInputChange} 
                          className="w-full py-1.5 text-xs outline-none bg-transparent" 
                        />
                      </div>
                    </div>
                  </div>
                </section>

                {/* 2. ทีมช่างและผู้ปฏิบัติการซ่อมบำรุง */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                      <circle cx="9" cy="7" r="4" />
                      <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                      <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span>ทีมงานที่ปฏิบัติการ</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้มอบหมายงาน</label>
                    <input 
                      list="assigners" 
                      name="assigner" 
                      value={formData.assigner} 
                      onChange={handleInputChange} 
                      placeholder="พิมพ์หรือค้นหาชื่อผู้มอบหมาย..."
                      className="w-full p-2 text-xs border rounded-xl bg-slate-50/30 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold"
                    />
                    <datalist id="assigners">
                      {assignerList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงาน (ใส่ได้สูงสุด 4 คน)</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1, 2, 3, 4].map(num => (
                        <div key={num} className="flex items-center border rounded-xl px-2 bg-white focus-within:ring-2 focus-within:ring-blue-500">
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-1.5 w-3 h-3 shrink-0">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                          </svg>
                          <input 
                            list="operators" 
                            name={`operator${num}`} 
                            value={formData[`operator${num}`]} 
                            onChange={handleInputChange}
                            placeholder={`คนที่ ${num}`}
                            className="w-full py-2 text-xs outline-none bg-transparent font-semibold"
                          />
                        </div>
                      ))}
                    </div>
                    <datalist id="operators">
                      {operatorList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>
                </section>

                {/* 3. รายการตรวจเช็ค หม้อแปลงไฟฟ้า */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center justify-between border-b pb-2">
                    <div className="flex items-center text-teal-700 font-bold text-xs">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-1.5">
                        <rect x="3" y="3" width="18" height="18" rx="2" />
                        <path d="M9 12l2 2 4-4" />
                      </svg>
                      <span>รายการตรวจเช็ค ({checklist.length} จุด)</span>
                    </div>

                    <button
                      type="button"
                      onClick={openManageModal}
                      className="flex items-center text-[10px] text-teal-600 bg-teal-50 border border-teal-100 px-2 py-0.5 rounded hover:bg-teal-100 font-bold transition-all"
                    >
                      ปรับเปลี่ยนคำถาม ⚙️
                    </button>
                  </div>

                  <div className="space-y-2">
                    <div className="flex items-center border rounded-xl px-3 py-1.5 bg-slate-50 text-xs focus-within:bg-white focus-within:ring-2 focus-within:ring-teal-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3.5 h-3.5 shrink-0">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                      </svg>
                      <input
                        type="text"
                        placeholder="สืบค้นชื่อหัวข้อตรวจสอบ..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        className="w-full bg-transparent outline-none py-0.5"
                      />
                      {searchTerm && (
                        <button type="button" onClick={() => setSearchTerm("")}>
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 hover:text-slate-600 w-3.5 h-3.5">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18"/>
                          </svg>
                        </button>
                      )}
                    </div>

                    <div className="flex justify-end space-x-1.5 text-[10px]">
                      <button 
                        type="button" 
                        onClick={() => setAllAnswers('ปกติ')} 
                        className="px-2 py-0.5 text-green-700 bg-green-50 hover:bg-green-100 border border-green-200 rounded font-bold transition-all"
                      >
                        ตอบ "ปกติ" ทั้งหมด
                      </button>
                    </div>
                  </div>

                  {/* สกรอลรายการคำถามเช็คชีต */}
                  <div className="space-y-3 max-h-[500px] overflow-y-auto pr-1 no-scrollbar pb-2">
                    {filteredChecklist.length === 0 ? (
                      <p className="text-center text-slate-400 text-xs py-10">ไม่พบหัวข้อตรวจสอบตามเงื่อนไข</p>
                    ) : (
                      filteredChecklist.map((item) => {
                        // แยกแยะ UI ตามประเภทของคำถามย่อยของหม้อแปลง
                        if (item.type === "input") {
                          // ลำดับที่ 2: ตรวจวัดอุณหภูมิหม้อแปลงไฟฟ้า
                          return (
                            <div key={item.id} className="p-3 bg-slate-50/80 rounded-xl border border-slate-100 shadow-sm space-y-2">
                              <p className="text-xs font-bold text-slate-800 leading-relaxed">
                                {item.text} <span className="text-red-500">*</span>
                              </p>
                              <div className="relative">
                                <input
                                  type="text"
                                  placeholder={item.placeholder}
                                  value={item.value}
                                  onChange={(e) => handleInputCheckChange(item.id, e.target.value)}
                                  className="w-full px-4 py-2.5 text-xs font-bold border rounded-lg bg-white outline-none focus:ring-1 focus:ring-teal-500"
                                  required={item.required}
                                />
                              </div>
                            </div>
                          );
                        }

                        const isAnnual = item.type.endsWith("_annual");

                        // กำหนดปุ่มเช็คบ็อกซ์ (Radio) ตามประเภท
                        let options = [
                          { label: "ปกติ", val: "ปกติ" },
                          { label: "ไม่ปกติ", val: "ไม่ปกติ" }
                        ];

                        if (item.type === "leak_annual") {
                          options = [
                            { label: "ไม่รั่วซึม", val: "ไม่รั่วซึม" },
                            { label: "รั่วซึม", val: "รั่วซึม" }
                          ];
                        } else if (item.type === "change_annual") {
                          options = [
                            { label: "เปลี่ยน", val: "เปลี่ยน" },
                            { label: "ไม่เปลี่ยน", val: "ไม่เปลี่ยน" }
                          ];
                        } else if (item.type === "test_annual") {
                          options = [
                            { label: "ทดสอบ", val: "ทดสอบ" },
                            { label: "ไม่ทดสอบ", val: "ไม่ทดสอบ" }
                          ];
                        }

                        return (
                          <div key={item.id} className={`p-3 rounded-xl border shadow-sm space-y-2 ${isAnnual ? 'bg-indigo-50/30 border-indigo-100' : 'bg-slate-50/80 border-slate-100'}`}>
                            <div className="flex justify-between items-start">
                              <p className="text-xs font-bold text-slate-800 leading-relaxed max-w-[80%]">
                                {item.text} {!isAnnual && <span className="text-red-500">*</span>}
                              </p>
                              {isAnnual && (
                                <span className="text-[8px] bg-indigo-100 text-indigo-700 px-1.5 py-0.5 rounded font-black tracking-wider uppercase shrink-0">
                                  ประจำปี (Y)
                                </span>
                              )}
                            </div>
                            
                            <div className="flex gap-2">
                              {options.map((opt, oIdx) => (
                                <label key={oIdx} className="flex-1 flex items-center justify-center space-x-1.5 p-2 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all select-none">
                                  <input 
                                    type="radio" 
                                    name={`check_${item.id}`} 
                                    value={opt.val}
                                    checked={item.value === opt.val}
                                    onChange={() => handleCheckChange(item.id, opt.val)}
                                    className="w-3.5 h-3.5 text-green-600 border-slate-300 focus:ring-green-500" 
                                  />
                                  <span>{opt.label}</span>
                                </label>
                              ))}

                              {isAnnual && (
                                <label className="flex-1 flex items-center justify-center space-x-1.5 p-2 border border-slate-200 rounded-lg cursor-pointer bg-white text-xs font-bold text-slate-600 hover:bg-slate-50 transition-all select-none">
                                  <input 
                                    type="radio" 
                                    name={`check_${item.id}`} 
                                    value="ยังไม่ได้ทำ"
                                    checked={item.value === "ยังไม่ได้ทำ"}
                                    onChange={() => handleCheckChange(item.id, "ยังไม่ได้ทำ")}
                                    className="w-3.5 h-3.5 text-slate-500 border-slate-300 focus:ring-slate-400" 
                                  />
                                  <span>ข้าม</span>
                                </label>
                              )}
                            </div>
                          </div>
                        );
                      })
                    )}
                  </div>
                </section>

                {/* 4. สรุปรายละเอียดผลการ PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-orange-600 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <line x1="16" y1="13" x2="8" y2="13"></line>
                      <line x1="16" y1="17" x2="8" y2="17"></line>
                      <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>สรุปผลการ PM</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-2 font-bold">สรุปผลภาพรวม</label>
                    <div className="flex gap-2">
                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ปกติ"
                          checked={formData.overallStatus === "ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ปกติ" }))}
                          className="w-3.5 h-3.5 text-green-600 border-slate-300 focus:ring-green-500" 
                        />
                        <span>🟢 ปกติ</span>
                      </label>

                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ไม่ปกติ"
                          checked={formData.overallStatus === "ไม่ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ไม่ปกติ" }))}
                          className="w-3.5 h-3.5 text-red-600 border-slate-300 focus:ring-red-500" 
                        />
                        <span>🔴 พบจุดไม่ปกติ</span>
                      </label>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-1 font-bold">สรุปรายละเอียดเพิ่มเติม / รายการที่ต้องติดตามผล</label>
                    <textarea 
                      name="summaryText" 
                      value={formData.summaryText} 
                      onChange={handleInputChange}
                      rows="3" 
                      className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-xs"
                      placeholder="ระบุข้อความสรุปอาการ หรือสิ่งที่ได้ทำการบำรุงรักษาไป..."
                    ></textarea>
                  </div>
                </section>

                {/* 5. ปุ่มสำหรับกดยืนยันการส่งข้อมูล */}
                <div className="bg-white p-3.5 rounded-3xl shadow-sm border border-slate-100">
                  <button 
                    type="submit" 
                    disabled={isSubmitting}
                    className={`w-full py-3.5 rounded-xl font-bold text-sm text-white shadow-md flex justify-center items-center transition-all ${isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 active:scale-95'}`}
                  >
                    {isSubmitting ? (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin mr-2 w-4 h-4">
                          <polyline points="23 4 23 10 17 10" />
                          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                        </svg>
                        กำลังตรวจสอบและส่งรายงานหม้อแปลง...
                      </span>
                    ) : (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                          <polyline points="17 21 17 13 7 13 7 21" />
                          <polyline points="7 3 7 8 15 8" />
                        </svg>
                        <span>ยืนยันส่งรายงานหม้อแปลงเข้าคลาวด์ Sheets</span>
                      </span>
                    )}
                  </button>
                </div>

              </form>
            </main>
          </div>

          <footer className="text-center text-[10px] text-slate-400 font-medium my-4">
            <p>© 2026 CP ALL DC MAHACHAI ENGINEERING DEPARTMENT</p>
          </footer>

          {/* POPUP สำหรับการตั้งค่าแก้ไขรายการเช็คชี้ตย่อย */}
          {isManageModalOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full max-w-sm max-h-[80vh] flex flex-col shadow-2xl overflow-hidden">
                <div className="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center">
                  <div>
                    <h3 className="font-bold text-slate-800 text-xs">แก้ไขรายการข้อตรวจสอบหม้อแปลง</h3>
                    <p className="text-[9px] text-slate-500">สามารถเพิ่ม ลบ และอัปเดตคำถามเช็คชีตได้ตามแผนหน้างาน</p>
                  </div>
                  <button type="button" onClick={() => setIsManageModalOpen(false)}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 w-5 h-5">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>

                <form onSubmit={handleAddItem} className="p-3 border-b bg-slate-50 flex flex-col space-y-2">
                  <div className="flex space-x-2">
                    <input
                      type="text"
                      placeholder="พิมพ์ชื่อหัวข้อตรวจสอบใหม่..."
                      value={newItemText}
                      onChange={(e) => setNewItemText(e.target.value)}
                      className="flex-1 px-3 py-2 text-xs border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none bg-white"
                    />
                    <button type="submit" className="px-3.5 py-2 bg-teal-600 text-white text-xs font-bold rounded-lg flex items-center">
                      เพิ่ม
                    </button>
                  </div>
                  <div className="flex gap-2 items-center justify-between text-[10px] text-slate-500">
                    <label className="flex items-center space-x-1">
                      <input type="checkbox" checked={newItemRequired} onChange={(e) => setNewItemRequired(e.target.checked)} />
                      <span>บังคับกรอก</span>
                    </label>
                    <div className="flex gap-1">
                      <button type="button" onClick={() => setNewItemType("status")} className={`px-2 py-0.5 rounded ${newItemType === "status" ? "bg-teal-100 text-teal-800 font-bold" : "bg-slate-100"}`}>รายเดือน</button>
                      <button type="button" onClick={() => setNewItemType("status_annual")} className={`px-2 py-0.5 rounded ${newItemType === "status_annual" ? "bg-indigo-100 text-indigo-800 font-bold" : "bg-slate-100"}`}>ประจำปี</button>
                    </div>
                  </div>
                </form>

                <div className="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar">
                  {editableItems.map((item, idx) => (
                    <div key={item.id} className="flex items-center space-x-2 bg-slate-50 p-2 rounded-lg border">
                      <span className="text-[10px] font-bold text-slate-400 w-6 text-center">#{idx + 1}</span>
                      <input
                        type="text"
                        value={item.text}
                        onChange={(e) => handleEditItemText(item.id, e.target.value)}
                        className="flex-1 bg-white border border-slate-200 rounded px-2.5 py-1 text-xs outline-none"
                      />
                      <button type="button" onClick={() => handleRemoveItem(item.id)} className="p-1 hover:text-red-500 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4">
                          <polyline points="3 6 5 6 21 6" />
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                      </button>
                    </div>
                  ))}
                </div>

                <div className="bg-slate-100 p-3 flex justify-end space-x-2 border-t">
                  <button type="button" onClick={() => setIsManageModalOpen(false)} className="px-3 py-2 text-xs text-slate-500 font-bold">
                    ยกเลิก
                  </button>
                  <button type="button" onClick={saveChecklistSettings} className="px-4 py-2 bg-green-600 text-white text-xs font-bold rounded-lg shadow-sm">
                    บันทึกทั้งหมด
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
