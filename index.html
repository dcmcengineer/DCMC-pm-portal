    // โครงสร้างดักจับข้อผิดพลาดการเขียน/อ่าน LocalStorage
    const safeLocalStorage = {
      getItem: (key, defaultValue = "") => {
        try {
          const val = localStorage.getItem(key);
          return val !== null ? val : defaultValue;
        } catch (e) {
          console.warn("การดึงข้อมูลจาก LocalStorage ถูกบล็อกโดยระบบรักษาความปลอดภัยเบราว์เซอร์:", e);
          return defaultValue;
        }
      },
      setItem: (key, value) => {
        try {
          localStorage.setItem(key, value);
        } catch (e) {
          console.warn("การจัดเก็บข้อมูลลง LocalStorage ถูกปฏิเสธสิทธิ์:", e);
        }
      },
      removeItem: (key) => {
        try {
          localStorage.removeItem(key);
        } catch (e) {
          console.warn("การลบข้อมูลใน LocalStorage ถูกปฏิเสธสิทธิ์:", e);
        }
      }
    };

    function App() {

      // ดึงข้อมูลรายชื่อพนักงานแบบ Dynamic
      const [users, setUsers] = useState(() => {
        const saved = safeLocalStorage.getItem("cpall_pm_users");
        try {
          return saved && saved !== "undefined" && saved !== "" ? JSON.parse(saved) : initialUsersList;
        } catch (e) {
          return initialUsersList;
        }
      });

      const [currentUser, setCurrentUser] = useState(() => {
        const saved = safeLocalStorage.getItem("cpall_pm_current_user");
        try {
          return saved && saved !== "undefined" && saved !== "" ? JSON.parse(saved) : null;
        } catch (e) {
          console.error("ข้อผิดพลาดในการตรวจสอบประวัติผู้ใช้งาน:", e);
          return null;
        }
      });

      const [loginInput, setLoginInput] = useState("");
      const [loginError, setLoginError] = useState("");

      const [machines, setMachines] = useState(() => {
        const saved = safeLocalStorage.getItem("cpall_pm_machines");
        try {
          return saved && saved !== "undefined" && saved !== "" ? JSON.parse(saved) : initialMachines;
        } catch (e) {
          return initialMachines;
        }
      });

      const [plans, setPlans] = useState(() => {
        const saved = safeLocalStorage.getItem("cpall_pm_plans");
        try {
          return saved && saved !== "undefined" && saved !== "" ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      const [eventLogs, setEventLogs] = useState(() => {
        const saved = safeLocalStorage.getItem("cpall_pm_event_logs");
        try {
          return saved && saved !== "undefined" && saved !== "" ? JSON.parse(saved) : [];
        } catch (e) {
          return [];
        }
      });

      const [sheetWebAppUrl, setSheetWebAppUrl] = useState(() => {
        return safeLocalStorage.getItem("cpall_pm_sheet_url") || "";
      });

      const [currentTab, setCurrentTab] = useState("daily");
      const [filterDate, setFilterDate] = useState(new Date().toISOString().split('T')[0]);
      const [filterShift, setFilterShift] = useState("ทั้งหมด");

      const [planningMonth, setPlanningMonth] = useState(() => {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
      });

      // คุมการแสดงผลหน้าต่างโมดอลต่างๆ
      const [isAddMachineOpen, setIsAddMachineOpen] = useState(false);
      const [isConfirmPmOpen, setIsConfirmPmOpen] = useState(false);
      const [selectedPmJob, setSelectedPmJob] = useState(null);

      // โมดอลยืนยันการลบเครื่องจักร, ล้างประวัติ และ ออกจากระบบ
      const [isLogoutConfirmOpen, setIsLogoutConfirmOpen] = useState(false);
      const [isDeleteConfirmOpen, setIsDeleteConfirmOpen] = useState(false);
      const [machineToDelete, setMachineToDelete] = useState(null);
      const [isClearLogsConfirmOpen, setIsClearLogsConfirmOpen] = useState(false);

      // โมดอลสำหรับแก้ไขเครื่องจักรหลัก
      const [isEditMachineOpen, setIsEditMachineOpen] = useState(false);
      const [editingMachine, setEditingMachine] = useState(null);

      // โมดอลและ State จัดการผู้ใช้งานสำหรับ Admin เท่านั้น
      const [isUserModalOpen, setIsUserModalOpen] = useState(false);
      const [userFormMode, setUserFormMode] = useState("add"); // add, edit
      const [userForm, setUserForm] = useState({ id: "", name: "", role: "user" });
      const [isUserDeleteConfirmOpen, setIsUserDeleteConfirmOpen] = useState(false);
      const [userToDelete, setUserToDelete] = useState(null);

      // ฟอร์มเพิ่มเครื่องจักร
      const [newMcName, setNewMcName] = useState("");
      const [newMcDay, setNewMcDay] = useState(1);
      const [newMcShift, setNewMcShift] = useState("กลางวัน");
      const [newMcRank, setNewMcRank] = useState("B");
      const [newMcType, setNewMcType] = useState("ไฟฟ้า/เครื่องจักร");
      const [newMcUrl, setNewMcUrl] = useState("");

      // ฟอร์ม Event PM
      const [pmReporter, setPmReporter] = useState(currentUser?.name || "");
      const [pmOperators, setPmOperators] = useState([]);

      // ตัวช่วยคำนวณระดับสิทธิ์พนักงาน
      const userPermissions = useMemo(() => {
        if (!currentUser) return { canManagePlans: false, canEditMachines: false, label: "" };
        const role = currentUser.role;
        return {
          canManagePlans: role === "admin" || role === "power_user", // ทั้ง Admin และ Power User จัดการแผนได้
          canEditMachines: role === "admin", // เฉพาะคุณ เกรียงศักดิ์ (Admin) เท่านั้นที่เพิ่ม/ลบ/แก้ไขเครื่องจักรหลักได้
          label: role === "admin" ? "ผู้ดูแลระบบ (Admin)" : role === "power_user" ? "หัวหน้าหน่วย (Power User)" : "ผู้ใช้งานทั่วไป"
        };
      }, [currentUser]);

      // อัปเดต LocalStorage อย่างถูกต้องและปลอดภัย
      useEffect(() => {
        safeLocalStorage.setItem("cpall_pm_users", JSON.stringify(users));
      }, [users]);

      useEffect(() => {
        if (currentUser) {
          safeLocalStorage.setItem("cpall_pm_current_user", JSON.stringify(currentUser));
          setPmReporter(currentUser.name);
        } else {
          safeLocalStorage.removeItem("cpall_pm_current_user");
        }
      }, [currentUser]);

      useEffect(() => {
        safeLocalStorage.setItem("cpall_pm_machines", JSON.stringify(machines));
      }, [machines]);

      useEffect(() => {
        safeLocalStorage.setItem("cpall_pm_plans", JSON.stringify(plans));
      }, [plans]);

      useEffect(() => {
        safeLocalStorage.setItem("cpall_pm_event_logs", JSON.stringify(eventLogs));
      }, [eventLogs]);

      useEffect(() => {
        safeLocalStorage.setItem("cpall_pm_sheet_url", sheetWebAppUrl);
      }, [sheetWebAppUrl]);

      const currentDayOfMonth = useMemo(() => {
        const d = new Date(filterDate);
        return d.getDate();
      }, [filterDate]);

      // ----------------- Authentication -----------------
      const handleLogin = (e) => {
        e.preventDefault();
        // ค้นหาในประวัติผู้ใช้งานแบบ dynamic
        const found = users.find(u => u.id === loginInput.trim());
        if (found) {
          setCurrentUser(found);
          setLoginInput("");
          setLoginError("");
          setPmReporter(found.name);
        } else {
          setLoginError("ไม่พบรหัสพนักงานในระบบ หรือรหัสไม่ถูกต้อง! กรุณาตรวจสอบอีกครั้ง");
        }
      };

      const triggerLogout = () => {
        setIsLogoutConfirmOpen(true);
      };

      const executeLogout = () => {
        setCurrentUser(null);
        setPmReporter("");
        setIsLogoutConfirmOpen(false);
      };

      // ----------------- Machine Management -----------------
      const handleAddMachine = (e) => {
        e.preventDefault();
        if (!userPermissions.canEditMachines) return alert("สิทธิ์ Admin เท่านั้นที่สามารถเพิ่มเครื่องจักรได้");
        if (!newMcName.trim()) return;

        const newMachine = {
          id: "M_" + Date.now(),
          name: newMcName.trim(),
          defaultDay: parseInt(newMcDay),
          defaultShift: newMcShift,
          rank: newMcRank,
          type: newMcType,
          targetUrl: newMcUrl.trim() || "#"
        };

        setMachines([...machines, newMachine]);
        setNewMcName("");
        setNewMcUrl("");
        setNewMcType("ไฟฟ้า/เครื่องจักร");
        setIsAddMachineOpen(false);
        alert("เพิ่มเครื่องจักรเรียบร้อยแล้ว!");
      };

      // เปิดโมดอลแก้ไขเครื่องจักรหลัก
      const triggerEditMachine = (m) => {
        setEditingMachine({ ...m });
        setIsEditMachineOpen(true);
      };

      const handleSaveMachineEdit = (e) => {
        e.preventDefault();
        if (!editingMachine) return;
        
        setMachines(prev => prev.map(m => m.id === editingMachine.id ? editingMachine : m));
        setIsEditMachineOpen(false);
        setEditingMachine(null);
        alert("บันทึกการแก้ไขเครื่องจักรสำเร็จ!");
      };

      const triggerDeleteMachine = (id) => {
        if (!userPermissions.canEditMachines) return alert("สิทธิ์ Admin เท่านั้นที่สามารถลบเครื่องจักรได้");
        setMachineToDelete(id);
        setIsDeleteConfirmOpen(true);
      };

      const executeDeleteMachine = () => {
        if (machineToDelete) {
          setMachines(machines.filter(m => m.id !== machineToDelete));
          setPlans(plans.filter(p => p.machineId !== machineToDelete));
          setMachineToDelete(null);
        }
        setIsDeleteConfirmOpen(false);
      };

      // ----------------- User Management (Admin Only) -----------------
      const openUserModal = (mode, userObj = null) => {
        setUserFormMode(mode);
        if (mode === "edit" && userObj) {
          setUserForm({ ...userObj });
        } else {
          setUserForm({ id: "", name: "", role: "user" });
        }
        setIsUserModalOpen(true);
      };

      const handleSaveUser = (e) => {
        e.preventDefault();
        if (!userForm.id.trim() || !userForm.name.trim()) return alert("กรุณากรอกข้อมูลให้ครบถ้วน");
        
        if (userFormMode === "add") {
          // ตรวจสอบ ID ซ้ำ
          if (users.some(u => u.id === userForm.id.trim())) {
            return alert("รหัสพนักงานนี้มีอยู่ในระบบแล้ว!");
          }
          setUsers([...users, { id: userForm.id.trim(), name: userForm.name.trim(), role: userForm.role }]);
          alert("เพิ่มพนักงานสำเร็จ!");
        } else {
          setUsers(users.map(u => u.id === userForm.id ? { ...u, name: userForm.name.trim(), role: userForm.role } : u));
          alert("อัปเดตข้อมูลพนักงานสำเร็จ!");
        }
        setIsUserModalOpen(false);
      };

      const triggerDeleteUser = (u) => {
        if (u.id === currentUser?.id) return alert("ไม่สามารถลบบัญชีของคุณเองที่กำลังใช้งานอยู่ได้");
        setUserToDelete(u);
        setIsUserDeleteConfirmOpen(true);
      };

      const executeDeleteUser = () => {
        if (userToDelete) {
          setUsers(users.filter(u => u.id !== userToDelete.id));
          setUserToDelete(null);
        }
        setIsUserDeleteConfirmOpen(false);
      };

      // ----------------- Planning Management (Fixed Disappearing Bug) -----------------
      const activeMonthPlans = useMemo(() => {
        // ดึงเฉพาะแผนงานที่ถูกเก็บของเดือนนั้นๆ
        const monthPlans = plans.filter(p => p.month === planningMonth);
        
        // เติมข้อมูลให้ครบทุกเครื่องจักรเสมอ ไม่ตัดทิ้ง
        return machines.map(m => {
          const existing = monthPlans.find(p => p.machineId === m.id);
          if (existing) {
            return {
              id: existing.id || `${planningMonth}_${m.id}`,
              month: planningMonth,
              machineId: m.id,
              machineName: m.name, // อิงตามชื่อเครื่องจักรหลักล่าสุดเสมอ
              day: existing.day !== undefined ? existing.day : m.defaultDay,
              shift: existing.shift || m.defaultShift,
              rank: m.rank || "B", // อิงตาม Rank หลักล่าสุดเสมอ
              type: m.type || "ไฟฟ้า/เครื่องจักร", // อิงตาม Type หลักล่าสุดเสมอ
              operators: existing.operators || [],
              score: existing.score !== undefined ? existing.score : "",
              scheduledHours: existing.scheduledHours !== undefined ? existing.scheduledHours : 720,
              downtimeHours: existing.downtimeHours !== undefined ? existing.downtimeHours : 0,
              pmStatus: existing.pmStatus !== undefined ? existing.pmStatus : "pending",
              targetUrl: m.targetUrl
            };
          }
          // คืนค่าตั้งต้นกรณีที่ยังไม่ได้สร้างแผน
          return {
            id: `${planningMonth}_${m.id}`,
            month: planningMonth,
            machineId: m.id,
            machineName: m.name,
            day: m.defaultDay,
            shift: m.defaultShift,
            rank: m.rank || "B",
            type: m.type || "ไฟฟ้า/เครื่องจักร",
            operators: [],
            score: "",
            scheduledHours: 720,
            downtimeHours: 0,
            pmStatus: "pending",
            targetUrl: m.targetUrl
          };
        });
      }, [machines, plans, planningMonth]);

      const updatePlanField = (planId, field, value) => {
        if (!userPermissions.canManagePlans) return;
        
        setPlans(prevPlans => {
          const index = prevPlans.findIndex(p => p.id === planId);
          if (index > -1) {
            const updated = [...prevPlans];
            updated[index] = { ...updated[index], [field]: value };
            return updated;
          } else {
            const defaultPlan = activeMonthPlans.find(p => p.id === planId);
            const newPlan = { ...defaultPlan, [field]: value };
            return [...prevPlans, newPlan];
          }
        });
      };

      // ----------------- Confirm PM -----------------
      const openPmConfirmModal = (job) => {
        setSelectedPmJob(job);
        const savedPlan = plans.find(p => p.month === planningMonth && p.machineId === job.machineId);
        setPmOperators(savedPlan ? savedPlan.operators : []);
        setIsConfirmPmOpen(true);
      };

      const handleConfirmPmRedirect = () => {
        if (!pmReporter) {
          alert("กรุณากรอกชื่อผู้ลงข้อมูลตรวจสอบก่อนเข้าทำ PM");
          return;
        }

        const newLog = {
          id: "L_" + Date.now(),
          timestamp: new Date().toLocaleString("th-TH"),
          date: filterDate,
          machineName: selectedPmJob.machineName,
          reporter: pmReporter,
          operators: pmOperators.length > 0 ? pmOperators.join(", ") : "ไม่ระบุผู้ปฏิบัติงาน"
        };

        const updatedLogs = [newLog, ...eventLogs];
        setEventLogs(updatedLogs);

        if (sheetWebAppUrl) {
          sendToGoogleSheet(newLog);
        }

        setIsConfirmPmOpen(false);

        if (selectedPmJob.targetUrl && selectedPmJob.targetUrl !== "#") {
          window.open(selectedPmJob.targetUrl, "_blank");
        } else {
          alert("ไม่พบบันทึก URL ใบเช็คชีตของเครื่องจักรนี้ (ลงข้อมูลในประวัติระบบ Event Log สำเร็จ)");
        }
      };

      const sendToGoogleSheet = async (logData) => {
        try {
          await fetch(sheetWebAppUrl, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "addLog",
              data: logData
            })
          });
        } catch (e) {
          console.error("ผิดพลาดขณะส่งข้อมูลไป Google Sheets: ", e);
        }
      };

      // ----------------- Dashboard & KPI Calculations -----------------
      const dashboardStats = useMemo(() => {
        const monthPlans = plans.filter(p => p.month === planningMonth);
        const activePlans = monthPlans.length > 0 ? monthPlans : activeMonthPlans;
        
        const calculateDowntimeKPIByRank = (rankLetter) => {
          const filtered = activePlans.filter(p => (p.rank || "B") === rankLetter);
          let sumScheduled = 0;
          let sumDowntime = 0;

          filtered.forEach(p => {
            const sch = p.scheduledHours !== undefined ? parseFloat(p.scheduledHours) : 720;
            const down = p.downtimeHours !== undefined ? parseFloat(p.downtimeHours) : 0;
            sumScheduled += isNaN(sch) ? 720 : sch;
            sumDowntime += isNaN(down) ? 0 : down;
          });

          if (sumScheduled === 0) return "100.0";
          const kpi = ((sumScheduled - sumDowntime) / sumScheduled) * 100;
          return Math.max(0, kpi).toFixed(1);
        };

        const downtimeKpiA = calculateDowntimeKPIByRank("A");
        const downtimeKpiB = calculateDowntimeKPIByRank("B");
        const downtimeKpiL = calculateDowntimeKPIByRank("L");

        const totalPlanned = activePlans.length;
        let pmOnTimeCount = 0;
        let pmLateCount = 0;
        let pmPendingCount = 0;

        activePlans.forEach(p => {
          const status = p.pmStatus || "pending";
          if (status === "on_time") pmOnTimeCount++;
          else if (status === "late_in_month") pmLateCount++;
          else pmPendingCount++;
        });

        const overallCorrectness = totalPlanned > 0
          ? ((1 - (((pmLateCount / 2) + pmPendingCount) / totalPlanned)) * 100).toFixed(1)
          : "0.0";

        const individualStats = users.map(user => {
          const userAssignedPlans = activePlans.filter(p => p.operators && p.operators.includes(user.name));
          const totalAssigned = userAssignedPlans.length;
          
          let userOnTime = 0;
          let userLate = 0;
          let userPending = 0;

          let userSumScheduled = 0;
          let userSumDowntime = 0;

          userAssignedPlans.forEach(p => {
            const status = p.pmStatus || "pending";
            if (status === "on_time") userOnTime++;
            else if (status === "late_in_month") userLate++;
            else userPending++;

            const sch = p.scheduledHours !== undefined ? parseFloat(p.scheduledHours) : 720;
            const down = p.downtimeHours !== undefined ? parseFloat(p.downtimeHours) : 0;
            userSumScheduled += isNaN(sch) ? 720 : sch;
            userSumDowntime += isNaN(down) ? 0 : down;
          });

          const indCorrectness = totalAssigned > 0
            ? ((1 - (((userLate / 2) + userPending) / totalAssigned)) * 100).toFixed(1)
            : "0.0";

          const indDowntimeKpi = userSumScheduled > 0
            ? (((userSumScheduled - userSumDowntime) / userSumScheduled) * 100).toFixed(1)
            : "100.0";

          return {
            name: user.name,
            totalAssigned,
            userOnTime,
            userLate,
            userPending,
            indCorrectness,
            indDowntimeKpi
          };
        });

        return {
          downtimeKpiA,
          downtimeKpiB,
          downtimeKpiL,
          totalPlanned,
          pmOnTimeCount,
          pmLateCount,
          pmPendingCount,
          overallCorrectness,
          individualStats
        };
      }, [plans, machines, planningMonth, activeMonthPlans, users]);

      // กรองงานสำหรับแสดงหน้าประจำวัน
      const dailyJobsToShow = useMemo(() => {
        return machines
          .filter(m => m.defaultDay === currentDayOfMonth)
          .map(m => {
            const plan = plans.find(p => p.month === planningMonth && p.machineId === m.id);
            return {
              machineId: m.id,
              machineName: m.name,
              day: m.defaultDay,
              shift: plan?.shift || m.defaultShift,
              rank: m.rank || "B",
              type: m.type || "ไฟฟ้า/เครื่องจักร",
              operators: plan?.operators || [],
              score: plan?.score || "",
              pmStatus: plan?.pmStatus || "pending",
              targetUrl: m.targetUrl
            };
          })
          .filter(job => {
            return filterShift === "ทั้งหมด" || job.shift === filterShift;
          });
      }, [machines, plans, filterDate, filterShift, currentDayOfMonth, planningMonth]);

      // ฟังก์ชันสกรีนสีของประเภทเครื่องจักรให้สวยงาม
      const getTypeBadgeColor = (type) => {
        switch(type) {
          case "ไฟฟ้า/เครื่องจักร":
            return "bg-green-50 text-green-700 border-green-200";
          case "อาคาร/สถานที่":
            return "bg-blue-50 text-blue-700 border-blue-200";
          case "ยานยนต์/แบตเตอรี่":
            return "bg-amber-50 text-amber-700 border-amber-200";
          default:
            return "bg-slate-50 text-slate-700 border-slate-200";
        }
      };

      // ----------------- UI Rendering -----------------

      // หากยังไม่ได้เข้าสู่ระบบ
      if (!currentUser) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-950 p-4" style={{ backgroundImage: 'radial-gradient(circle, #0e1e12 0%, #030712 100%)' }}>
            <div className="bg-white w-full max-w-md rounded-3xl shadow-2xl overflow-hidden border-t-8 border-green-600 animate-fadeIn p-6 space-y-6">
              
              <div className="text-center space-y-1">
                <span className="bg-green-100 text-green-700 text-[10px] font-extrabold px-3 py-1 rounded-full uppercase tracking-wider">
                  CP ALL Engineering DC มหาชัย
                </span>
                <h1 className="text-xl font-extrabold text-slate-800 pt-1">
                  ระบบบริหารและวางแผนงาน PM
                </h1>
                <p className="text-xs text-slate-500">
                  กรุณาล็อกอินด้วยรหัสพนักงานที่ถูกต้องเพื่อใช้งาน
                </p>
              </div>

              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-xs font-bold text-slate-600 mb-1.5">
                    รหัสประจำตัวพนักงาน
                  </label>
                  <div className="relative">
                    <span className="absolute left-3 top-3 text-slate-400">
                      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="1.5" stroke="currentColor" className="w-5 h-5">
                        <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
                      </svg>
                    </span>
                    <input
                      type="text"
                      required
                      value={loginInput}
                      onChange={(e) => setLoginInput(e.target.value)}
                      placeholder="ระบุรหัสพนักงาน เช่น xxxxxxx"
                      className="w-full pl-9 pr-4 py-3 text-sm border border-slate-300 rounded-xl outline-none focus:border-green-500 focus:ring-1 focus:ring-green-500 transition-all font-mono font-bold"
                    />
                  </div>
                </div>

                {loginError && (
                  <p className="text-xs text-red-500 bg-red-50 p-2.5 rounded-lg border border-red-100 font-medium">
                    {loginError}
                  </p>
                )}

                <button
                  type="submit"
                  className="w-full py-3 bg-green-600 hover:bg-green-700 text-white font-extrabold text-sm rounded-xl shadow-md transition-all active:scale-95 flex items-center justify-center gap-1.5"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className="w-4 h-4">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 9V5.25A2.25 2.25 0 0 1 10.5 3h6a2.25 2.25 0 0 1 2.25 2.25v13.5A2.25 2.25 0 0 1 16.5 21h-6a2.25 2.25 0 0 1-2.25-2.25V15M12 9l3 3m0 0-3 3m3-3H2.25" />
                  </svg>
                  เข้าสู่ระบบปฏิบัติงาน
                </button>
              </form>

            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-slate-50 pb-16">
          
          {/* Header Bar */}
          <header className="bg-white shadow-sm border-b-4 border-green-600 sticky top-0 z-30">
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
              
              <div className="flex items-center space-x-3">
                <div className="w-10 h-10 bg-green-100 rounded-xl flex items-center justify-center text-green-700 font-extrabold text-lg">
                  CP
                </div>
                <div>
                  <div className="flex items-center space-x-2">
                    <h1 className="text-base font-extrabold text-slate-900 leading-none">PM Web Portal</h1>
                    <span className="bg-green-600 text-white text-[8px] font-bold px-1.5 py-0.5 rounded">V2.4</span>
                  </div>
                  <p className="text-[10px] text-slate-500 font-medium">ระบบวิเคราะห์และสรุปแผนงานซ่อมบำรุงเชิงป้องกัน CP ALL DC</p>
                </div>
              </div>

              {/* ส่วนแสดงพนักงานและปุ่มสลับบัญชี/ออกจากระบบอย่างชัดเจน */}
              <div className="flex items-center space-x-4">
                <div className="text-right">
                  <p className="text-xs font-bold text-slate-800">
                    คุณ{currentUser?.name || ""}
                  </p>
                  <span className={`text-[9px] font-bold px-2 py-0.5 rounded-full block md:inline-block ${
                    currentUser?.role === 'admin' ? 'bg-red-100 text-red-700' :
                    currentUser?.role === 'power_user' ? 'bg-indigo-100 text-indigo-700' : 'bg-slate-100 text-slate-600'
                  }`}>
                    {userPermissions.label}
                  </span>
                </div>
                
                {/* ปุ่มออกจากระบบ */}
                <button
                  onClick={triggerLogout}
                  className="flex items-center space-x-1 bg-red-50 hover:bg-red-100 text-red-600 px-3 py-1.5 rounded-xl transition-all text-xs font-bold shadow-sm"
                  title="ออกจากระบบ / สลับผู้ใช้งาน"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                  <span>ออกจากระบบ</span>
                </button>
              </div>

            </div>
          </header>

          {/* แท็บเมนูหลัก */}
          <nav className="bg-white border-b border-slate-200">
            <div className="max-w-6xl mx-auto px-4 flex space-x-1 overflow-x-auto">
              <button
                onClick={() => setCurrentTab("daily")}
                className={`py-3 px-4 text-xs font-bold border-b-2 transition-all flex items-center gap-1.5 whitespace-nowrap ${currentTab === "daily" ? 'border-green-600 text-green-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
              >
                {/* SVG Calendar */}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                ใบงานประจำวัน
              </button>
              
              <button
                onClick={() => setCurrentTab("planning")}
                className={`py-3 px-4 text-xs font-bold border-b-2 transition-all flex items-center gap-1.5 whitespace-nowrap ${currentTab === "planning" ? 'border-green-600 text-green-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
              >
                {/* SVG Clipboard */}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                  <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                  <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                </svg>
                แผนงานประจำเดือน & บันทึกค่า
              </button>

              <button
                onClick={() => setCurrentTab("dashboard")}
                className={`py-3 px-4 text-xs font-bold border-b-2 transition-all flex items-center gap-1.5 whitespace-nowrap ${currentTab === "dashboard" ? 'border-green-600 text-green-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
              >
                {/* SVG Bar Chart */}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                  <line x1="18" y1="20" x2="18" y2="10"></line>
                  <line x1="12" y1="20" x2="12" y2="4"></line>
                  <line x1="6" y1="20" x2="6" y2="14"></line>
                </svg>
                สรุป KPI และ Dashboard
              </button>

              {/* แท็บจัดการพนักงาน (เฉพาะ Admin เท่านั้น) */}
              {currentUser?.role === 'admin' && (
                <button
                  onClick={() => setCurrentTab("users")}
                  className={`py-3 px-4 text-xs font-bold border-b-2 transition-all flex items-center gap-1.5 whitespace-nowrap ${currentTab === "users" ? 'border-green-600 text-green-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
                >
                  {/* SVG Users Config */}
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                  </svg>
                  จัดการผู้ใช้งาน ⚙️
                </button>
              )}

              <button
                onClick={() => setCurrentTab("sync")}
                className={`py-3 px-4 text-xs font-bold border-b-2 transition-all flex items-center gap-1.5 whitespace-nowrap ${currentTab === "sync" ? 'border-green-600 text-green-600' : 'border-transparent text-slate-500 hover:text-slate-800'}`}
              >
                {/* SVG Sync/Refresh */}
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                  <polyline points="23 4 23 10 17 10"></polyline>
                  <polyline points="1 20 1 14 7 14"></polyline>
                  <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                ตั้งค่าชีต / ล็อกประวัติ
              </button>
            </div>
          </nav>

          <main className="max-w-6xl mx-auto p-4">

            {/* ======================================================== */}
            {/* แท็บ 1: ใบงานประจำวัน */}
            {/* ======================================================== */}
            {currentTab === "daily" && (
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-fadeIn">
                
                <div className="space-y-4">
                  <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 space-y-4">
                    <h2 className="text-xs font-bold text-slate-500 uppercase flex items-center gap-1.5">
                      {/* SVG Sliders */}
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 text-green-600">
                        <line x1="4" y1="21" x2="4" y2="14"></line>
                        <line x1="4" y1="10" x2="4" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="12"></line>
                        <line x1="12" y1="8" x2="12" y2="3"></line>
                        <line x1="20" y1="21" x2="20" y2="16"></line>
                        <line x1="20" y1="12" x2="20" y2="3"></line>
                        <line x1="1" y1="14" x2="7" y2="14"></line>
                        <line x1="9" y1="8" x2="15" y2="8"></line>
                        <line x1="17" y1="16" x2="23" y2="16"></line>
                      </svg>
                      ตัวกรองงานปฏิบัติการ
                    </h2>

                    <div>
                      <label className="block text-[11px] font-bold text-slate-400 mb-1">ระบุวันที่ปฏิบัติงาน</label>
                      <input 
                        type="date" 
                        value={filterDate}
                        onChange={(e) => setFilterDate(e.target.value)}
                        className="w-full p-2.5 text-xs font-bold border rounded-xl outline-none bg-slate-50 focus:bg-white focus:ring-1 focus:ring-green-500"
                      />
                    </div>

                    <div>
                      <label className="block text-[11px] font-bold text-slate-400 mb-1">เลือกกะปฏิบัติงาน</label>
                      <div className="grid grid-cols-3 gap-1 bg-slate-100 p-1 rounded-xl">
                        {["ทั้งหมด", "กลางวัน", "กลางคืน"].map(sh => (
                          <button
                            key={sh}
                            type="button"
                            onClick={() => setFilterShift(sh)}
                            className={`py-1.5 text-[10px] font-bold rounded-lg transition-all ${filterShift === sh ? 'bg-white text-green-700 shadow-sm' : 'text-slate-500'}`}
                          >
                            {sh === "กลางวัน" ? "☀️ กลางวัน" : sh === "กลางคืน" ? "🌙 กลางคืน" : "ทั้งหมด"}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>

                  {userPermissions.canEditMachines && (
                    <button
                      onClick={() => setIsAddMachineOpen(true)}
                      className="w-full py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold text-xs rounded-xl shadow-md flex items-center justify-center gap-1.5 transition-all"
                    >
                      {/* SVG Plus */}
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                      </svg>
                      เพิ่มรายการเครื่องจักรหลัก
                    </button>
                  )}
                </div>

                <div className="lg:col-span-2 space-y-3">
                  <div className="flex items-center justify-between text-xs font-bold text-slate-500 px-1">
                    <span>
                      แผนงานรายวันจำแนกตามเครื่องจักร ({dailyJobsToShow.length} เครื่องจักร)
                    </span>
                    <span>
                      แผนวันที่: {currentDayOfMonth} ของเดือน
                    </span>
                  </div>

                  {dailyJobsToShow.length === 0 ? (
                    <div className="bg-white border border-dashed border-slate-300 rounded-3xl p-12 text-center text-slate-400">
                      {/* SVG Clipboard list */}
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-12 h-12 mx-auto mb-3 opacity-30 text-green-600">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                      </svg>
                      <p className="text-xs font-bold">ไม่มีแผนปฏิบัติการกะ{filterShift} ในวันที่ระบุ</p>
                    </div>
                  ) : (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                      {dailyJobsToShow.map((job) => {
                        const isDay = job.shift === "กลางวัน";
                        // ค้นหา Object เครื่องจักรหลักดั้งเดิม
                        const originalMc = machines.find(m => m.id === job.machineId);
                        return (
                          <div 
                            key={job.machineId}
                            className={`bg-white rounded-2xl border p-4 flex flex-col justify-between shadow-sm transition-all hover:shadow-md ${isDay ? 'border-l-4 border-l-yellow-400' : 'border-l-4 border-l-slate-800'}`}
                          >
                            <div className="space-y-2">
                              <div className="flex items-center justify-between">
                                <div className="flex flex-wrap items-center gap-1.5">
                                  <span className={`text-[9px] font-extrabold px-2 py-0.5 rounded-full ${isDay ? 'bg-yellow-50 text-yellow-700 border border-yellow-200' : 'bg-slate-900 text-white'}`}>
                                    {isDay ? "☀️ กะกลางวัน" : "🌙 กะกลางคืน"}
                                  </span>
                                  <span className="bg-red-50 text-red-600 text-[9px] font-black px-1.5 py-0.5 rounded border border-red-100">
                                    Rank {job.rank}
                                  </span>
                                  <span className={`text-[9px] font-black px-1.5 py-0.5 rounded border ${getTypeBadgeColor(job.type)}`}>
                                    {job.type}
                                  </span>
                                </div>
                                <span className="text-[10px] text-slate-400 font-bold">
                                  งานวันที่ {job.day}
                                </span>
                              </div>

                              <h3 className="font-extrabold text-xs text-slate-800 line-clamp-2 min-h-[2rem]">
                                {job.machineName}
                              </h3>

                              <div className="pt-2 border-t border-slate-100">
                                <p className="text-[10px] font-bold text-slate-400">ทีมผู้ปฏิบัติงาน:</p>
                                <div className="flex flex-wrap gap-1 mt-1">
                                  {job.operators.length > 0 ? (
                                    job.operators.map((op, i) => (
                                      <span key={i} className="bg-slate-100 text-slate-600 text-[9px] px-1.5 py-0.5 rounded font-bold">
                                        {op}
                                      </span>
                                    ))
                                  ) : (
                                    <span className="text-[9px] text-amber-500 font-bold italic">
                                      ยังไม่มอบหมายผู้ทำงาน
                                    </span>
                                  )}
                                </div>
                              </div>
                            </div>

                            <div className="mt-4 pt-3 border-t border-slate-100 flex items-center justify-between">
                              <div>
                                {job.pmStatus === "on_time" && (
                                  <span className="text-[9px] font-bold text-green-700 bg-green-50 px-2 py-0.5 rounded border border-green-200">PM ตรงเวลา</span>
                                )}
                                {job.pmStatus === "late_in_month" && (
                                  <span className="text-[9px] font-bold text-amber-700 bg-amber-50 px-2 py-0.5 rounded border border-amber-200">PM ไม่ตรงวัน</span>
                                )}
                                {job.pmStatus === "pending" && (
                                  <span className="text-[9px] font-bold text-red-700 bg-red-50 px-2 py-0.5 rounded border border-red-200">ยังไม่ได้ทำ</span>
                                )}
                              </div>

                              <div className="flex items-center space-x-1.5">
                                {/* ปุ่มเปิดทำ PM */}
                                <button
                                  onClick={() => openPmConfirmModal(job)}
                                  className="py-1.5 px-3 bg-green-600 hover:bg-green-700 text-white rounded-lg text-[11px] font-bold flex items-center gap-1 active:scale-95 transition-all shadow-sm"
                                >
                                  {/* SVG External Link */}
                                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                    <polyline points="15 3 21 3 21 9"></polyline>
                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                  </svg>
                                  เปิดทำ PM
                                </button>
                                {userPermissions.canEditMachines && originalMc && (
                                  <button
                                    type="button"
                                    onClick={() => triggerEditMachine(originalMc)}
                                    className="p-1.5 text-slate-400 hover:text-green-600 hover:bg-green-50 rounded-lg transition-all"
                                    title="แก้ไขข้อมูลเครื่องจักรหลัก"
                                  >
                                    {/* SVG Edit */}
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                                      <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                                      <path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                                    </svg>
                                  </button>
                                )}
                                {userPermissions.canEditMachines && (
                                  <button
                                    type="button"
                                    onClick={() => triggerDeleteMachine(job.machineId)}
                                    className="p-1.5 text-slate-300 hover:text-red-500 rounded-lg hover:bg-red-50"
                                    title="ลบเครื่องจักรนี้"
                                  >
                                    {/* SVG Trash */}
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                                      <polyline points="3 6 5 6 21 6"></polyline>
                                      <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                                      <line x1="10" y1="11" x2="10" y2="17"></line>
                                      <line x1="14" y1="11" x2="14" y2="17"></line>
                                    </svg>
                                  </button>
                                )}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>

              </div>
            )}

            {/* ======================================================== */}
            {/* แท็บ 2: แผนงานประจำเดือน & บันทึกชั่วโมงการทำงาน/Downtime */}
            {/* ======================================================== */}
            {currentTab === "planning" && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-fadeIn">
                
                <div className="p-4 bg-slate-50 border-b border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div className="space-y-1">
                    <h2 className="text-sm font-extrabold text-slate-900">บันทึกแผนงาน, สถานะ, และชั่วโมง Downtime ประจำเดือน</h2>
                    <p className="text-xs text-slate-500">มอบหมายงาน ตรวจสอบเวลาแผนงาน และระบุชั่วโมงหยุดเครื่องจักรเพื่อวัดผล KPI</p>
                  </div>

                  <div className="flex items-center space-x-2">
                    <label className="text-xs font-bold text-slate-500">ระบุเดือนคลังสินค้า:</label>
                    <input
                      type="month"
                      value={planningMonth}
                      onChange={(e) => setPlanningMonth(e.target.value)}
                      className="p-2 border rounded-xl text-xs font-bold outline-none focus:ring-1 focus:ring-green-500 bg-white"
                    />
                  </div>
                </div>

                {!userPermissions.canManagePlans && (
                  <div className="bg-amber-50 text-amber-700 px-4 py-2.5 text-xs font-bold flex items-center gap-1.5 border-b border-amber-100">
                    {/* SVG Alert Triangle */}
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-4 h-4 text-amber-500 shrink-0">
                      <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
                      <line x1="12" y1="9" x2="12" y2="13"></line>
                      <line x1="12" y1="17" x2="12.01" y2="17"></line>
                    </svg>
                    <span>คุณเข้าใช้ด้วยสิทธิ์อ่านข้อมูลเท่านั้น (สิทธิ์ในการแก้ไขแผนงาน/ชั่วโมง Downtime/คะแนน ได้รับการอนุมัติเฉพาะ Admin และ Power User เท่านั้น)</span>
                  </div>
                )}

                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-slate-100 text-slate-500 text-[10px] font-bold tracking-wider uppercase border-b border-slate-200">
                        <th className="p-3 text-center">วันที่</th>
                        <th className="p-3">เครื่องจักร & รายละเอียด</th>
                        <th className="p-3">กะปฏิบัติงาน</th>
                        <th className="p-3">ผู้ปฏิบัติงาน (สูงสุด 4 คน)</th>
                        <th className="p-3">สถานะ PM ตามจริง</th>
                        <th className="p-3 text-center">แผนทำงาน / Downtime (ชม.)</th>
                        <th className="p-3 text-center" style={{ width: '90px' }}>คะแนน</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 text-xs">
                      {activeMonthPlans.map((plan) => {
                        const isDay = plan.shift === "กลางวัน";
                        return (
                          <tr key={plan.id} className="hover:bg-slate-50/50">
                            
                            {/* วันที่ทำ PM */}
                            <td className="p-3 text-center font-bold text-slate-500">
                              {plan.day}
                            </td>

                            {/* เครื่องจักร & Rank & Type */}
                            <td className="p-3 space-y-1">
                              <div className="font-extrabold text-slate-800">
                                {plan.machineName}
                              </div>
                              <div className="flex flex-wrap items-center gap-1.5">
                                <span className={`text-[9px] font-black px-1.5 py-0.5 rounded ${
                                  plan.rank === "A" ? "bg-red-100 text-red-700 border border-red-200" :
                                  plan.rank === "B" ? "bg-amber-100 text-amber-700 border border-amber-200" :
                                  "bg-slate-100 text-slate-700 border border-slate-200"
                                }`}>
                                  Rank {plan.rank || "B"}
                                </span>
                                <span className={`text-[9px] font-black px-1.5 py-0.5 rounded border ${getTypeBadgeColor(plan.type)}`}>
                                  {plan.type || "ไฟฟ้า/เครื่องจักร"}
                                </span>
                                
                                {/* สำหรับทุกคนที่ไม่ใช่ Admin: แสดงผลลิงก์ PM ปกติ */}
                                {currentUser?.role !== 'admin' && plan.targetUrl && plan.targetUrl !== "#" && (
                                  <span className="text-[9px] text-blue-600 bg-blue-50 px-1 py-0.5 rounded font-mono truncate max-w-[150px]">
                                    มีลิงก์เช็คชีต
                                  </span>
                                )}

                                {/* สำหรับ Admin: แสดงสถานะการพบลิงก์ พร้อมควบคุม, ดู หรือเข้าไปแก้ไขลิงก์ PM ด่วน */}
                                {currentUser?.role === 'admin' && (
                                  <div className="flex items-center gap-1.5 mt-0.5">
                                    {plan.targetUrl && plan.targetUrl !== "#" ? (
                                      <React.Fragment>
                                        <span className="text-[9px] text-green-700 bg-green-50 px-1.5 py-0.5 rounded font-bold border border-green-200">
                                          พบลิงก์ 🔗
                                        </span>
                                        <a 
                                          href={plan.targetUrl} 
                                          target="_blank" 
                                          rel="noopener noreferrer"
                                          className="text-[9px] bg-blue-600 hover:bg-blue-700 text-white px-2 py-0.5 rounded font-bold shadow-sm"
                                        >
                                          เปิดดูปลายทาง
                                        </a>
                                        <button
                                          type="button"
                                          onClick={() => {
                                            const originalMc = machines.find(m => m.id === plan.machineId);
                                            if (originalMc) triggerEditMachine(originalMc);
                                          }}
                                          className="text-[9px] bg-slate-200 hover:bg-slate-300 text-slate-700 px-2 py-0.5 rounded font-bold"
                                        >
                                          แก้ไข
                                        </button>
                                      </React.Fragment>
                                    ) : (
                                      <React.Fragment>
                                        <span className="text-[9px] text-red-600 bg-red-50 px-1.5 py-0.5 rounded font-bold border border-red-200">
                                          ไม่มีลิงก์ ❌
                                        </span>
                                        <button
                                          type="button"
                                          onClick={() => {
                                            const originalMc = machines.find(m => m.id === plan.machineId);
                                            if (originalMc) triggerEditMachine(originalMc);
                                          }}
                                          className="text-[9px] bg-green-600 hover:bg-green-700 text-white px-2 py-0.5 rounded font-bold"
                                        >
                                          ใส่ลิงก์ PM
                                        </button>
                                      </React.Fragment>
                                    )}
                                  </div>
                                )}
                              </div>
                            </td>

                            {/* กะการทำงาน (Admin & Power User สามารถแก้ไขได้) */}
                            <td className="p-3">
                              {userPermissions.canManagePlans ? (
                                <select
                                  value={plan.shift}
                                  onChange={(e) => updatePlanField(plan.id, "shift", e.target.value)}
                                  className="p-1 border rounded bg-white text-[11px] font-bold outline-none"
                                >
                                  <option value="กลางวัน">☀️ กลางวัน</option>
                                  <option value="กลางคืน">🌙 กลางคืน</option>
                                </select>
                              ) : (
                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${isDay ? 'bg-yellow-50 text-yellow-700' : 'bg-slate-900 text-white'}`}>
                                  {plan.shift}
                                </span>
                              )}
                            </td>

                            {/* รายชื่อพนักงานปฏิบัติงาน (Admin & Power User สามารถแก้ไขได้) */}
                            <td className="p-3 space-y-1">
                              {userPermissions.canManagePlans ? (
                                <div className="grid grid-cols-2 gap-1 max-w-xs">
                                  {[0, 1, 2, 3].map((index) => (
                                    <select
                                      key={index}
                                      value={plan.operators?.[index] || ""}
                                      onChange={(e) => {
                                        const nextOps = [...(plan.operators || [])];
                                        nextOps[index] = e.target.value;
                                        const cleanedOps = nextOps.filter(o => o !== "");
                                        updatePlanField(plan.id, "operators", cleanedOps);
                                      }}
                                      className="p-1 border rounded bg-white text-[10px] outline-none font-semibold"
                                    >
                                      <option value="">-- ว่าง --</option>
                                      {users.map(u => (
                                        <option key={u.id} value={u.name}>{u.name}</option>
                                      ))}
                                    </select>
                                  ))}
                                </div>
                              ) : (
                                <div className="flex flex-wrap gap-1">
                                  {plan.operators && plan.operators.length > 0 ? (
                                    plan.operators.map((op, i) => (
                                      <span key={i} className="bg-slate-100 text-slate-600 text-[10px] px-1.5 py-0.5 rounded font-bold">
                                        {op}
                                      </span>
                                    ))
                                  ) : (
                                    <span className="text-slate-400 italic">ไม่ได้มอบหมาย</span>
                                  )}
                                </div>
                              )}
                            </td>

                            {/* Status PM จริง (Admin & Power User สามารถแก้ไขได้) */}
                            <td className="p-3">
                              {userPermissions.canManagePlans ? (
                                <select
                                  value={plan.pmStatus || "pending"}
                                  onChange={(e) => updatePlanField(plan.id, "pmStatus", e.target.value)}
                                  className="p-1 border rounded bg-white text-[11px] font-bold outline-none"
                                >
                                  <option value="pending">ยังไม่ได้ทำ</option>
                                  <option value="on_time">ทำตรงเวลาตามกำหนด</option>
                                  <option value="late_in_month">ไม่ตรงวัน (แต่อยู่ในเดือน)</option>
                                </select>
                              ) : (
                                <span>
                                  {plan.pmStatus === "on_time" && <span className="text-green-600 font-bold">ตรงตามกำหนด</span>}
                                  {plan.pmStatus === "late_in_month" && <span className="text-amber-500 font-bold">ทำไม่ตรงวัน</span>}
                                  {plan.pmStatus === "pending" && <span className="text-red-500 font-bold">ยังไม่ได้ทำ</span>}
                                </span>
                              )}
                            </td>

                            {/* แผนทำงาน และ Downtime (Admin & Power User สามารถแก้ไขได้) */}
                            <td className="p-3 text-center">
                              {userPermissions.canManagePlans ? (
                                <div className="flex flex-col space-y-1 items-center">
                                  <div className="flex items-center space-x-1">
                                    <span className="text-[9px] text-slate-400 w-12 text-right">ชั่วโมงแผน:</span>
                                    <input
                                      type="number"
                                      min="0"
                                      value={plan.scheduledHours !== undefined ? plan.scheduledHours : 720}
                                      onChange={(e) => updatePlanField(plan.id, "scheduledHours", parseInt(e.target.value) || 0)}
                                      className="w-14 p-0.5 border rounded text-center text-[11px] font-bold outline-none"
                                    />
                                  </div>
                                  <div className="flex items-center space-x-1">
                                    <span className="text-[9px] text-red-500 w-12 text-right">Downtime:</span>
                                    <input
                                      type="number"
                                      min="0"
                                      value={plan.downtimeHours !== undefined ? plan.downtimeHours : 0}
                                      onChange={(e) => updatePlanField(plan.id, "downtimeHours", parseFloat(e.target.value) || 0)}
                                      className="w-14 p-0.5 border border-red-300 bg-red-50 text-red-700 rounded text-center text-[11px] font-bold outline-none"
                                    />
                                  </div>
                                </div>
                              ) : (
                                <div className="text-[11px]">
                                  <div>แผน: <span className="font-bold">{plan.scheduledHours || 720} ชม.</span></div>
                                  <div className="text-red-600">หยุด: <span className="font-bold">{plan.downtimeHours || 0} ชม.</span></div>
                                </div>
                              )}
                            </td>

                            {/* คะแนนที่ได้ (Admin & Power User สามารถแก้ไขได้) */}
                            <td className="p-3 text-center">
                              {userPermissions.canManagePlans ? (
                                <input
                                  type="number"
                                  min="0"
                                  max="100"
                                  placeholder="-"
                                  value={plan.score !== undefined ? plan.score : ""}
                                  onChange={(e) => {
                                    const val = e.target.value;
                                    if (val === "" || (parseInt(val) >= 0 && parseInt(val) <= 100)) {
                                      updatePlanField(plan.id, "score", val);
                                    }
                                  }}
                                  className="w-12 p-1 border rounded text-center text-xs font-bold outline-none"
                                />
                              ) : (
                                <span className="font-bold text-slate-700">{plan.score !== "" ? `${plan.score}` : "-"}</span>
                              )}
                            </td>

                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

              </div>
            )}

            {/* ======================================================== */}
            {/* แท็บ 3: รายงานสรุปประสิทธิภาพแดชบอร์ด & KPI แยกตามแผนงาน */}
            {/* ======================================================== */}
            {currentTab === "dashboard" && (
              <div className="space-y-6 animate-fadeIn">
                
                <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row md:items-center justify-between gap-4">
                  <div className="space-y-1">
                    <h2 className="text-sm font-extrabold text-slate-900">สรุป Dashboard รายงาน KPI ประจำเดือน</h2>
                    <p className="text-xs text-slate-500">รายงานผลประสิทธิภาพระดับความพร้อมใช้งานของเครื่องจักร (Availability) และความสมบูรณ์ในการปฏิบัติการ</p>
                  </div>
                  <input
                    type="month"
                    value={planningMonth}
                    onChange={(e) => setPlanningMonth(e.target.value)}
                    className="p-2 border rounded-xl text-xs font-bold outline-none bg-white"
                  />
                </div>

                {/* สรุป KPI Downtime แยกตามระดับ Rank ของเครื่องจักร */}
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  
                  {/* Rank A Availability */}
                  <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                    <div className="flex items-center justify-between">
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Availability (Rank A)</span>
                      <span className="bg-red-50 text-red-700 text-[10px] font-black px-2 py-0.5 rounded border border-red-100">วิกฤตสูงสุด</span>
                    </div>
                    <div className="flex items-baseline space-x-2 pt-3">
                      <h3 className="text-3xl font-black text-slate-900">{dashboardStats.downtimeKpiA}%</h3>
                      <span className="text-[10px] text-slate-500">KPI เป้าหมาย &gt; 98.0%</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full mt-3 overflow-hidden">
                      <div 
                        className={`h-full transition-all duration-500 ${parseFloat(dashboardStats.downtimeKpiA) >= 98 ? 'bg-green-500' : 'bg-red-500'}`}
                        style={{ width: `${dashboardStats.downtimeKpiA}%` }}
                      ></div>
                    </div>
                  </div>

                  {/* Rank B Availability */}
                  <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                    <div className="flex items-center justify-between">
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Availability (Rank B)</span>
                      <span className="bg-amber-50 text-amber-700 text-[10px] font-black px-2 py-0.5 rounded border border-amber-100">ปานกลาง</span>
                    </div>
                    <div className="flex items-baseline space-x-2 pt-3">
                      <h3 className="text-3xl font-black text-slate-900">{dashboardStats.downtimeKpiB}%</h3>
                      <span className="text-[10px] text-slate-500">KPI เป้าหมาย &gt; 95.0%</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full mt-3 overflow-hidden">
                      <div 
                        className={`h-full transition-all duration-500 ${parseFloat(dashboardStats.downtimeKpiB) >= 95 ? 'bg-green-500' : 'bg-amber-500'}`}
                        style={{ width: `${dashboardStats.downtimeKpiB}%` }}
                      ></div>
                    </div>
                  </div>

                  {/* Rank L Availability */}
                  <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between">
                    <div className="flex items-center justify-between">
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Availability (Rank L)</span>
                      <span className="bg-slate-100 text-slate-700 text-[10px] font-black px-2 py-0.5 rounded border border-slate-200">ทั่วไป</span>
                    </div>
                    <div className="flex items-baseline space-x-2 pt-3">
                      <h3 className="text-3xl font-black text-slate-900">{dashboardStats.downtimeKpiL}%</h3>
                      <span className="text-[10px] text-slate-500">KPI เป้าหมาย &gt; 90.0%</span>
                    </div>
                    <div className="w-full bg-slate-100 h-2 rounded-full mt-3 overflow-hidden">
                      <div 
                        className={`h-full transition-all duration-500 ${parseFloat(dashboardStats.downtimeKpiL) >= 90 ? 'bg-green-500' : 'bg-slate-400'}`}
                        style={{ width: `${dashboardStats.downtimeKpiL}%` }}
                      ></div>
                    </div>
                  </div>

                </div>

                {/* อัตราความครบถ้วนและถูกต้องตามแผน (Completion & Correctness KPI) */}
                <div className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                  <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                    <div className="space-y-1">
                      <span className="text-xs font-bold text-slate-400 uppercase">ดัชนีคุณภาพความสมบูรณ์ของงานซ่อมบำรุง</span>
                      <h3 className="text-2xl font-black text-slate-800">PM Completion & Correctness KPI</h3>
                    </div>
                    
                    <div className="text-right">
                      <span className="text-3xl font-black text-green-600 block">
                        {dashboardStats.overallCorrectness}%
                      </span>
                      <span className="text-[10px] text-slate-400 font-bold">รวมทั้งศูนย์บริการแผนงานคลังสินค้า</span>
                    </div>
                  </div>

                  {/* บ่งบอกรายละเอียดของตัวแปร */}
                  <div className="grid grid-cols-3 gap-3 text-center mt-5 pt-5 border-t border-slate-100">
                    <div className="p-2 bg-green-50 rounded-xl border border-green-100">
                      <span className="text-[10px] text-green-700 font-bold block">ตรงกำหนดเวลา</span>
                      <p className="text-base font-black text-green-800">{dashboardStats.pmOnTimeCount} เครื่อง</p>
                    </div>
                    <div className="p-2 bg-amber-50 rounded-xl border border-amber-100">
                      <span className="text-[10px] text-amber-700 font-bold block">ทำล่าช้า (แต่เสร็จในเดือน)</span>
                      <p className="text-base font-black text-amber-800">{dashboardStats.pmLateCount} เครื่อง</p>
                    </div>
                    <div className="p-2 bg-red-50 rounded-xl border border-red-100">
                      <span className="text-[10px] text-red-700 font-bold block">ยังไม่ได้บำรุงรักษา</span>
                      <p className="text-base font-black text-red-800">{dashboardStats.pmPendingCount} เครื่อง</p>
                    </div>
                  </div>
                </div>

                {/* ผลงานรายบุคคลประจำกะ */}
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                  <div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h3 className="text-xs font-black text-slate-600 uppercase">ตารางประเมินผลประสิทธิภาพและการคุม Downtime รายบุคคล</h3>
                    <span className="text-[10px] text-slate-400 font-bold">* ดึงผลงานโดยแยกวิเคราะห์เฉพาะงานที่ช่างแต่ละคนได้รับมอบหมาย</span>
                  </div>

                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse text-xs">
                      <thead>
                        <tr className="bg-slate-100 text-slate-500 text-[10px] font-bold uppercase border-b border-slate-200">
                          <th className="p-3 pl-5">ชื่อพนักงาน</th>
                          <th className="p-3 text-center">งานที่มอบหมายทั้งหมด</th>
                          <th className="p-3 text-center">งานตรงเวลา</th>
                          <th className="p-3 text-center">งานล่าช้า (ในเดือน)</th>
                          <th className="p-3 text-center bg-green-50/50">PM Correctness KPI</th>
                          <th className="p-3 text-center bg-red-50/50">Downtime KPI</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100 font-bold text-slate-700">
                        {dashboardStats.individualStats.map((u, i) => (
                          <tr key={i} className="hover:bg-slate-50/50">
                            <td className="p-3 pl-5 flex items-center space-x-2 text-slate-900">
                              <span className="w-6 h-6 bg-slate-100 text-[10px] text-slate-500 rounded-full flex items-center justify-center">
                                {i + 1}
                              </span>
                              <span>{u.name}</span>
                            </td>

                            <td className="p-3 text-center text-slate-500">
                              {u.totalAssigned} ใบงาน
                            </td>

                            <td className="p-3 text-center text-green-600">
                              {u.userOnTime}
                            </td>

                            <td className="p-3 text-center text-amber-600">
                              {u.userLate}
                            </td>

                            {/* KPI งานบำรุงรักษารายบุคคล */}
                            <td className="p-3 text-center bg-green-50/30 text-green-700 text-sm font-black">
                              {u.totalAssigned > 0 ? `${u.indCorrectness}%` : "-"}
                            </td>

                            {/* KPI Availability รายบุคคล */}
                            <td className="p-3 text-center bg-red-50/30 text-red-700 text-sm font-black">
                              {u.totalAssigned > 0 ? `${u.indDowntimeKpi}%` : "100.0%"}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>

              </div>
            )}

            {/* ======================================================== */}
            {/* แท็บที่ 4: จัดการผู้ใช้งาน (เฉพาะ Admin เท่านั้น) */}
            {/* ======================================================== */}
            {currentTab === "users" && currentUser?.role === "admin" && (
              <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden animate-fadeIn">
                <div className="p-4 bg-slate-50 border-b border-slate-200 flex items-center justify-between">
                  <div>
                    <h2 className="text-sm font-extrabold text-slate-900">แผงจัดการพนักงานและระดับสิทธิ์ปฏิบัติงาน (User Management)</h2>
                    <p className="text-xs text-slate-500">เพิ่มรายชื่อ ปรับแก้สิทธิ์ และลบรหัสพนักงานที่ไม่ใช้งานออกจากโครงข่ายระบบ</p>
                  </div>
                  <button
                    onClick={() => openUserModal("add")}
                    className="py-2 px-4 bg-green-600 hover:bg-green-700 text-white font-extrabold text-xs rounded-xl flex items-center gap-1 shadow-sm transition-all"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className="w-4 h-4">
                      <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                    </svg>
                    เพิ่มพนักงานใหม่
                  </button>
                </div>

                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse text-xs">
                    <thead>
                      <tr className="bg-slate-100 text-slate-500 text-[10px] font-bold uppercase border-b border-slate-200">
                        <th className="p-3 pl-5">รหัสประจำตัวพนักงาน</th>
                        <th className="p-3">ชื่อ-นามสกุล</th>
                        <th className="p-3">ระดับสิทธิ์การทำงาน</th>
                        <th className="p-3 text-center" style={{ width: '150px' }}>การกระทำ</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100 font-bold">
                      {users.map((u, i) => (
                        <tr key={u.id} className="hover:bg-slate-50/50">
                          <td className="p-3 pl-5 font-mono text-slate-900 text-sm">
                            {u.id}
                          </td>
                          <td className="p-3 text-slate-800 text-sm">
                            {u.name}
                          </td>
                          <td className="p-3">
                            <span className={`px-2.5 py-0.5 rounded-full text-[10px] font-black ${
                              u.role === 'admin' ? 'bg-red-100 text-red-700' :
                              u.role === 'power_user' ? 'bg-indigo-100 text-indigo-700' :
                              'bg-slate-100 text-slate-600'
                            }`}>
                              {u.role === 'admin' ? "ผู้ดูแลระบบ (Admin)" : u.role === 'power_user' ? "หัวหน้าหน่วย (Power User)" : "ช่างซ่อมบำรุง (User)"}
                            </span>
                          </td>
                          <td className="p-3 flex items-center justify-center space-x-2">
                            <button
                              onClick={() => openUserModal("edit", u)}
                              className="px-2.5 py-1.5 bg-slate-100 hover:bg-indigo-100 text-slate-600 hover:text-indigo-700 rounded-lg font-bold"
                            >
                              แก้ไข
                            </button>
                            <button

                            <polyline points="12 6 12 12 16 14"></polyline>
                          </svg>

                      {/* จำกัดสิทธิ์การแสดงปุ่มและกดปุ่ม ล้างประวัติ เฉพาะ Admin (เกรียงศักดิ์) เท่านั้น */}

                            </div>
                            <span className="text-[9px] text-slate-400 font-bold font-mono">

                            </span>

              </div>

          {/* ======================================================== */}
          {/* โมดอล: เพิ่มเครื่องจักรใหม่ (Admin เท่านั้น) */}

                        <option value="อาคาร/สถานที่">อาคาร/สถานที่</option>
                        <option value="ยานยนต์/แบตเตอรี่">ยานยนต์/แบตเตอรี่</option>
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="block text-[11px] font-bold text-slate-500 mb-1">6. ลิงก์ใบตรวจเช็ค PM (URL)</label>
                    <input
                      type="url"
                      placeholder="https://..."
                      value={newMcUrl}
                      onChange={(e) => setNewMcUrl(e.target.value)}
                      className="w-full p-2.5 border rounded-lg outline-none focus:ring-1 focus:ring-green-500 font-mono"
                    />
                  </div>

                  <div className="pt-3 border-t flex justify-end space-x-2">
                    <button
                      type="button"
                      onClick={() => setIsAddMachineOpen(false)}

                    </button>
                    <button
                      type="submit"
                      className="py-2 px-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow"
                    >
                      เพิ่มข้อมูลสำเร็จ
                    </button>
                  </div>
                </form>
              </div>
            </div>
