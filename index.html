          {isEditMachineOpen && editingMachine && (

                  <button onClick={() => setIsEditMachineOpen(false)} className="text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-5 h-5">

                        <option value="B">Rank B (กลาง)</option>
                        <option value="L">Rank L (ทั่วไป)</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-500 mb-1">ประเภทเครื่องจักร *</label>
                      <select
                        value={editingMachine.type || "ไฟฟ้า/เครื่องจักร"}
                        onChange={(e) => setEditingMachine({ ...editingMachine, type: e.target.value })}
                        className="w-full p-2.5 border rounded-lg outline-none focus:ring-1 focus:ring-green-500 bg-white font-bold"
                      >
                        <option value="ไฟฟ้า/เครื่องจักร">ไฟฟ้า/เครื่องจักร</option>
                        <option value="อาคาร/สถานที่">อาคาร/สถานที่</option>
                        <option value="ยานยนต์/แบตเตอรี่">ยานยนต์/แบตเตอรี่</option>
                      </select>
                    </div>
                  </div>

                  <div>
                    <label className="block text-[11px] font-bold text-slate-500 mb-1">ลิงก์ใบเช็คชีต PM (URL)</label>

                      className="w-full p-2.5 border rounded-lg outline-none focus:ring-1 focus:ring-green-500 font-mono"
                    />
                  </div>

                  <div className="pt-3 border-t flex justify-end space-x-2">
                    <button
                      type="button"
                      onClick={() => setIsEditMachineOpen(false)}
                      className="py-2 px-4 border text-slate-500 font-bold rounded-lg hover:bg-slate-50"
                    >
                      ยกเลิก
                    </button>
                    <button
                      type="submit"
                      className="py-2 px-4 bg-green-600 hover:bg-green-700 text-white font-bold rounded-lg shadow"
                    >
                      บันทึกการแก้ไข
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* ======================================================== */}
          {/* โมดอล: จัดการเพิ่ม/แก้ไขผู้ใช้งาน (Admin เท่านั้น) */}
          {/* ======================================================== */}
          {isUserModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border-t-8 border-indigo-600 p-6 space-y-4 animate-scaleIn">

                      <line x1="18" y1="6" x2="6" y2="18"></line>

              <div className="bg-white w-full max-w-md rounded-2xl shadow-xl overflow-hidden border-t-8 border-green-600 p-6 space-y-4">

                  <div className="space-y-0.5">

                      className="w-full p-2.5 text-xs border rounded-lg outline-none bg-white font-bold"
                    >
                      <option value="">-- กรุณาเลือกพนักงาน --</option>
                      {users.map(u => (
                        <option key={u.id} value={u.name}>{u.name}</option>
                      ))}
                    </select>
                  </div>

                  <div>
                    <label className="block text-[11px] font-bold text-slate-500 mb-1">
                      2. ผู้ปฏิบัติงานร่วมทีม (เลือกได้สูงสุด 4 ท่าน)
                    </label>
                    <div className="grid grid-cols-2 gap-1.5 p-2 bg-slate-50 rounded-xl border border-slate-100">
                      {users.map(u => {
                        const isChecked = pmOperators.includes(u.name);
                        return (
                          <label key={u.id} className="flex items-center space-x-2 p-1 text-[11px] font-semibold text-slate-600 cursor-pointer hover:text-slate-900">
                            <input
                              type="checkbox"
                              checked={isChecked}
                              disabled={!isChecked && pmOperators.length >= 4}
                              onChange={() => {
                                if (isChecked) {
                                  setPmOperators(pmOperators.filter(item => item !== u.name));
                                } else if (pmOperators.length < 4) {
                                  setPmOperators([...pmOperators, u.name]);
                                }
                              }}
                              className="rounded text-green-600 focus:ring-green-500 w-3.5 h-3.5"
                            />
                            <span>{u.name}</span>
                          </label>
                        );
                      })}
                    </div>
                  </div>
                </div>

                <div className="pt-3 border-t flex items-center justify-between">
                  <span className="text-[9px] text-slate-400 italic">
                    * ข้อมูลจะล็อกลง Sheet Event_log อัตโนมัติ
                  </span>
                  
                  <div className="flex space-x-2">
                    <button
                      type="button"
                      onClick={() => setIsConfirmPmOpen(false)}
                      className="py-2 px-3 border text-slate-500 font-bold text-[11px] rounded-lg hover:bg-slate-50"
                    >
                      ยกเลิก
                    </button>
                    <button
                      onClick={handleConfirmPmRedirect}
                      className="py-2 px-4 bg-green-600 hover:bg-green-700 text-white font-bold text-[11px] rounded-lg shadow-sm flex items-center gap-1"
                    >
                      {/* SVG Check */}
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-3.5 h-3.5">
                        <polyline points="20 6 9 17 4 12"></polyline>
                      </svg>
                      บันทึก & เปิดทำ PM
                    </button>
                  </div>
                </div>

              </div>
            </div>
          )}

          {/* ======================================================== */}
          {/* คัสตอมโมดอล: ยืนยันการออกจากระบบ (Logout Confirm) */}
          {/* ======================================================== */}
          {isLogoutConfirmOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center space-y-4">
                <div className="w-16 h-16 bg-amber-50 text-amber-500 rounded-full flex items-center justify-center mx-auto border-2 border-amber-100">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                  </svg>
                </div>
                <div className="space-y-1">
                  <h3 className="font-extrabold text-slate-900 text-sm">ยืนยันออกจากระบบเพื่อสลับผู้ใช้?</h3>
                  <p className="text-xs text-slate-500 leading-relaxed">
                    คุณต้องการยกเลิกการเชื่อมต่อเซสชันปัจจุบันเพื่อล็อกอินเข้าสู่ระบบด้วยบัญชีอื่นใช่หรือไม่?
                  </p>
                </div>
                <div className="flex space-x-2 pt-2">
                  <button
                    type="button"
                    onClick={() => setIsLogoutConfirmOpen(false)}
                    className="flex-1 py-2.5 border text-slate-500 font-bold text-xs rounded-xl hover:bg-slate-50"
                  >
                    ยกเลิก
                  </button>
                  <button
                    type="button"
                    onClick={executeLogout}
                    className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold text-xs rounded-xl shadow-md transition-all active:scale-95"
                  >
                    ออกจากระบบ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ======================================================== */}
          {/* คัสตอมโมดอล: ยืนยันการลบเครื่องจักร (Delete Confirm) */}
          {/* ======================================================== */}
          {isDeleteConfirmOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center space-y-4">
                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto border-2 border-red-100">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                  </svg>
                </div>
                <div className="space-y-1">
                  <h3 className="font-extrabold text-slate-900 text-sm">ยืนยันการลบเครื่องจักร?</h3>
                  <p className="text-xs text-slate-500 leading-relaxed">
                    คุณแน่ใจหรือไม่ว่าต้องการนำเครื่องจักรนี้ออกจากระบบแผนงานหลัก? การกระทำนี้ไม่สามารถย้อนคืนได้
                  </p>
                </div>
                <div className="flex space-x-2 pt-2">
                  <button
                    type="button"
                    onClick={() => {
                      setIsDeleteConfirmOpen(false);
                      setMachineToDelete(null);
                    }}
                    className="flex-1 py-2.5 border text-slate-500 font-bold text-xs rounded-xl hover:bg-slate-50"
                  >
                    ยกเลิก
                  </button>
                  <button
                    type="button"
                    onClick={executeDeleteMachine}
                    className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold text-xs rounded-xl shadow-md transition-all active:scale-95"
                  >
                    ยืนยันการลบ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ======================================================== */}
          {/* คัสตอมโมดอล: ยืนยันการลบผู้ใช้งาน (User Delete Confirm) */}
          {/* ======================================================== */}
          {isUserDeleteConfirmOpen && userToDelete && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center space-y-4 animate-scaleIn">
                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto border-2 border-red-100">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                  </svg>
                </div>
                <div className="space-y-1">
                  <h3 className="font-extrabold text-slate-900 text-sm">ยืนยันนำพนักงานออกจากระบบ?</h3>
                  <p className="text-xs text-slate-500 leading-relaxed">
                    คุณต้องการลบข้อมูลสิทธิ์เข้าใช้งานของ <strong>คุณ{userToDelete.name}</strong> (รหัส {userToDelete.id}) ใช่หรือไม่?
                  </p>
                </div>
                <div className="flex space-x-2 pt-2">
                  <button
                    type="button"
                    onClick={() => {
                      setIsUserDeleteConfirmOpen(false);
                      setUserToDelete(null);
                    }}
                    className="flex-1 py-2.5 border text-slate-500 font-bold text-xs rounded-xl hover:bg-slate-50"
                  >
                    ยกเลิก
                  </button>
                  <button
                    type="button"
                    onClick={executeDeleteUser}
                    className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold text-xs rounded-xl shadow-md transition-all active:scale-95"
                  >
                    ยืนยันการลบ
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* ======================================================== */}
          {/* คัสตอมโมดอล: ยืนยันการล้างประวัติกิจกรรม (Clear Logs Confirm) */}
          {/* ======================================================== */}
          {isClearLogsConfirmOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-6 text-center space-y-4">
                <div className="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto border-2 border-red-100">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-8 h-8">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="15" y1="9" x2="9" y2="15"></line>
                    <line x1="9" y1="9" x2="15" y2="15"></line>
                  </svg>
                </div>
                <div className="space-y-1">
                  <h3 className="font-extrabold text-slate-900 text-sm">ยืนยันการล้างประวัติกิจกรรม?</h3>
                  <p className="text-xs text-slate-500 leading-relaxed">
                    คุณต้องการลบประวัติการเปิดปฏิบัติงาน PM ทั้งหมดออกจากระบบบราวเซอร์นี้ใช่หรือไม่? การกระทำนี้ไม่สามารถย้อนกลับได้
                  </p>
                </div>
                <div className="flex space-x-2 pt-2">
                  <button
                    type="button"
                    onClick={() => setIsClearLogsConfirmOpen(false)}
                    className="flex-1 py-2.5 border text-slate-500 font-bold text-xs rounded-xl hover:bg-slate-50"
                  >
                    ยกเลิก
                  </button>
                  <button
                    type="button"
                    onClick={() => {
                      setEventLogs([]);
                      setIsClearLogsConfirmOpen(false);
                    }}
                    className="flex-1 py-2.5 bg-red-600 hover:bg-red-700 text-white font-bold text-xs rounded-xl shadow-md transition-all active:scale-95"
                  >
                    ยืนยันล้างประวัติ
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
