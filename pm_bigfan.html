<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์ Big Fan - CP ALL</title>
  
  <!-- Tailwind CSS for Beautiful Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDN to run JSX directly in browser -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* ซ่อน scrollbar สำหรับส่วนแสดงผลพัดลมย่อยเพื่อให้แอปดูคลีนแบบ Mobile App */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body class="bg-slate-50">

  <!-- Root element for React App -->
  <div id="root"></div>

  <!-- React Code with Babel translation -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    // รายชื่อพัดลมยักษ์เริ่มต้น 7 ตัว ตามพื้นที่ DC ที่ระบุ
    const defaultFanNames = [
      "1. B/C 3-1",
      "2. B/C 3-2",
      "3. Loading -1",
      "4. Loading -2",
      "5. รับสินค้า -1",
      "6. รับสินค้า -2",
      "7. รับคืนสินค้า -1"
    ];

    const initialFanState = defaultFanNames.map((name, index) => ({
      id: index + 1,
      name: name,
      status: 'ปกติ',         // ปกติ / ไม่ปกติ
      cleaning: 'ใช่',        // ใช่ / ไม่ใช่
      // กระแสไฟฟ้า 3 เฟส + N (แอมป์) - รองรับทศนิยม 2 ตำแหน่ง
      current_f1: '',
      current_f2: '',
      current_f3: '',
      current_fn: '0',        // ตั้งค่ากระแสเฟส N เริ่มต้นให้เป็น 0
      // แรงดันไฟฟ้า 3 เฟส (โวลท์) - Default 380V
      voltage_12: '380',
      voltage_23: '380',
      voltage_13: '380'
    }));

    function App() {
      // ดึงค่า URL ของ Google Apps Script จาก LocalStorage เพื่อความสะดวกในการเปลี่ยนลิงก์ยืดหยุ่นบนโทรศัพท์
      const [googleUrl, setGoogleUrl] = useState(() => {
        return localStorage.getItem("pm_bigfan_sheet_url") || "";
      });
      const [isSettingOpen, setIsSettingOpen] = useState(false);
      const [inputUrl, setInputUrl] = useState(googleUrl);

      const assignerList = ["เกรียงศักดิ์", "ณรงค์", "รัฐชานนท์"];
      const operatorList = ["ณรงค์", "รัฐชานนท์", "บัญชา", "วสุพล", "ศรายุทธ", "พิพัฒน์", "ศรราม เอี่ยมอาจ", "วงศธร", "เกรียงศักดิ์"];

      // --- State จัดการข้อมูลแบบฟอร์ม ---
      const [formData, setFormData] = useState({
        assigner: "เกรียงศักดิ์",
        operator1: "",
        operator2: "",
        operator3: "",
        operator4: "",
        pmDate: new Date().toISOString().split('T')[0], // วันปัจจุบันเป็น Default
        startTime: "",
        endTime: "",
        summaryText: "",
        overallStatus: "ปกติ",
      });

      // จัดการกับข้อมูลจุดเช็คพัดลม Big Fan
      const [fans, setFans] = useState(() => {
        // โหลดประวัติพัดลมล่าสุดจาก LocalStorage (ถ้ามี)
        const saved = localStorage.getItem("pm_bigfan_fans");
        if (saved) {
          const parsed = JSON.parse(saved);
          return parsed.map(fan => ({
            id: fan.id,
            name: fan.name,
            status: fan.status || 'ปกติ',
            cleaning: fan.cleaning || 'ใช่',
            current_f1: fan.current_f1 !== undefined ? fan.current_f1 : '',
            current_f2: fan.current_f2 !== undefined ? fan.current_f2 : '',
            current_f3: fan.current_f3 !== undefined ? fan.current_f3 : '',
            current_fn: fan.current_fn !== undefined ? fan.current_fn : '0', // ตั้งค่าเฟส N เริ่มต้นเป็น 0
            voltage_12: fan.voltage_12 !== undefined ? fan.voltage_12 : '380',
            voltage_23: fan.voltage_23 !== undefined ? fan.voltage_23 : '380',
            voltage_13: fan.voltage_13 !== undefined ? fan.voltage_13 : '380'
          }));
        }
        return initialFanState;
      });

      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null); // 'success', 'error'
      const [customError, setCustomError] = useState("");
      const [searchTerm, setSearchTerm] = useState("");

      // --- State สำหรับ PopUp จัดการรายการพัดลม ---
      const [isManageModalOpen, setIsManageModalOpen] = useState(false);
      const [editableFans, setEditableFans] = useState([]);
      const [newFanName, setNewFanName] = useState("");
      const [syncStatus, setSyncStatus] = useState("idle");

      // บันทึก URL ตัวเชื่อม Sheets ลงความจำเครื่อง
      const handleSaveUrlSetting = (e) => {
        e.preventDefault();
        const trimmed = inputUrl.trim();
        localStorage.setItem("pm_bigfan_sheet_url", trimmed);
        setGoogleUrl(trimmed);
        setIsSettingOpen(false);
        alert("บันทึก URL ตัวซิงก์ข้อมูลพัดลมสำเร็จ!");
      };

      // ฟังก์ชันจัดการอัปเดตฟอร์มหลัก
      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      // จัดการอัปเดตค่าพัดลมยักษ์แต่ละตัว
      const handleFanCheck = (id, field, value) => {
        setFans(prev => prev.map(fan => 
          fan.id === id ? { ...fan, [field]: value } : fan
        ));
      };

      const checkAll = (statusVal, cleaningVal) => {
        setFans(prev => prev.map(fan => ({ 
          ...fan, 
          status: statusVal !== null ? statusVal : fan.status, 
          cleaning: cleaningVal !== null ? cleaningVal : fan.cleaning 
        })));
      };

      // --- เปิดปิดหน้าต่างตั้งค่าพัดลมยักษ์ ---
      const openManageModal = () => {
        setEditableFans(fans.map(f => ({ ...f })));
        setNewFanName("");
        setIsManageModalOpen(true);
      };

      const handleAddFan = (e) => {
        e.preventDefault();
        if (!newFanName.trim()) return;
        
        const nextId = editableFans.length > 0 
          ? Math.max(...editableFans.map(f => f.id)) + 1 
          : 1;

        setEditableFans([...editableFans, {
          id: nextId,
          name: newFanName.trim(),
          status: 'ปกติ',
          cleaning: 'ใช่',
          current_f1: '',
          current_f2: '',
          current_f3: '',
          current_fn: '0', // เฟส N เริ่มต้นเป็น 0
          voltage_12: '380',
          voltage_23: '380',
          voltage_13: '380'
        }]);
        setNewFanName("");
      };

      const handleRemoveFan = (id) => {
        setEditableFans(editableFans.filter(f => f.id !== id));
      };

      const handleEditFanName = (id, newName) => {
        setEditableFans(editableFans.map(f => 
          f.id === id ? { ...f, name: newName } : f
        ));
      };

      const saveFanSettings = () => {
        setSyncStatus("saving");
        setFans(editableFans);
        // บันทึกเก็บลงใน LocalStorage
        localStorage.setItem("pm_bigfan_fans", JSON.stringify(editableFans));
        
        setSyncStatus("saved");
        setTimeout(() => {
          setIsManageModalOpen(false);
          setSyncStatus("idle");
        }, 800);
      };

      // --- ส่งข้อมูลแบบฟอร์มบันทึกผลไปยัง Google Sheet ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        // ตรวจเช็คข้อมูลเวลา
        if (!formData.startTime || !formData.endTime) {
          setCustomError("กรุณาระบุ 'เวลาเริ่ม' และ 'เวลาสิ้นสุด' ในการปฏิบัติงาน PM ด้วยครับ");
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        // ตรวจเช็คข้อมูลช่างผู้ปฏิบัติงานอย่างน้อย 1 คน
        if (!formData.operator1 && !formData.operator2 && !formData.operator3 && !formData.operator4) {
          setCustomError("กรุณาระบุ 'ผู้ปฏิบัติงาน' ร่วมทีมอย่างน้อย 1 ท่าน เพื่อลงบันทึกในระบบประวัติ");
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        // ค้นหาตำแหน่งพัดลมที่ข้อมูลกระแสไฟฟ้าไม่ครบถ้วน
        const incompleteCurrents = fans.filter(fanItem => 
          fanItem.current_f1 === undefined || fanItem.current_f1 === null || fanItem.current_f1.toString().trim() === "" ||
          fanItem.current_f2 === undefined || fanItem.current_f2 === null || fanItem.current_f2.toString().trim() === "" ||
          fanItem.current_f3 === undefined || fanItem.current_f3 === null || fanItem.current_f3.toString().trim() === "" ||
          fanItem.current_fn === undefined || fanItem.current_fn === null || fanItem.current_fn.toString().trim() === ""
        );
        
        if (incompleteCurrents.length > 0) {
          const names = incompleteCurrents.map(f => f.name).join(", ");
          setCustomError(`กรุณากรอกข้อมูล "วัดกระแสไฟฟ้า (แอมป์)" ทุกเฟส (F1, F2, F3, FN) ของพัดลมเหล่านี้ให้ครบถ้วนก่อนส่งงานครับ (หากพัดลมชำรุดหรือไม่ได้เปิดใช้งานให้พิมพ์เลข 0): ${names}`);
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        // ค้นหาตำแหน่งพัดลมที่ข้อมูลแรงดันไฟฟ้าไม่ครบถ้วน
        const incompleteVoltages = fans.filter(fanItem => 
          fanItem.voltage_12 === undefined || fanItem.voltage_12 === null || fanItem.voltage_12.toString().trim() === "" ||
          fanItem.voltage_23 === undefined || fanItem.voltage_23 === null || fanItem.voltage_23.toString().trim() === "" ||
          fanItem.voltage_13 === undefined || fanItem.voltage_13 === null || fanItem.voltage_13.toString().trim() === ""
        );
        
        if (incompleteVoltages.length > 0) {
          const names = incompleteVoltages.map(f => f.name).join(", ");
          setCustomError(`กรุณากรอกข้อมูล "วัดแรงดันไฟฟ้า (โวลท์)" ทุกเฟส (F1-2, F2-3, F1-3) ของพัดลมเหล่านี้ให้ครบถ้วนก่อนส่งงานครับ: ${names}`);
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        const trimmedUrl = googleUrl ? googleUrl.trim() : "";
        if (!trimmedUrl || trimmedUrl === "" || trimmedUrl.includes("example/exec")) {
          setCustomError("กรุณากดไอคอนรูปเฟือง ⚙️ ด้านขวาบนของแอปเพื่อตั้งค่าและวางลิงก์ Google Apps Script ก่อนส่งข้อมูลครั้งแรกครับ");
          window.scrollTo({ top: 0, behavior: 'smooth' });
          return;
        }

        setIsSubmitting(true);

        const payload = {
          timestamp: new Date().toLocaleString('th-TH'),
          ...formData,
          checklist: fans
        };

        try {
          // ใช้โหมด no-cors และ URLSearchParams เพื่อส่งข้อมูลข้าม Domain อย่างปลอดภัย
          await fetch(trimmedUrl, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (error) {
          console.error("Submit Error:", error);
          setSubmitStatus('error');
          setCustomError("การเชื่อมต่อฐานข้อมูลล้มเหลว กรุณาตรวจสอบอินเทอร์เน็ต และสิทธิ์การ Deploy ใน Google Apps Script");
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } finally {
          setIsSubmitting(false);
        }
      };

      const filteredFans = fans.filter(fan => 
        fan.name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return (
        <div className="min-h-screen bg-slate-50 pb-20 font-sans text-slate-800">
          
          {/* Header กระดาษทางการตามสเปก CP ALL */}
          <header className="bg-white shadow-md border-b border-green-500 border-b-4 sticky top-0 z-30">
            <div className="p-4 max-w-md mx-auto">
              <div className="flex items-center justify-between">
                <span className="bg-green-600 text-white text-[10px] font-bold px-2 py-0.5 rounded">CP ALL</span>
                
                <div className="flex items-center space-x-1.5">
                  {/* ปุ่มตั้งค่าตัวเชื่อม Google App Script */}
                  <button 
                    type="button" 
                    onClick={() => { setInputUrl(googleUrl); setIsSettingOpen(true); }}
                    className="p-1 text-slate-500 hover:text-green-600 hover:bg-slate-100 rounded-lg transition-all"
                    title="ตั้งค่าลิงก์เชื่อมต่อชีต"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                  </button>
                  <span className="text-[10px] text-slate-400 font-medium flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-1 text-slate-400">
                      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                      <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                    ระบบมือถือหน้างาน
                  </span>
                </div>
              </div>
              <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
              <h2 className="text-xs font-bold text-slate-600 mt-0.5 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 mr-1.5 w-3.5 h-3.5">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์
              </h2>
              
              <div className="grid grid-cols-3 gap-1 mt-2 pt-2 border-t border-slate-100 text-[10px] text-slate-500 font-semibold">
                <div>รหัส: <span className="text-slate-800 font-bold">B3-FM-10-01-06</span></div>
                <div className="text-center">ปรับปรุงครั้งที่: <span className="text-slate-800 font-bold">0</span></div>
                <div className="text-right">ประกาศใช้: <span className="text-slate-800 font-bold">1 เม.ย. 2560</span></div>
              </div>
            </div>
          </header>

          <div className="max-w-md mx-auto p-4 space-y-5">
            
            {/* กล่องสถานะการบันทึก */}
            {submitStatus === 'success' && (
              <div className="bg-green-100 border-2 border-green-400 text-green-800 p-4 rounded-xl flex items-start shadow-sm animate-fadeIn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 w-5 h-5 mr-2 shrink-0 mt-0.5">
                  <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                  <polyline points="22 4 12 14.01 9 11.01" />
                </svg>
                <div>
                  <p className="font-bold text-sm">บันทึกเรียบร้อย!</p>
                  <p className="text-xs mt-0.5 font-medium">ส่งผลการตรวจ PM เข้า Google Sheet เรียบร้อยแล้ว</p>
                </div>
              </div>
            )}
            
            {(submitStatus === 'error' || customError) && (
              <div className="bg-red-100 border-2 border-red-400 text-red-800 p-4 rounded-xl flex items-start shadow-sm animate-fadeIn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 w-5 h-5 mr-2 shrink-0 mt-0.5">
                  <circle cx="12" cy="12" r="10" />
                  <line x1="12" y1="8" x2="12" y2="12" />
                  <line x1="12" y1="16" x2="12.01" y2="16" />
                </svg>
                <div>
                  <p className="font-bold text-sm">การกรอกข้อมูลไม่ครบถ้วน / เกิดข้อผิดพลาด</p>
                  <p className="text-xs mt-1.5 font-bold text-red-700 bg-white/50 p-2 rounded-lg border border-red-200 leading-relaxed">{customError || "กรุณากรอกแรงดันและกระแสไฟฟ้า 3 เฟสในตารางด้านล่างให้ครบถ้วน"}</p>
                </div>
              </div>
            )}

            <form onSubmit={handleSubmit} className="space-y-5">
              
              {/* ข้อมูลอุปกรณ์และสถานที่ */}
              <section className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-4">
                <div className="flex items-center text-green-700 font-bold border-b pb-2 text-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-2">
                    <circle cx="12" cy="12" r="3" />
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                  </svg>
                  <span>ข้อมูลอุปกรณ์ & สถานที่</span>
                </div>

                <div className="grid grid-cols-2 gap-3 text-xs">
                  <div>
                    <span className="text-slate-400">เครื่องจักร/อุปกรณ์</span>
                    <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-lg border">Big fan</p>
                  </div>
                  <div>
                    <span className="text-slate-400">ความถี่</span>
                    <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-lg border">รอบประจำเดือน</p>
                  </div>
                </div>

                <div>
                  <span className="text-xs text-slate-400">สถานที่</span>
                  <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-lg border flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3.5 h-3.5">
                      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                      <circle cx="12" cy="10" r="3" />
                    </svg>
                    อาคาร DC
                  </p>
                </div>

                {/* วันที่ทำ PM ใต้กล่องสถานที่ */}
                <div>
                  <label className="block text-xs text-slate-400 mb-1 font-bold">วันที่ทำ PM</label>
                  <div className="flex items-center border rounded-lg px-3 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-4 h-4">
                      <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                      <line x1="16" y1="2" x2="16" y2="6" />
                      <line x1="8" y1="2" x2="8" y2="6" />
                      <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    <input 
                      type="date" 
                      name="pmDate" 
                      value={formData.pmDate} 
                      onChange={handleInputChange} 
                      required 
                      className="w-full py-1 text-xs outline-none bg-transparent font-semibold" 
                    />
                  </div>
                </div>

                {/* เวลาปฏิบัติงาน */}
                <div className="grid grid-cols-2 gap-3">
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาเริ่ม</label>
                    <div className="flex items-center border rounded-lg px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3.5 h-3.5">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                      </svg>
                      <input 
                        type="time" 
                        name="startTime" 
                        value={formData.startTime} 
                        onChange={handleInputChange} 
                        className="w-full py-1 text-xs outline-none bg-transparent" 
                      />
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาสิ้นสุด</label>
                    <div className="flex items-center border rounded-lg px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3.5 h-3.5">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 6 12 12 16 14" />
                      </svg>
                      <input 
                        type="time" 
                        name="endTime" 
                        value={formData.endTime} 
                        onChange={handleInputChange} 
                        className="w-full py-1 text-xs outline-none bg-transparent" 
                      />
                    </div>
                  </div>
                </div>
              </section>

              {/* ทีมงานผู้ปฏิบัติงาน */}
              <section className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-4">
                <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                    <circle cx="9" cy="7" r="4" />
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                    <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                  </svg>
                  <span>ทีมงานที่ปฏิบัติการ</span>
                </div>

                <div>
                  <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้มอบหมายงาน</label>
                  <input 
                    list="assigners" 
                    name="assigner" 
                    value={formData.assigner} 
                    onChange={handleInputChange} 
                    placeholder="เลือกหรือระบุชื่อผู้มอบหมาย..."
                    className="w-full p-2.5 text-xs border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                  />
                  <datalist id="assigners">
                    {assignerList.map((name, idx) => <option key={idx} value={name} />)}
                  </datalist>
                </div>

                <div>
                  <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงาน (ใส่ได้สูงสุด 4 คน)</label>
                  <div className="grid grid-cols-2 gap-2 mt-1">
                    {[1, 2, 3, 4].map(num => (
                      <div key={num} className="flex items-center border rounded-lg px-2 bg-white focus-within:ring-2 focus-within:ring-blue-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-1.5 w-3.5 h-3.5">
                          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                          <circle cx="12" cy="7" r="4" />
                        </svg>
                        <input 
                          list="operators" 
                          name={`operator${num}`} 
                          value={formData[`operator${num}`]} 
                          onChange={handleInputChange}
                          placeholder={`คนที่ ${num}`}
                          className="w-full py-2 text-xs outline-none bg-transparent"
                        />
                      </div>
                    ))}
                  </div>
                  <datalist id="operators">
                    {operatorList.map((name, idx) => <option key={idx} value={name} />)}
                  </datalist>
                </div>
              </section>

              {/* รายการพัดลม Big Fan ตรวจเช็ค */}
              <section className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-4">
                <div className="flex items-center justify-between border-b pb-2">
                  <div className="flex items-center text-teal-700 font-bold text-sm">
                    {/* SVG พัดลมเป่าลม */}
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-2">
                      <circle cx="12" cy="12" r="10" />
                      <circle cx="12" cy="12" r="3" />
                      <path d="M12 2v7M12 15v7M2 12h7M15 12h7" />
                    </svg>
                    <span>ตรวจเช็ค Big Fan ({fans.length} จุด)</span>
                  </div>
                  
                  {/* ปุ่มเปลี่ยนโครงสร้างพัดลมหน้างาน */}
                  <button
                    type="button"
                    onClick={openManageModal}
                    className="flex items-center text-xs text-teal-600 bg-teal-50 border border-teal-100 px-2.5 py-1 rounded-lg hover:bg-teal-100 font-bold transition-all animate-pulse"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-1 text-teal-600">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    จัดการรายการพัดลม ⚙
                  </button>
                </div>

                {/* ตัวช่วยกรองค้นหา และเลือกพร้อมกัน */}
                <div className="space-y-2">
                  <div className="flex items-center border rounded-lg px-3 py-1.5 bg-slate-50 text-xs focus-within:bg-white focus-within:ring-2 focus-within:ring-teal-500">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-4 h-4">
                      <circle cx="11" cy="11" r="8" />
                      <line x1="21" y1="21" x2="16.65" y2="16.65" />
                    </svg>
                    <input
                      type="text"
                      placeholder="ค้นหาชื่อพัดลม..."
                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}
                      className="w-full bg-transparent outline-none py-0.5"
                    />
                    {searchTerm && (
                      <button type="button" onClick={() => setSearchTerm("")}>
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 hover:text-slate-600 w-4 h-4">
                          <line x1="18" y1="6" x2="6" y2="18" />
                          <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                      </button>
                    )}
                  </div>

                  <div className="flex justify-end space-x-1.5 text-[10px]">
                    <button 
                      type="button" 
                      onClick={() => checkAll('ปกติ', 'ใช่')} 
                      className="px-2.5 py-1.5 text-green-700 bg-green-50 hover:bg-green-100 border border-green-200 rounded-lg font-bold transition-all"
                    >
                      เซ็ต "ปกติ/ทำความสะอาดแล้ว" ทั้งหมด
                    </button>
                  </div>
                </div>

                {/* รายการการตรวจสอบพัดลมยักษ์แต่ละตัว */}
                <div className="space-y-3.5 max-h-[500px] overflow-y-auto pr-1 no-scrollbar pb-2">
                  {filteredFans.length === 0 ? (
                    <p className="text-center text-slate-400 text-xs py-10">ไม่พบจุดพัดลม Big Fan ตามที่ระบุ</p>
                  ) : (
                    filteredFans.map((fan, index) => (
                      <div key={fan.id} className="p-3 bg-slate-50 rounded-2xl border border-slate-150 shadow-sm space-y-3">
                        
                        {/* ชื่อพัดลม */}
                        <div className="font-bold text-xs text-slate-700 flex items-center justify-between border-b pb-1.5">
                          <div className="flex items-center">
                            <span className="bg-slate-200 text-slate-700 text-[10px] px-1.5 py-0.5 rounded mr-1.5 shrink-0">
                              จุดที่ {index + 1}
                            </span>
                            <span className="truncate">{fan.name}</span>
                          </div>
                        </div>
                        
                        {/* ตารางฟอร์มรายการกรอกค่าและสถานะ */}
                        <div className="space-y-3">
                          
                          {/* 1. สถานะการทำงาน */}
                          <div className="grid grid-cols-3 gap-2 items-center">
                            <span className="text-[11px] text-slate-500 font-bold">1. สถานะการทำงาน</span>
                            <div className="col-span-2 flex space-x-1">
                              <button
                                type="button"
                                onClick={() => handleFanCheck(fan.id, 'status', 'ปกติ')}
                                className={`flex-1 py-1.5 text-[11px] font-bold rounded-lg border ${fan.status === 'ปกติ' ? 'bg-green-500 text-white border-green-600' : 'bg-white text-slate-500 border-slate-200'}`}
                              >
                                ปกติ
                              </button>
                              <button
                                type="button"
                                onClick={() => handleFanCheck(fan.id, 'status', 'ไม่ปกติ')}
                                className={`flex-1 py-1.5 text-[11px] font-bold rounded-lg border ${fan.status === 'ไม่ปกติ' ? 'bg-red-500 text-white border-red-600' : 'bg-white text-slate-500 border-slate-200'}`}
                              >
                                ไม่ปกติ
                              </button>
                            </div>
                          </div>

                          {/* 2. ทำความสะอาดตู้ควบคุม */}
                          <div className="grid grid-cols-3 gap-2 items-center">
                            <span className="text-[11px] text-slate-500 font-bold">2. ทำความสะอาดตู้</span>
                            <div className="col-span-2 flex space-x-1">
                              <button
                                type="button"
                                onClick={() => { handleFanCheck(fan.id, 'cleaning', 'ใช่') }}
                                className={`flex-1 py-1.5 text-[11px] font-bold rounded-lg border ${fan.cleaning === 'ใช่' ? 'bg-indigo-500 text-white border-indigo-600' : 'bg-white text-slate-500 border-slate-200'}`}
                              >
                                ใช่ (ทำแล้ว)
                              </button>
                              <button
                                type="button"
                                onClick={() => { handleFanCheck(fan.id, 'cleaning', 'ไม่ใช่') }}
                                className={`flex-1 py-1.5 text-[11px] font-bold rounded-lg border ${fan.cleaning === 'ไม่ใช่' ? 'bg-amber-50 text-white border-amber-600' : 'bg-white text-slate-500 border-slate-200'}`}
                              >
                                ไม่ใช่
                              </button>
                            </div>
                          </div>

                          {/* 3. วัดกระแสไฟฟ้า 3 เฟส + N (แอมป์) */}
                          <div className="space-y-1.5 border-t border-slate-200 pt-2">
                            <span className="text-[11px] text-slate-500 font-bold block mb-1">3. วัดกระแสไฟฟ้า 3 เฟส (แอมป์) *</span>
                            <div className="grid grid-cols-2 gap-2">
                              {/* เฟส 1 */}
                              <div className="relative">
                                <input
                                  type="number"
                                  step="0.01"
                                  min="0"
                                  placeholder="เช่น 2.45"
                                  value={fan.current_f1}
                                  onChange={(e) => handleFanCheck(fan.id, 'current_f1', e.target.value)}
                                  className="w-full pl-8 pr-3 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none"
                                />
                                <span className="absolute left-2 top-1.5 text-[10px] text-slate-400 font-bold">F1:</span>
                                <span className="absolute right-2 top-1.5 text-[9px] text-slate-300">A</span>
                              </div>
                              {/* เฟส 2 */}
                              <div className="relative">
                                <input
                                  type="number"
                                  step="0.01"
                                  min="0"
                                  placeholder="เช่น 2.40"
                                  value={fan.current_f2}
                                  onChange={(e) => handleFanCheck(fan.id, 'current_f2', e.target.value)}
                                  className="w-full pl-8 pr-3 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none"
                                />
                                <span className="absolute left-2 top-1.5 text-[10px] text-slate-400 font-bold">F2:</span>
                                <span className="absolute right-2 top-1.5 text-[9px] text-slate-300">A</span>
                              </div>
                              {/* เฟส 3 */}
                              <div className="relative">
                                <input
                                  type="number"
                                  step="0.01"
                                  min="0"
                                  placeholder="เช่น 2.48"
                                  value={fan.current_f3}
                                  onChange={(e) => handleFanCheck(fan.id, 'current_f3', e.target.value)}
                                  className="w-full pl-8 pr-3 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none"
                                />
                                <span className="absolute left-2 top-1.5 text-[10px] text-slate-400 font-bold">F3:</span>
                                <span className="absolute right-2 top-1.5 text-[9px] text-slate-300">A</span>
                              </div>
                              {/* เฟส N */}
                              <div className="relative">
                                <input
                                  type="number"
                                  step="0.01"
                                  min="0"
                                  placeholder="เช่น 0.05"
                                  value={fan.current_fn}
                                  onChange={(e) => handleFanCheck(fan.id, 'current_fn', e.target.value)}
                                  className="w-full pl-8 pr-3 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none"
                                />
                                <span className="absolute left-2 top-1.5 text-[10px] text-slate-400 font-bold">FN:</span>
                                <span className="absolute right-2 top-1.5 text-[9px] text-slate-300">A</span>
                              </div>
                            </div>
                          </div>

                          {/* 4. วัดแรงดันไฟฟ้า 3 เฟส (โวลท์) */}
                          <div className="space-y-1.5 border-t border-slate-200 pt-2">
                            <span className="text-[11px] text-slate-500 font-bold block mb-1">4. วัดแรงดันไฟฟ้า 3 เฟส (โวลท์) *</span>
                            <div className="grid grid-cols-3 gap-1.5">
                              {/* เฟส 1-2 */}
                              <div className="relative">
                                <input
                                  type="number"
                                  min="0"
                                  placeholder="1-2"
                                  value={fan.voltage_12}
                                  onChange={(e) => handleFanCheck(fan.id, 'voltage_12', e.target.value)}
                                  className="w-full pl-10 pr-2 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none font-semibold text-slate-700"
                                />
                                <span className="absolute left-1.5 top-1.5 text-[9px] text-slate-400 font-bold">F1-2:</span>
                                <span className="absolute right-1 top-2 text-[8px] text-slate-300">V</span>
                              </div>
                              {/* เฟส 2-3 */}
                              <div className="relative">
                                <input
                                  type="number"
                                  min="0"
                                  placeholder="2-3"
                                  value={fan.voltage_23}
                                  onChange={(e) => handleFanCheck(fan.id, 'voltage_23', e.target.value)}
                                  className="w-full pl-10 pr-2 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none font-semibold text-slate-700"
                                />
                                <span className="absolute left-1.5 top-1.5 text-[9px] text-slate-400 font-bold">F2-3:</span>
                                <span className="absolute right-1 top-2 text-[8px] text-slate-300">V</span>
                              </div>
                              {/* เฟส 1-3 */}
                              <div className="relative">
                                <input
                                  type="number"
                                  min="0"
                                  placeholder="1-3"
                                  value={fan.voltage_13}
                                  onChange={(e) => handleFanCheck(fan.id, 'voltage_13', e.target.value)}
                                  className="w-full pl-10 pr-2 py-1.5 text-xs border rounded-lg focus:ring-1 focus:ring-teal-500 outline-none font-semibold text-slate-700"
                                />
                                <span className="absolute left-1.5 top-1.5 text-[9px] text-slate-400 font-bold">F1-3:</span>
                                <span className="absolute right-1 top-2 text-[8px] text-slate-300">V</span>
                              </div>
                            </div>
                          </div>

                        </div>
                      </div>
                    ))
                  )}
                </div>
              </section>

              {/* บันทึกข้อความผลสรุปภาพรวม */}
              <section className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-4">
                <div className="flex items-center text-orange-600 font-bold border-b pb-2 text-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-2">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                  <span>สรุปผลการ PM</span>
                </div>

                <div>
                  <label className="block text-xs text-slate-500 mb-2 font-bold">สรุปผลภาพรวม</label>
                  <div className="flex space-x-2">
                    <button
                      type="button"
                      onClick={() => setFormData(p => ({ ...p, overallStatus: 'ปกติ' }))}
                      className={`flex-1 flex items-center justify-center p-2.5 rounded-xl border font-bold text-xs transition-all ${formData.overallStatus === 'ปกติ' ? 'bg-green-500 text-white border-green-600 shadow-sm' : 'bg-white text-slate-600 border-slate-200'}`}
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-1.5">
                        <circle cx="12" cy="12" r="10" />
                        <polyline points="12 8 12 12 16 14" />
                      </svg>
                      ปกติ
                    </button>
                    <button
                      type="button"
                      onClick={() => setFormData(p => ({ ...p, overallStatus: 'ไม่ปกติ' }))}
                      className={`flex-1 flex items-center justify-center p-2.5 rounded-xl border font-bold text-xs transition-all ${formData.overallStatus === 'ไม่ปกติ' ? 'bg-red-50 text-white border-red-600 shadow-sm' : 'bg-white text-slate-600 border-slate-200'}`}
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-1.5">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                      </svg>
                      ไม่ปกติ
                    </button>
                  </div>
                </div>

                <div>
                  <label className="block text-xs text-slate-500 mb-1 font-bold">สรุปรายละเอียดเพิ่มเติม / รายละเอียดปัญหาที่เจอ</label>
                  <textarea 
                    name="summaryText" 
                    value={formData.summaryText} 
                    onChange={handleInputChange}
                    rows="3" 
                    className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-xs"
                    placeholder="ใส่ข้อความหมายเหตุ หรือปัญหาที่แก้ไขฝั่งพัดลม Big Fan..."
                  ></textarea>
                </div>
              </section>

              {/* ปุ่มยืนยันการส่งข้อมูล */}
              <div className="bg-white p-3 rounded-2xl shadow-sm border border-slate-100">
                <button 
                  type="submit" 
                  disabled={isSubmitting}
                  className={`w-full py-4 rounded-xl font-bold text-sm text-white shadow-md flex justify-center items-center transition-all ${isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 active:scale-95'}`}
                >
                  {isSubmitting ? (
                    <span className="flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin mr-2 w-4 h-4">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                      </svg>
                      กำลังส่งรายงาน PM เข้าคลาวด์...
                    </span>
                  ) : (
                    <span className="flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 mr-2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                      </svg>
                      <span>ยืนยันส่งข้อมูล PM เข้าระบบคลาวด์</span>
                    </span>
                  )}
                </button>
              </div>

            </form>
          </div>

          {/* POPUP ตั้งค่าปุ่มวางลิงก์ Google Apps Script URL */}
          {isSettingOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full max-w-sm p-5 shadow-2xl space-y-4 animate-scaleIn">
                <div className="flex justify-between items-center border-b pb-2">
                  <h3 className="font-bold text-slate-800 text-sm">⚙️ ตั้งค่าระบบประวัติ (Apps Script Web App)</h3>
                  <button type="button" onClick={() => setIsSettingOpen(false)}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 w-5 h-5">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>
                
                <p className="text-[11px] text-slate-500 leading-relaxed">
                  นำลิงก์ Web App (ที่ได้จากขั้นตอนการ Deploy "Everyone" ใน Google Sheet ของคุณ) มาวางที่นี่เพื่อทำการซิงก์ข้อมูลตรวจเช็คพัดลม Big Fan
                </p>

                <form onSubmit={handleSaveUrlSetting} className="space-y-3">
                  <div>
                    <label className="block text-[10px] font-bold text-slate-400 mb-1">Web App URL (ลงท้ายด้วย /exec)</label>
                    <input
                      type="url"
                      required
                      placeholder="https://script.google.com/macros/s/.../exec"
                      value={inputUrl}
                      onChange={(e) => setInputUrl(e.target.value)}
                      className="w-full p-2 text-xs border rounded-lg focus:ring-1 focus:ring-green-500 outline-none font-mono text-slate-600"
                    />
                  </div>
                  <button type="submit" className="w-full py-2.5 bg-green-600 hover:bg-green-700 text-white font-bold text-xs rounded-lg shadow">
                    บันทึกที่อยู่เซิร์ฟเวอร์
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* POPUP สำหรับการตั้งค่าลบ/เพิ่มรายชื่อพัดลมในเครื่องได้เอง */}
          {isManageModalOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full max-w-md max-h-[80vh] flex flex-col shadow-2xl overflow-hidden animate-scaleIn">
                <div className="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center">
                  <div>
                    <h3 className="font-bold text-slate-800 text-xs">แก้ไขโครงสร้างพัดลม Big Fan</h3>
                    <p className="text-[9px] text-slate-500">สามารถเพิ่ม ลบ และอัปเดตชื่อพัดลมเพื่อใช้หน้างาน</p>
                  </div>
                  <button type="button" onClick={() => setIsManageModalOpen(false)}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 w-5 h-5">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>

                <form onSubmit={handleAddFan} className="p-3 border-b bg-slate-50 flex space-x-2">
                  <input
                    type="text"
                    placeholder="ชื่อพัดลม เช่น 8. รับคืนสินค้า -2..."
                    value={newFanName}
                    onChange={(e) => setNewFanName(e.target.value)}
                    className="flex-1 px-3 py-2 text-xs border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none"
                  />
                  <button type="submit" className="px-4 py-2 bg-teal-600 text-white text-xs font-bold rounded-lg flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="mr-1 w-3.5 h-3.5">
                      <line x1="12" y1="5" x2="12" y2="19" />
                      <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    เพิ่ม
                  </button>
                </form>

                <div className="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar">
                  {editableFans.map((fan, idx) => (
                    <div key={fan.id} className="flex items-center space-x-2 bg-slate-50 p-2 rounded-lg border">
                      <span className="text-[10px] font-bold text-slate-400 w-6 text-center">#{idx + 1}</span>
                      <input
                        type="text"
                        value={fan.name}
                        onChange={(e) => handleEditFanName(fan.id, e.target.value)}
                        className="flex-1 bg-white border border-slate-200 rounded px-2.5 py-1 text-xs outline-none focus:ring-1 focus:ring-teal-500"
                      />
                      <button type="button" onClick={() => handleRemoveFan(fan.id)} className="p-1 hover:text-red-500 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4">
                          <polyline points="3 6 5 6 21 6" />
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                      </button>
                    </div>
                  ))}
                </div>

                <div className="bg-slate-100 p-3 flex justify-end space-x-2 border-t">
                  <button type="button" onClick={() => setIsManageModalOpen(false)} className="px-3 py-2 text-xs text-slate-500 font-bold">
                    ยกเลิก
                  </button>
                  <button type="button" onClick={saveFanSettings} className="px-4 py-2 bg-green-600 text-white text-xs font-bold rounded-lg shadow-sm">
                    {syncStatus === "saving" ? "กำลังบันทึก..." : "บันทึกและจดจำค่าหลัก"}
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render app in root
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
