<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Sheet PM - Emergency & Exit Light</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Anuphan', sans-serif; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fadeIn { animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // 🔴 วาง URL เว็บแอป Apps Script ของคุณเกรียงศักดิ์ที่นี่ครับ
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycby54wm9ip-IJc5HNwWzk93dhpqNd6-iAoM_JZLWa6K6GrPZPStK3vxmu0-0F_kGsUbQAg/exec";

    // รายชื่อไฟตั้งต้นดึงตามโค้ดต้นฉบับ
    const initialElLamps = [
      { id: "EL-01", name: "EL-01 ออฟฟิศ EN", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-02", name: "EL-02 ออฟฟิศ EN", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-03", name: "EL-03 MDB", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-04", name: "EL-04 หน้าออฟฟิศ EN", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-05", name: "EL-05 หน้าห้อง GEN", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-06", name: "EL-06 ในห้อง GEN", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-07", name: "EL-07 ทางเดินหน้าห้องแบต", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-08", name: "EL-08 ห้องแบต", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-09", name: "EL-09 ห้องแบต", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false },
      { id: "EL-10", name: "EL-10 ห้องแบต", status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false }
    ];

    const initialExlLamps = Array.from({ length: 10 }, (_, i) => {
      const num = String(i + 1).padStart(2, "0");
      return { id: `EXL-${num}`, name: `EXL-${num} ตำแหน่งติดตั้งย่อย`, status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่", checked: false };
    });

    function App() {
      const assignerList = ["เกรียงศักดิ์", "ณรงค์", "รัฐชานนท์"];
      const operatorList = ["ณรงค์", "รัฐชานนท์", "บัญชา", "วสุพล", "ศรายุทธ", "พิพัฒน์", "ศรราม เอี่ยมอาจ", "วงศธร", "เกรียงศักดิ์"];

      const todayStr = new Date().toISOString().split('T')[0];
      const currentMonthStr = todayStr.substring(0, 7); // คืนค่าเป็นรูปแบบ "YYYY-MM" สำหรับเช็คข้ามเดือน

      const [formData, setFormData] = useState({
        assigner: "เกรียงศักดิ์", pmDate1: todayStr, startTime1: "", endTime1: "",
        operator1_1: "", operator1_2: "", operator1_3: "", operator1_4: "",
        pmDate2: "", startTime2: "", endTime2: "",
        operator2_1: "", operator2_2: "", operator2_3: "", operator2_4: "",
        summaryText: "", overallStatus: "ปกติ",
      });

      const [tabView, setTabView] = useState("EL");
      const [elLamps, setElLamps] = useState(initialElLamps);
      const [exlLamps, setExlLamps] = useState(initialExlLamps);
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null);
      const [customError, setCustomError] = useState("");
      const [isLoadingCloud, setIsLoadingCloud] = useState(true);

      // ตรวจสอบสถานะว่าเครื่องเคยล็อกข้อมูลไว้แล้วหรือไม่
      const isDay1Submitted = useMemo(() => {
        return elLamps.some(l => l.checked) || exlLamps.some(l => l.checked);
      }, [elLamps, exlLamps]);

      // --- 🔄 🛠️ ตรวจสอบการข้ามเดือนและดึงความคืบหน้าถาวรจาก Cloud ชีตโดยตรง ---
      const fetchLatestProgressFromCloud = async () => {
        setIsLoadingCloud(true);
        try {
          // ตรวจสอบประวัติตัวแปร LocalStorage ในเครื่องช่างก่อนชั่วคราว
          const savedMonth = localStorage.getItem("emgc_saved_month");
          if (savedMonth && savedMonth !== currentMonthStr) {
            // 🚨 ถ้าตรวจพบว่าขึ้นเดือนใหม่แล้ว ให้บังคับล้างความจำล็อกหน้าจอเก่าออกทันที!
            localStorage.removeItem("emgc_form_locked");
            localStorage.setItem("emgc_saved_month", currentMonthStr);
          }

          const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=getLatestProgress`);
          const result = await response.json();
          
          if (result && result.status === "success" && result.hasData) {
            // นำผลลัพธ์มาวางลงช่องกรอกข้อมูล
            setFormData({
              assigner: result.assigner || "เกรียงศักดิ์",
              pmDate1: result.pmDate1 || todayStr,
              startTime1: result.startTime1 || "",
              endTime1: result.endTime1 || "",
              operator1_1: result.operator1_1 || "",
              operator1_2: result.operator1_2 || "",
              operator1_3: result.operator1_3 || "",
              operator1_4: result.operator1_4 || "",
              pmDate2: result.pmDate2 || "",
              startTime2: result.startTime2 || "",
              endTime2: result.endTime2 || "",
              operator2_1: result.operator2_1 || "",
              operator2_2: result.operator2_2 || "",
              operator2_3: result.operator2_3 || "",
              operator2_4: result.operator2_4 || "",
              summaryText: result.summaryText || "",
              overallStatus: result.overallStatus || "ปกติ"
            });

            if (result.rawJsonData) {
              const parsedState = JSON.parse(result.rawJsonData);
              if (parsedState.elLamps) setElLamps(parsedState.elLamps);
              if (parsedState.exlLamps) setExlLamps(parsedState.exlLamps);
            }
          }
        } catch (error) {
          console.error("Cloud Connection Error:", error);
        } finally {
          setIsLoadingCloud(false);
        }
      };

      useEffect(() => {
        fetchLatestProgressFromCloud();
      }, []);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const handleStatusChange = (id, targetValue) => {
        if (id.startsWith("EL-")) {
          setElLamps(prev => prev.map(l => l.id === id ? { ...l, status: targetValue } : l));
        } else {
          setExlLamps(prev => prev.map(l => l.id === id ? { ...l, status: targetValue } : l));
        }
      };

      const handleRemoteChange = (id, targetValue) => {
        if (id.startsWith("EL-")) {
          setElLamps(prev => prev.map(l => l.id === id ? { ...l, remoteTest: targetValue } : l));
        } else {
          setExlLamps(prev => prev.map(l => l.id === id ? { ...l, remoteTest: targetValue } : l));
        }
      };

      // ฟังก์ชันสำหรับหัวหน้างานกดสั่งปลดล็อกฟอร์มหน้าจอแบบ Manual
      const forceUnlockFormManual = () => {
        if (confirm("คุณต้องการปลดล็อกข้อมูลช่างและรอบเวลาทำงานเพื่อแก้ไขใช่หรือไม่?")) {
          setElLamps(prev => prev.map(l => ({ ...l, checked: false })));
          setExlLamps(prev => prev.map(l => ({ ...l, checked: false })));
          setCustomError("");
          alert("ปลดล็อกช่องกรอกเรียบร้อย ช่างสามารถแก้ไขและกดบันทึกซ้ำได้ครับ");
        }
      };

      // --- 🚀 ส่งรายงานความคืบหน้าเข้าสเปรดชีต ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        if (!isDay1Submitted && (!formData.startTime1 || !formData.endTime1 || !formData.operator1_1)) {
          setCustomError("กรุณากรอกเวลาทำงาน และชื่อผู้ปฏิบัติงานหลัก วันที่ 1 ให้ครบถ้วนก่อนส่งรายงานครับ");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (isDay1Submitted && (!formData.pmDate2 || !formData.startTime2 || !formData.endTime2 || !formData.operator2_1)) {
          setCustomError("พบข้อมูลการตรวจของวันแรกถูกบันทึกแล้ว กรุณากรอก 'วันที่ทำ PM รอบสอง' รวมถึงเวลาและชื่อช่างผู้ร่วมตรวจของวันที่ 2 ให้ครบถ้วนก่อนส่งงานครับ");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        setIsSubmitting(true);

        const updatedEl = elLamps.map(l => l.status !== "ยังไม่ได้ตรวจ" ? { ...l, checked: true } : l);
        const updatedExl = exlLamps.map(l => l.status !== "ยังไม่ได้ตรวจ" ? { ...l, checked: true } : l);

        const payload = {
          action: "saveEmergencyLightPm",
          ...formData,
          elLamps: updatedEl,
          exlLamps: updatedExl
        };

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          localStorage.setItem("emgc_saved_month", currentMonthStr);
          window.scrollTo({ top: 0, behavior: "smooth" });
          setElLamps(updatedEl);
          setExlLamps(updatedExl);
        } catch (error) {
          setSubmitStatus('error');
          setCustomError("ระบบขัดข้องชั่วคราว ไม่สามารถส่งเวลาและผลการตรวจขึ้น Google Sheets ได้");
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
          <div>
            <header className="bg-white shadow-sm border-b-4 border-green-600 sticky top-0 z-30 p-4">
              <div className="flex items-center justify-between">
                <span className="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded">CP ALL</span>
                <span className="text-[10px] text-slate-400 font-bold flex items-center">
                  🟢 สถานะฟอร์ม: {isDay1Submitted ? <span className="text-amber-600 font-bold ml-1">ล็อกประวัติรอบแรกแล้ว</span> : <span className="text-green-600 font-bold ml-1">พร้อมเปิดบันทึก</span>}
                </span>
              </div>
              <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
              <h2 className="text-xs font-bold text-slate-600 mt-0.5">Check Sheet PM - Emergency & Exit Light</h2>
            </header>

            <main className="p-4 space-y-4 animate-fadeIn">
              {isLoadingCloud && (
                <div className="bg-teal-50 text-teal-800 text-xs font-bold p-3 rounded-xl text-center">
                  ⏳ กำลังซิงก์ข้อมูลพิกัดเวลาและสถิติล่าสุดจากระบบคลาวด์...
                </div>
              )}

              {submitStatus === 'success' && (
                <div className="bg-green-100 border border-green-400 text-green-800 p-3 rounded-xl text-xs font-bold">
                  🚀 บันทึกประวัติและจัดรูปแบบเวลารวมถึงชื่อผู้ปฏิบัติงานลง Google Sheet ล่าสุดสำเร็จแล้ว!
                </div>
              )}

              {customError && (
                <div className="bg-red-100 border border-red-400 text-red-800 p-3 rounded-xl text-xs font-bold">
                  ⚠️ {customError}
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-4">
                {/* 📌 ส่วนรายละเอียดช่างและวันเวลาทำงานช่วงที่ 1 */}
                <section className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 space-y-3">
                  <div className="text-xs font-bold text-green-700 uppercase flex justify-between">
                    <span>📋 ข้อมูลปฏิบัติงาน (วันที่ 1)</span>
                    {isDay1Submitted && <span className="text-red-500 font-extrabold text-[10px]">🔒 ล็อกข้อมูลแล้ว</span>}
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[11px] font-bold text-slate-500">วันที่ทำ PM 1</label>
                      <input type="date" name="pmDate1" value={formData.pmDate1} onChange={handleInputChange} disabled={isDay1Submitted} className="w-full mt-1 p-2 border rounded-xl text-xs font-bold disabled:bg-slate-100 disabled:text-slate-400 outline-none" />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-500">ผู้มอบหมาย</label>
                      <input list="assigners" name="assigner" value={formData.assigner} onChange={handleInputChange} disabled={isDay1Submitted} className="w-full mt-1 p-2 border rounded-xl text-xs font-bold disabled:bg-slate-100 outline-none" />
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-[11px] font-bold text-slate-500">เวลาเริ่ม 1</label>
                      <input type="time" name="startTime1" value={formData.startTime1} onChange={handleInputChange} disabled={isDay1Submitted} className="w-full mt-1 p-2 border rounded-xl text-xs font-bold disabled:bg-slate-100 outline-none" />
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-slate-500">เวลาสิ้นสุด 1</label>
                      <input type="time" name="endTime1" value={formData.endTime1} onChange={handleInputChange} disabled={isDay1Submitted} className="w-full mt-1 p-2 border rounded-xl text-xs font-bold disabled:bg-slate-100 outline-none" />
                    </div>
                  </div>
                  <div>
                    <label className="block text-[11px] font-bold text-slate-500">รายชื่อช่างปฏิบัติงาน (วันที่ 1)</label>
                    <div className="grid grid-cols-2 gap-1.5 mt-1">
                      {[1, 2, 3, 4].map(n => (
                        <input key={n} list="operators" name={`operator1_${n}`} value={formData[`operator1_${n}`]} onChange={handleInputChange} disabled={isDay1Submitted} placeholder={`ช่างคนที่ ${n}`} className="p-2 border rounded-xl text-xs font-semibold disabled:bg-slate-100 outline-none" />
                      ))}
                    </div>
                  </div>
                </section>

                {/* 📌 ส่วนข้อมูลช่วงที่ 2 (จะเปิดสิทธิ์ให้กรอกเมื่อวันแรกมีการส่งผลไปแล้ว) */}
                {isDay1Submitted && (
                  <section className="bg-amber-50/60 rounded-2xl p-4 shadow-sm border border-amber-200 space-y-3">
                    <div className="text-xs font-bold text-amber-800 uppercase">📋 ข้อมูลปฏิบัติงานเพิ่มเติม (วันที่ 2 สำหรับงานที่เหลือ)</div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-[11px] font-bold text-amber-900">วันที่ทำ PM 2</label>
                        <input type="date" name="pmDate2" value={formData.pmDate2} onChange={handleInputChange} className="w-full mt-1 p-2 border border-amber-300 rounded-xl text-xs font-bold outline-none" />
                      </div>
                      <div>
                        <label className="block text-[11px] font-bold text-amber-900">เวลาเริ่ม 2</label>
                        <input type="time" name="startTime2" value={formData.startTime2} onChange={handleInputChange} className="w-full mt-1 p-2 border border-amber-300 rounded-xl text-xs font-bold outline-none" />
                      </div>
                    </div>
                    <div className="grid grid-cols-2 gap-2">
                      <div>
                        <label className="block text-[11px] font-bold text-amber-900">เวลาสิ้นสุด 2</label>
                        <input type="time" name="endTime2" value={formData.endTime2} onChange={handleInputChange} className="w-full mt-1 p-2 border border-amber-300 rounded-xl text-xs font-bold outline-none" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-[11px] font-bold text-amber-900">รายชื่อช่างปฏิบัติงาน (วันที่ 2)</label>
                      <div className="grid grid-cols-2 gap-1.5 mt-1">
                        {[1, 2, 3, 4].map(n => (
                          <input key={n} list="operators" name={`operator2_${n}`} value={formData[`operator2_${n}`]} onChange={handleInputChange} placeholder={`ช่างวันที่สอง คนที่ ${n}`} className="p-2 border border-amber-300 rounded-xl text-xs font-semibold bg-white outline-none" />
                        ))}
                      </div>
                    </div>
                  </section>
                )}

                {/* รายการแสดงปุ่มตารางอุปกรณ์ย่อย */}
                <div className="flex bg-slate-200 p-1 rounded-xl text-xs font-bold">
                  <button type="button" onClick={() => setTabView("EL")} className={`flex-1 py-2 rounded-lg text-center ${tabView === "EL" ? "bg-white text-slate-800 shadow" : "text-slate-600"}`}>Emergency Light (EL)</button>
                  <button type="button" onClick={() => setTabView("EXL")} className={`flex-1 py-2 rounded-lg text-center ${tabView === "EXL" ? "bg-white text-slate-800 shadow" : "text-slate-600"}`}>Exit Light (EXL)</button>
                </div>

                <section className="space-y-2">
                  {filteredLamps.map((lamp) => (
                    <div key={lamp.id} className="bg-white p-3 rounded-xl shadow-sm border border-slate-100 flex justify-between items-center">
                      <div>
                        <div className="text-xs font-bold text-slate-800">{lamp.name}</div>
                        <div className="text-[10px] text-slate-400 font-semibold mt-0.5">สถานะคลาวด์: {lamp.checked ? "🔒 ส่งแล้ว" : "⏳ รอกลอก"}</div>
                      </div>
                      <div className="flex space-x-1">
                        <select value={lamp.status} onChange={(e) => handleStatusChange(lamp.id, e.target.value)} disabled={lamp.checked} className="p-1 border rounded text-[11px] font-bold bg-slate-50 disabled:opacity-60">
                          <option value="ยังไม่ได้ตรวจ">⏳ ยังไม่ตรวจ</option>
                          <option value="ปกติ">🟢 ปกติ</option>
                          <option value="ผิดปกติ">🔴 ผิดปกติ</option>
                        </select>
                      </div>
                    </div>
                  ))}
                </section>

                <button type="submit" disabled={isSubmitting} className="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-xl text-xs font-bold transition-all shadow">
                  {isSubmitting ? "🚀 กำลังฟอร์แมตความปลอดภัยและส่งเข้าคลาวด์..." : "💾 ยืนยันส่งบันทึกรายงานเข้า Google Sheet"}
                </button>
              </form>

              {isDay1Submitted && (
                <div className="text-center pt-1">
                  <button type="button" onClick={forceUnlockFormManual} className="text-[10px] text-blue-600 hover:underline font-bold">
                    🔧 [สำหรับหัวหน้า] คลิกเพื่อสั่งปลดล็อกประวัติช่างและเวลาทำงานด้วยมือแบบด่วน
                  </button>
                </div>
              )}
            </main>
          </div>
          <datalist id="operators">{operatorList.map((n, i) => <option key={i} value={n} />)}</datalist>
          <datalist id="assigners">{assignerList.map((n, i) => <option key={i} value={n} />)}</datalist>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
