        try {
          const response = await fetch(`${GOOGLE_WEB_APP_URL}?action=getLatestProgress`);
          const result = await response.json();
          
          if (result && result.status === "success" && result.hasData) {
            // หากพบคู่ข้อมูลเดือนนี้บน Google Sheets ให้ดึงฟอร์มและประวัติไฟมาบันทึกต่อทันที
            setFormData({
              assigner: result.assigner || "เกรียงศักดิ์",
              pmDate1: result.pmDate1 || new Date().toISOString().split('T')[0],
              startTime1: result.startTime1 || "",
              endTime1: result.endTime1 || "",
              operator1_1: result.operator1_1 || "",
              operator1_2: result.operator1_2 || "",
              operator1_3: result.operator1_3 || "",
              operator1_4: result.operator1_4 || "",
              pmDate2: result.pmDate2 || "",
              startTime2: result.startTime2 || "",
              endTime2: result.endTime2 || "",
              operator2_1: result.operator2_1 || "",
              operator2_2: result.operator2_2 || "",
              operator2_3: result.operator2_3 || "",
              operator2_4: result.operator2_4 || "",
              summaryText: result.summaryText || "",
              overallStatus: result.overallStatus || "ปกติ"
            });

            if (result.rawJsonData) {
              const parsedState = JSON.parse(result.rawJsonData);
              if (parsedState.elLamps) setElLamps(parsedState.elLamps);
              if (parsedState.exlLamps) setExlLamps(parsedState.exlLamps);
            }
          }
        } catch (error) {
          console.error("Fetch latest progress error:", error);
        } finally {
          setIsLoadingCloud(false);
        }
      };

      useEffect(() => {
        fetchLatestProgressFromCloud();
      }, []);

      // ตรวจสอบและประเมินว่า "ผลงานวันแรกได้รับการส่งขึ้นคลาวด์ล็อกแล้วหรือไม่"
      const isDay1Submitted = useMemo(() => {
        return elLamps.some(l => l.checked) || exlLamps.some(l => l.checked);
      }, [elLamps, exlLamps]);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      // เมื่อช่างเลือกสภาพการทำงาน
      const handleStatusChange = (id, targetValue) => {
        if (id.startsWith("EL-")) {
          setElLamps(prev => prev.map(l => l.id === id ? { ...l, status: targetValue } : l));
        } else {
          setExlLamps(prev => prev.map(l => l.id === id ? { ...l, status: targetValue } : l));
        }
      };

      // เมื่อช่างเลือกผลการทดสอบรีโมทเทส
      const handleRemoteChange = (id, targetValue) => {
        if (id.startsWith("EL-")) {
          setElLamps(prev => prev.map(l => l.id === id ? { ...l, remoteTest: targetValue } : l));
        } else {
          setExlLamps(prev => prev.map(l => l.id === id ? { ...l, remoteTest: targetValue } : l));
        }
      };

      // คืนค่าให้กลับมาแก้ไขได้อีกครั้ง (Unlock)
      const unlockLamp = (id) => {
        if (id.startsWith("EL-")) {
          setElLamps(prev => prev.map(l => l.id === id ? { ...l, checked: false, status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่" } : l));
        } else {
          setExlLamps(prev => prev.map(l => l.id === id ? { ...l, checked: false, status: "ยังไม่ได้ตรวจ", remoteTest: "ไม่ใช่" } : l));
        }
      };

      // ตั้งค่าทางลัดปกติทั้งหมด "เฉพาะตัวที่รอดำเนินการ"
      const setAllPendingToNormal = () => {
        if (tabView === "EL") {
          setElLamps(prev => prev.map(l => l.checked ? l : { ...l, status: "ปกติ", remoteTest: "ใช่" }));
        } else {
          setExlLamps(prev => prev.map(l => l.checked ? l : { ...l, status: "ปกติ", remoteTest: "ใช่" }));
        }
      };

      // เคลียร์ค่าทั้งหมดเพื่อเริ่มรอบใหม่ในเดือนถัดไป
      const handleResetNewRound = () => {
        if (confirm("ต้องการล้างประวัติการตรวจและวันทำงานทั้งหมดในเครื่องเพื่อตรวจเช็ครอบถัดไปใช่หรือไม่?")) {
          setElLamps(initialElLamps);
          setExlLamps(initialExlLamps);
          setFormData({
            assigner: "เกรียงศักดิ์", 
            pmDate1: new Date().toISOString().split('T')[0],
            startTime1: "",
            endTime1: "",
            operator1_1: "",
            operator1_2: "",
            operator1_3: "",
            operator1_4: "",
            pmDate2: "",
            startTime2: "",
            endTime2: "",
            operator2_1: "",
            operator2_2: "",
            operator2_3: "",
            operator2_4: "",
            summaryText: "",
            overallStatus: "ปกติ",
          });
        }
      };

      // เปิดกล่องโมเดลจัดการและอัปเดตชื่อตำแหน่งอุปกรณ์
      const openManageModal = () => {
        const currentList = tabView === "EL" ? elLamps : exlLamps;
        setEditableLamps(currentList.map(l => ({ ...l })));
        setNewItemId("");
        setNewItemName("");
        setIsManageModalOpen(true);
      };

      const handleAddItem = (e) => {
        e.preventDefault();
        if (!newItemId.trim() || !newItemName.trim()) return;
        
        const prefix = tabView;
        const formattedId = newItemId.toUpperCase().startsWith(prefix + "-") 
          ? newItemId.toUpperCase() 
          : `${prefix}-${newItemId.trim().toUpperCase()}`;

        if (editableLamps.some(l => l.id === formattedId)) {
          alert("รหัสอุปกรณ์ซ้ำกันในระบบ กรุณาตรวจสอบอีกครั้ง");
          return;
        }

        setEditableLamps([...editableLamps, {
          id: formattedId,
          name: `${formattedId} ${newItemName.trim()}`,
          status: "ยังไม่ได้ตรวจ",
          remoteTest: "ไม่ใช่",
          checked: false
        }]);
        setNewItemId("");
        setNewItemName("");
      };

      const handleRemoveItem = (id) => {
        setEditableLamps(editableLamps.filter(l => l.id !== id));
      };

      const handleEditItemText = (id, newText) => {
        setEditableLamps(editableLamps.map(l => 
          l.id === id ? { ...l, name: newText } : l
        ));
      };

      const saveSettings = () => {
        if (tabView === "EL") {
          setElLamps(editableLamps);
        } else {
          setExlLamps(editableLamps);
        }
        setIsManageModalOpen(false);
      };

      // สรุปสถิติความคืบหน้าของอุปกรณ์ 111 ตัว
      const statsSummary = useMemo(() => {
        let total = 0, checkedCount = 0, normal = 0, faulty = 0;
        
        elLamps.forEach(l => {
          total++;
          if (l.status !== "ยังไม่ได้ตรวจ" || l.checked) {
            checkedCount++;
            if (l.status === "ปกติ") normal++; else if (l.status !== "ยังไม่ได้ตรวจ") faulty++;
          }
        });
        exlLamps.forEach(l => {
          total++;
          if (l.status !== "ยังไม่ได้ตรวจ" || l.checked) {
            checkedCount++;
            if (l.status === "ปกติ") normal++; else if (l.status !== "ยังไม่ได้ตรวจ") faulty++;
          }
        });

        const percent = total > 0 ? Math.round((checkedCount / total) * 100) : 0;
        const pending = total - checkedCount;

        return { total, checkedCount, normal, faulty, percent, pending };
      }, [elLamps, exlLamps]);

      // --- บันทึกส่งข้อมูลใบงานเข้ากูเกิลชีตส่วนกลาง ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        // ตรวจสอบความถูกต้องของข้อมูลเวลา วันปฏิบัติงานที่ 1 (กรณีตรวจรอบแรก)
        if (!isDay1Submitted && (!formData.startTime1 || !formData.endTime1)) {
          setCustomError("กรุณาระบุ 'เวลาเริ่ม' และ 'เวลาสิ้นสุด' ของการทำงานวันที่ 1 ด้วยครับ");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        // ตรวจสอบรายชื่อช่างผู้ปฏิบัติงานหลัก วันที่ 1 (กรณีตรวจรอบแรก)
        if (!isDay1Submitted && (!formData.operator1_1 && !formData.operator1_2 && !formData.operator1_3 && !formData.operator1_4)) {
          setCustomError("กรุณาระบุรายชื่อช่าง 'ผู้ปฏิบัติงาน วันที่ 1' ร่วมทีมอย่างน้อย 1 คน");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        // 🔒 หากเป็นการตรวจรอบสอง (เมื่อวันแรกถูกล็อคแล้ว) บังคับว่าช่างต้องป้อนข้อมูลของวันที่ 2 ให้ครบถ้วน
        if (isDay1Submitted) {
          if (!formData.pmDate2 || !formData.startTime2 || !formData.endTime2) {
            setCustomError("คุณเคยส่งผลของวันแรกไปแล้ว กรุณาระบุ 'วันที่ทำ PM วันที่ 2' และ 'เวลาเริ่ม - สิ้นสุด' ของวันที่สองก่อนยืนยันส่งข้อมูลรอบสองครับ");
            window.scrollTo({ top: 0, behavior: "smooth" });
            return;
          }
          if (!formData.operator2_1 && !formData.operator2_2 && !formData.operator2_3 && !formData.operator2_4) {
            setCustomError("กรุณาระบุรายชื่อช่าง 'ผู้ปฏิบัติงาน วันที่ 2' ร่วมทีมอย่างน้อย 1 คน สำหรับงานวันที่สองครับ");
            window.scrollTo({ top: 0, behavior: "smooth" });
            return;
          }
        }

        setIsSubmitting(true);

        // 💾 ล็อครายการที่ผ่านการตรวจรอบนี้ให้เป็น "checked: true" ทันทีก่อนส่งขึ้น Google Sheets เพื่ออิงเป็นฐานข้อมูลวันถัดไป
        const updatedEl = elLamps.map(l => l.status !== "ยังไม่ได้ตรวจ" ? { ...l, checked: true } : l);
        const updatedExl = exlLamps.map(l => l.status !== "ยังไม่ได้ตรวจ" ? { ...l, checked: true } : l);

        const payload = {
          action: "saveEmergencyLightPm",
          timestamp: new Date().toLocaleString('th-TH'),
          ...formData,
          elLamps: updatedEl,
          exlLamps: updatedExl
        };

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: "smooth" });

          setElLamps(updatedEl);
          setExlLamps(updatedExl);

        } catch (error) {
          console.error("Submit Error:", error);
          setSubmitStatus('error');
          setCustomError("ไม่สามารถซิงก์ข้อมูลไปที่เซิร์ฟเวอร์กูเกิลได้ชั่วคราว กรุณาตรวจสอบอินเทอร์เน็ตหน้างาน");
          window.scrollTo({ top: 0, behavior: "smooth" });
        } finally {
          setIsSubmitting(false);
        }
      };

      const activeLamps = tabView === "EL" ? elLamps : exlLamps;
      
      const filteredLamps = activeLamps.filter(l => 
        l.name.toLowerCase().includes(searchTerm.toLowerCase())
      );

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
          
          <div>
            {/* Header คลีนพรีเมียม สเปก บริษัท ซีพีออลล์ จำกัด (มหาชน) */}
            <header className="bg-white shadow-sm border-b-4 border-green-600 sticky top-0 z-30">
              <div className="p-4">
                <div className="flex items-center justify-between">
                  <span className="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded">CP ALL</span>
                  <span className="text-[10px] text-slate-400 font-bold flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3 h-3 mr-1 text-slate-400">
                      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                      <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                    ระบบมือถือหน้างาน
                  </span>
                </div>
                <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
                <h2 className="text-xs font-bold text-slate-600 mt-0.5 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 mr-1.5 w-3 h-3">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                  Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์
                </h2>
                
                <div className="grid grid-cols-3 gap-1 mt-2.5 pt-2 border-t border-slate-100 text-[10px] text-slate-500 font-semibold">
                  <div>รหัส: <span className="text-slate-800 font-bold">B3-FM-10-01-06</span></div>
                  <div className="text-center">ปรับปรุงครั้งที่: <span className="text-slate-800 font-bold">0</span></div>
                  <div className="text-right">ประกาศใช้: <span className="text-slate-800 font-bold">1 เม.ย. 2560</span></div>
                </div>
              </div>
            </header>

            {/* ส่วนแสดงผลหลัก (Main Content) */}
            <main className="p-4 space-y-5 animate-fadeIn">
              
              {/* ตารางแสดงสถิติและเกจความคืบหน้าแบ่งตามวัน (Progress Bar) */}
              <section className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 space-y-3">
                <div className="flex justify-between items-center text-xs font-bold text-slate-600">
                  <span>ความก้าวหน้ารอบเดือนนี้:</span>
                  <span className="text-emerald-700 font-extrabold">{statsSummary.checkedCount} / {statsSummary.total} ตัว ({statsSummary.percent}%)</span>
                </div>
                
                {/* แถบสีความก้าวหน้า */}
                <div className="w-full bg-slate-100 h-2.5 rounded-full overflow-hidden">
                  <div className="bg-green-500 h-full rounded-full transition-all duration-500" style={{ width: `${statsSummary.percent}%` }}></div>
                </div>

                <div className="grid grid-cols-3 gap-1.5 pt-1.5 text-center text-[10px] font-bold">
                  <div className="p-2 bg-slate-50 border rounded-xl">
                    <span className="text-slate-400 block mb-0.5">เหลือรอกลอก</span>
                    <span className="text-xs font-black text-slate-700">{statsSummary.pending} ตัว</span>
                  </div>
                  <div className="p-2 bg-green-50 rounded-xl">
                    <span className="text-green-600 block mb-0.5">ปกติ</span>
                    <span className="text-xs font-black text-green-700">{statsSummary.normal} ตัว</span>
                  </div>
                  <div className="p-2 bg-red-50 rounded-xl">
                    <span className="text-red-500 block mb-0.5">ชำรุด</span>
                    <span className="text-xs font-black text-red-600">{statsSummary.faulty} ตัว</span>
                  </div>
                </div>

                <div className="flex justify-between pt-1">
                  <button type="button" onClick={handleResetNewRound} className="text-[10px] text-slate-400 hover:text-red-500 font-semibold transition-all">🧹 เริ่มต้นงานตรวจใหม่ทั้งหมด</button>
                  <span className="text-[9px] text-teal-600 bg-teal-50 px-2 py-0.5 rounded font-extrabold flex items-center">
                    <span className="w-1.5 h-1.5 rounded-full bg-teal-500 mr-1 animate-ping"></span>
                    คลาวด์ซิงก์เรียลไทม์
                  </span>
                </div>
              </section>

              {/* ข้อความแจ้งเตือนผลการซิงก์ข้อมูลจาก Google Sheets */}
              {isLoadingCloud && (
                <div className="bg-teal-50 text-teal-800 text-xs font-bold p-3 rounded-2xl border border-teal-200 flex items-center justify-center space-x-2">
                  <svg className="animate-spin h-4 w-4 text-teal-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                  </svg>
                  <span>กำลังดึงข้อมูลและประวัติความคืบหน้าล่าสุดจาก Google Sheet...</span>
                </div>
              )}

              {submitStatus === 'success' && (
                <div className="bg-green-100 border-2 border-green-400 text-green-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">บันทึกส่งข้อมูลสำเร็จ!</p>
                    <p className="text-xs mt-0.5 font-semibold">รายงานความคืบหน้า PM ไฟฉุกเฉินบันทึกเข้า Google Sheet และล็อกอุปกรณ์แล้ว</p>
                  </div>
                </div>
              )}

              {customError && (
                <div className="bg-red-100 border-2 border-red-400 text-red-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">การกรอกข้อมูลไม่ถูกต้อง</p>
                    <p className="text-xs mt-0.5 font-bold leading-relaxed">{customError}</p>
                  </div>
                </div>
              )}

              <form onSubmit={handleSubmit} className="space-y-5">
                
                {/* 1. ส่วนข้อมูลสเปกจุด PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-green-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>ข้อมูลงานตรวจเช็คหลัก</span>
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <span className="text-slate-400 font-semibold">เครื่องจักร/อุปกรณ์</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">Emergency & Exit Light</p>
                    </div>
                    <div>
                      <span className="text-slate-400 font-semibold">ความถี่แผนงาน</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">รอบประจำเดือน</p>
                    </div>
                  </div>

                  <div>
                    <span className="text-xs text-slate-400 font-semibold">สถานที่ปฏิบัติการ</span>
                    <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3 h-3 shrink-0">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                      </svg>
                      อาคาร DC
                    </p>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้มอบหมายงาน</label>
                    <input 
                      list="assigners" 
                      name="assigner" 
                      value={formData.assigner} 
                      onChange={handleInputChange} 
                      placeholder="เลือกหรือระบุชื่อผู้มอบหมาย..."
                      className="w-full p-2 text-xs border rounded-xl bg-slate-50/30 focus:bg-white focus:ring-2 focus:ring-green-500 outline-none font-bold"
                    />
                    <datalist id="assigners">
                      {assignerList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>
                </section>

                {/* ส่วนที่ 2: รายละเอียดงานวันที่ 1 */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 border-l-4 border-l-green-500 space-y-4">
                  <div className="flex items-center justify-between border-b pb-2">
                    <div className="flex items-center text-green-700 font-bold text-xs uppercase tracking-wider">
                      <span className="bg-green-100 text-green-800 px-2 py-0.5 rounded mr-1.5 font-black">วันที่ 1</span>
                      <span>วันปฏิบัติงานที่ 1 (ล็อกข้อมูลแล้วเมื่อส่งผลแรก)</span>
                    </div>
                    {isDay1Submitted && (
                      <span className="text-[9px] bg-red-100 text-red-700 px-2 py-0.5 rounded-full font-black flex items-center animate-pulse">
                        🔒 ล็อกแล้ว
                      </span>
                    )}
                  </div>

                  <div>
                    <label className="block text-[11px] text-slate-400 mb-1 font-bold">วันที่ทำ PM (วันที่ 1) *</label>
                    <input 
                      type="date" 
                      name="pmDate1" 
                      value={formData.pmDate1} 
                      onChange={handleInputChange} 
                      required 
                      disabled={isDay1Submitted}
                      className={`w-full py-2 px-3 text-xs border rounded-xl font-bold transition-all ${isDay1Submitted ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-white text-slate-700'}`} 
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <label className="block text-[11px] text-slate-400 mb-1 font-bold">เวลาเริ่ม (วันที่ 1) *</label>
                      <input 
                        type="time" 
                        name="startTime1" 
                        value={formData.startTime1} 
                        onChange={handleInputChange} 
                        disabled={isDay1Submitted}
                        className={`w-full py-2 px-3 border rounded-xl transition-all ${isDay1Submitted ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-white text-slate-700'}`} 
                        required={!isDay1Submitted}
                      />
                    </div>
                    <div>
                      <label className="block text-[11px] text-slate-400 mb-1 font-bold">เวลาสิ้นสุด (วันที่ 1) *</label>
                      <input 
                        type="time" 
                        name="endTime1" 
                        value={formData.endTime1} 
                        onChange={handleInputChange} 
                        disabled={isDay1Submitted}
                        className={`w-full py-2 px-3 border rounded-xl transition-all ${isDay1Submitted ? 'bg-slate-100 text-slate-400 border-slate-200 cursor-not-allowed' : 'bg-white text-slate-700'}`} 
                        required={!isDay1Submitted}
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-[11px] text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงาน วันที่ 1 (ล็อกชื่อทันทีเมื่อส่งผลแรก)</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1, 2, 3, 4].map(num => (
                        <div key={`op1_${num}`} className={`flex items-center border rounded-xl px-2 transition-all ${isDay1Submitted ? 'bg-slate-100 border-slate-200' : 'bg-white focus-within:ring-2 focus-within:ring-green-500'}`}>
                          <input 
                            list="operators" 
                            name={`operator1_${num}`} 
                            value={formData[`operator1_${num}`]} 
                            onChange={handleInputChange}
                            placeholder={`ช่างคนที่ ${num}`}
                            disabled={isDay1Submitted}
                            className={`w-full py-2 text-xs outline-none bg-transparent font-semibold ${isDay1Submitted ? 'cursor-not-allowed text-slate-400' : 'text-slate-700'}`}
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

                {/* ส่วนที่ 3: รายละเอียดงานวันที่ 2 (ตัวเลือกเสริมสำหรับงานตรวจที่แบ่งทำ 2 วัน) */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 border-l-4 border-l-blue-500 space-y-4">
                  <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-xs uppercase tracking-wider">
                    <span className="bg-blue-100 text-blue-800 px-2 py-0.5 rounded mr-1.5 font-black">วันที่ 2</span>
                    <span>วันปฏิบัติงานที่ 2 (เฉพาะของวันที่ 2 เท่านั้น)</span>
                  </div>

                  <div>
                    <label className="block text-[11px] text-slate-400 mb-1 font-bold">วันที่ทำ PM (วันที่ 2)</label>
                    <input 
                      type="date" 
                      name="pmDate2" 
                      value={formData.pmDate2} 
                      onChange={handleInputChange} 
                      className="w-full py-2 px-3 text-xs border rounded-xl font-bold bg-white text-slate-700 focus:ring-2 focus:ring-blue-500" 
                    />
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <label className="block text-[11px] text-slate-400 mb-1 font-bold">เวลาเริ่ม (วันที่ 2)</label>
                      <input 
                        type="time" 
                        name="startTime2" 
                        value={formData.startTime2} 
                        onChange={handleInputChange} 
                        className="w-full py-2 px-3 border rounded-xl bg-white text-slate-700 focus:ring-2 focus:ring-blue-500" 
                      />
                    </div>
                    <div>
                      <label className="block text-[11px] text-slate-400 mb-1 font-bold">เวลาสิ้นสุด (วันที่ 2)</label>
                      <input 
                        type="time" 
                        name="endTime2" 
                        value={formData.endTime2} 
                        onChange={handleInputChange} 
                        className="w-full py-2 px-3 border rounded-xl bg-white text-slate-700 focus:ring-2 focus:ring-blue-500" 
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-[11px] text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงาน วันที่ 2 (เลือกหรือพิมพ์เพิ่มได้สูงสุด 4 คน)</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1, 2, 3, 4].map(num => (
                        <div key={`op2_${num}`} className="flex items-center border rounded-xl px-2 bg-white focus-within:ring-2 focus-within:ring-blue-500">
                          <input 
                            list="operators" 
                            name={`operator2_${num}`} 
                            value={formData[`operator2_${num}`]} 
                            onChange={handleInputChange}
                            placeholder={`ช่างคนที่ ${num}`}
                            className="w-full py-2 text-xs outline-none bg-transparent font-semibold text-slate-700"
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

                <datalist id="operators">
                  {operatorList.map((name, idx) => <option key={idx} value={name} />)}
                </datalist>

                {/* 4. ส่วนสับเปลี่ยนกลุ่มอุปกรณ์ & ค้นหาความเร็วสูง */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center justify-between border-b pb-2">
                    <div className="flex space-x-1.5 bg-slate-100 p-1 rounded-xl">
                      <button
                        key="tab-EL"
                        type="button"
                        onClick={() => setTabView("EL")}
                        className={`px-3 py-1.5 rounded-lg text-xs font-black transition-all ${tabView === "EL" ? 'bg-white text-emerald-700 shadow-sm' : 'text-slate-500'}`}
                      >
                        💡 ไฟฉุกเฉิน ({elLamps.length} ตัว)
                      </button>
                      <button
                        key="tab-EXL"
                        type="button"
                        onClick={() => setTabView("EXL")}
                        className={`px-3 py-1.5 rounded-lg text-xs font-black transition-all ${tabView === "EXL" ? 'bg-white text-indigo-700 shadow-sm' : 'text-slate-500'}`}
                      >
                        🚪 ไฟทางออก ({exlLamps.length} ตัว)
                      </button>
                    </div>

                    <button
                      type="button"
                      onClick={openManageModal}
                      className="flex items-center text-[10px] text-teal-600 bg-teal-50 border border-teal-100 px-2.5 py-1 rounded-lg hover:bg-teal-100 font-bold transition-all"
                    >
                      ปรับเปลี่ยนตำแหน่ง ⚙️
                    </button>
                  </div>

                  {/* ค้นหาและตัวช่วยเซ็ตสถานะปกติเฉพาะส่วนที่เหลือ */}
                  <div className="space-y-2">
                    <div className="flex items-center border rounded-xl px-3.5 py-1.5 bg-slate-50 text-xs focus-within:bg-white focus-within:ring-2 focus-within:ring-teal-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-4 h-4 shrink-0">
                        <circle cx="11" cy="11" r="8" />
                        <line x1="21" y1="21" x2="16.65" y2="16.65" />
                      </svg>
                      <input
                        type="text"
                        placeholder="สืบค้นชื่อหรือรหัสอุปกรณ์..."
                        value={searchTerm}
                        onChange={(e) => setSearchTerm(e.target.value)}
                        className="w-full bg-transparent outline-none py-0.5"
                      />
                      {searchTerm && (
                        <button type="button" onClick={() => setSearchTerm("")}>
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 hover:text-slate-600 w-4 h-4">
                            <line x1="18" y1="6" x2="6" y2="18" />
                            <line x1="6" y1="6" x2="18" y2="18"/>
                          </svg>
                        </button>
                      )}
                    </div>

                    <div className="flex justify-end space-x-1.5 text-[9px]">
                      <button 
                        type="button" 
                        onClick={setAllPendingToNormal} 
                        className="px-2 py-1 text-green-700 bg-green-50 hover:bg-green-100 border border-green-200 rounded font-bold transition-all"
                      >
                        ⚡ เซ็ต "ปกติและเทสผ่าน" เฉพาะโคมที่เหลือยังไม่ได้ตรวจ
                      </button>
                    </div>
                  </div>

                  {/* รายการไฟแสดงผลทีละดวงแบบมินิมอล */}
                  <div className="space-y-3 max-h-[500px] overflow-y-auto pr-1 no-scrollbar pb-2">
                    {filteredLamps.length === 0 ? (
                      <p className="text-center text-slate-400 text-xs py-10">ไม่พบรหัสอุปกรณ์ที่สืบค้น</p>
                    ) : (
                      filteredLamps.map((lamp, idx) => (
                        <div 
                          key={lamp.id} 
                          className={`p-3.5 border rounded-2xl space-y-2.5 transition-all duration-300 ${
                            lamp.checked 
                              ? 'bg-slate-100/70 border-slate-200 opacity-60' 
                              : 'bg-white border-slate-200 opacity-100 shadow-sm'
                          }`}
                        >
                          <div className="flex justify-between items-center border-b pb-1.5">
                            <p className="text-xs font-black text-slate-800 truncate max-w-[70%]">
                              {lamp.name}
                            </p>
                            
                            {/* ป้ายแสดงโน้ตกำกับสถานะการตรวจรอบปัจจุบัน */}
                            {lamp.checked ? (
                              <div className="flex items-center space-x-1">
                                <span className="text-[9px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold">🟢 ตรวจแล้ว (ส่งแล้ว)</span>
                                <button 
                                  type="button" 
                                  onClick={() => unlockLamp(lamp.id)} 
                                  className="text-[10px] text-blue-600 hover:text-blue-800 underline font-semibold ml-1.5"
                                >
                                  แก้ไข ✏
                                </button>
                              </div>
                            ) : lamp.status !== "ยังไม่ได้ตรวจ" ? (
                              <div className="flex items-center space-x-1">
                                <span className="text-[9px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded-full font-bold">✍️ ตรวจแล้ว (รอส่ง)</span>
                                <button 
                                  type="button" 
                                  onClick={() => unlockLamp(lamp.id)} 
                                  className="text-[10px] text-red-500 hover:text-red-700 underline font-semibold ml-1.5"
                                >
                                  รีเซ็ต 🧹
                                </button>
                              </div>
                            ) : (
                              <span className="text-[9px] bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full font-bold">⚪ ยังไม่ได้ตรวจ</span>
                            )}
                          </div>
                          
                          <div className="space-y-2">
                            {/* บรรทัดที่ 1: ตรวจสภาพทั่วไป */}
                            <div className="flex items-center justify-between text-[11px] font-bold text-slate-500">
                              <span>สภาพการทำงาน:</span>
                              <div className="flex space-x-1 w-[60%] shrink-0">
                                <button 
                                  type="button"
                                  disabled={lamp.checked}
                                  onClick={() => handleStatusChange(lamp.id, "ปกติ")}
                                  className={`flex-1 py-1 border rounded-lg font-bold text-[10px] transition-all ${lamp.status === "ปกติ" ? 'bg-green-500 text-white border-green-600' : 'bg-white text-slate-500 hover:bg-slate-100'}`}
                                >
                                  ปกติ
                                </button>
                                <button 
                                  type="button"
                                  disabled={lamp.checked}
                                  onClick={() => handleStatusChange(lamp.id, "ไม่ปกติ")}
                                  className={`flex-1 py-1 border rounded-lg font-bold text-[10px] transition-all ${lamp.status === "ไม่ปกติ" ? 'bg-red-500 text-white border-red-600' : 'bg-white text-slate-500 hover:bg-slate-100'}`}
                                >
                                  ชำรุด
                                </button>
                              </div>
                            </div>

                            {/* บรรทัดที่ 2: การใช้รีโมทเทส 30 นาที */}
                            <div className="flex items-center justify-between text-[11px] font-bold text-slate-500 border-t pt-1.5">
                              <span>รีโมทเทส 30 นาที:</span>
                              <div className="flex space-x-1 w-[60%] shrink-0">
                                <button 
                                  type="button"
                                  disabled={lamp.checked}
                                  onClick={() => handleRemoteChange(lamp.id, "ใช่")}
                                  className={`flex-1 py-1 border rounded-lg font-bold text-[10px] transition-all ${lamp.remoteTest === "ใช่" ? 'bg-blue-500 text-white border-blue-600' : 'bg-white text-slate-500 hover:bg-slate-100'}`}
                                >
                                  ผ่าน
                                </button>
                                <button 
                                  type="button"
                                  disabled={lamp.checked}
                                  onClick={() => handleRemoteChange(lamp.id, "ไม่ใช่")}
                                  className={`flex-1 py-1 border rounded-lg font-bold text-[10px] transition-all ${lamp.remoteTest === "ไม่ใช่" ? 'bg-amber-500 text-white border-amber-600' : 'bg-white text-slate-500 hover:bg-slate-100'}`}
                                >
                                  ไม่ผ่าน
                                </button>
                              </div>
                            </div>
                          </div>

                        </div>
                      ))
                    )}
                  </div>
                </section>

                {/* 5. สรุปรายละเอียดผลการ PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-orange-600 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <line x1="16" y1="13" x2="8" y2="13"></line>
                      <line x1="16" y1="17" x2="8" y2="17"></line>
                      <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>สรุปผลการ PM</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-2 font-bold">สรุปผลภาพรวม</label>
                    <div className="flex gap-2">
                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ปกติ"
                          checked={formData.overallStatus === "ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ปกติ" }))}
                          className="w-3.5 h-3.5 text-green-600 border-slate-300 focus:ring-green-500" 
                        />
                        <span>🟢 ปกติ</span>
                      </label>

                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ไม่ปกติ"
                          checked={formData.overallStatus === "ไม่ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ไม่ปกติ" }))}
                          className="w-3.5 h-3.5 text-red-600 border-slate-300 focus:ring-red-500" 
                        />
                        <span>🔴 พบจุดไม่ปกติ</span>
                      </label>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-1 font-bold">รายละเอียดสรุปเพิ่มเติม / รายการที่ต้องชี้แจงแก้ไข</label>
                    <textarea 
                      name="summaryText" 
                      value={formData.summaryText} 
                      onChange={handleInputChange}
                      rows="3" 
                      className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-xs"
                      placeholder="ระบุข้อความสรุปอาการ หรือสิ่งที่ได้ทำการบำรุงรักษาไป..."
                    ></textarea>
                  </div>
                </section>

                {/* 6. ปุ่มสำหรับกดยืนยันการส่งข้อมูล */}
                <div className="bg-white p-3.5 rounded-3xl shadow-sm border border-slate-100">
                  <button 
                    type="submit" 
                    disabled={isSubmitting}
                    className={`w-full py-3.5 rounded-xl font-bold text-sm text-white shadow-md flex justify-center items-center transition-all ${isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 active:scale-95'}`}
                  >
                    {isSubmitting ? (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin mr-2 w-4 h-4">
                          <polyline points="23 4 23 10 17 10" />
                          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                        </svg>
                        กำลังตรวจสอบและส่งรายงานคลาวด์...
                      </span>
                    ) : (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                          <polyline points="17 21 17 13 7 13 7 21" />
                          <polyline points="7 3 7 8 15 8" />
                        </svg>
                        <span>ยืนยันส่งรายงานไฟฉุกเฉินและทางออก (Google Sheet)</span>
                      </span>
                    )}
                  </button>
                </div>

              </form>
            </main>
          </div>

          <footer className="text-center text-[10px] text-slate-400 font-medium my-4">
            <p>© 2026 CP ALL DC MAHACHAI ENGINEERING DEPARTMENT</p>
          </footer>

          {/* POPUP สำหรับการตั้งค่าแก้ไขชื่อและตำแหน่งของไฟยืดหยุ่นหน้างาน */}
          {isManageModalOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full max-w-sm max-h-[80vh] flex flex-col shadow-2xl overflow-hidden animate-scaleIn">
                <div className="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center">
                  <div>
                    <h3 className="font-bold text-slate-800 text-xs">แก้ไขรายชื่อและตำแหน่งอุปกรณ์</h3>
                    <p className="text-[9px] text-slate-500">สามารถปรับรหัส ค้นหาจุด และย้ายตำแหน่งติดตั้งได้อิสระ</p>
                  </div>
                  <button type="button" onClick={() => setIsManageModalOpen(false)}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 w-5 h-5">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>

                <form onSubmit={handleAddItem} className="p-3 border-b bg-slate-50 flex flex-col space-y-2">
                  <div className="flex gap-2">
                    <input
                      type="text"
                      placeholder={`รหัส เช่น 91 หรือ 22`}
                      value={newItemId}
                      onChange={(e) => setNewItemId(e.target.value)}
                      className="w-[30%] px-2.5 py-1.5 text-xs border rounded-lg outline-none bg-white font-bold"
                    />
                    <input
                      type="text"
                      placeholder="ตำแหน่งของอุปกรณ์..."
                      value={newItemName}
                      onChange={(e) => setNewItemName(e.target.value)}
                      className="flex-1 px-2.5 py-1.5 text-xs border rounded-lg outline-none bg-white font-semibold"
                    />
                    <button type="submit" className="px-3.5 py-1.5 bg-teal-600 text-white text-xs font-bold rounded-lg shrink-0">
                      เพิ่ม
                    </button>
                  </div>
                </form>

                <div className="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar">
                  {editableLamps.map((lamp, idx) => (
                    <div key={lamp.id} className="flex items-center justify-between bg-slate-50 p-2 rounded-lg border">
                      <span className="text-[10px] font-bold text-slate-400 w-6 text-center">#{idx + 1}</span>
                      <input
                        type="text"
                        value={lamp.name}
                        onChange={(e) => handleEditItemText(lamp.id, e.target.value)}
                        className="flex-1 bg-white border border-slate-200 rounded px-2.5 py-1 text-xs outline-none"
                      />
                      <button type="button" onClick={() => handleRemoveItem(lamp.id)} className="p-1 hover:text-red-500 text-slate-400">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4">
                          <polyline points="3 6 5 6 21 6" />
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                      </button>
                    </div>
                  ))}
                </div>

                <div className="bg-slate-100 p-3 flex justify-end space-x-2 border-t">
                  <button type="button" onClick={() => setIsManageModalOpen(false)} className="px-3 py-2 text-xs text-slate-500 font-bold">
                    ยกเลิก
                  </button>
                  <button type="button" onClick={saveSettings} className="px-4 py-2 bg-green-600 text-white text-xs font-bold rounded-lg shadow-sm">
                    บันทึกข้อมูลหลัก
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
