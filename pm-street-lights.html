<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์ - โคมไฟส่องสว่างถนนและลานจอด</title>
  
  <!-- Tailwind CSS for Premium Web App Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDN for Interactive Mobile View -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
    body {
      font-family: 'Anuphan', sans-serif;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn {
      animation: fadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen pb-12">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // ลิงก์ Google Apps Script Web App (เชื่อมตรงเข้ากับ Sheet ID ตัวใหม่ของคุณเกรียงศักดิ์)
    const GOOGLE_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwFWaw_Pq4RPSZkxagIaQY-kICrIKfjDUr8X4NGK9iYHh8qu7P3ECTu4K3U1mn-WUPl/exec";

    // จัดกลุ่มรายการโคมไฟทั้งหมด 125 โคม แยกตามโซนจริงตามสเปก
    const initialZonesData = [
      {
        id: "zone1",
        title: "โซนถนนหลัก (หน้าคลัง-ลานจอดเทรลเลอร์)",
        lamps: [
          ...Array.from({ length: 4 }, (_, i) => `A${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `B${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `C${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `D${i + 1}`),
          ...Array.from({ length: 8 }, (_, i) => `F${i + 1}`)
        ].map(name => ({ name, status: "ติดปกติ" }))
      },
      {
        id: "zone2",
        title: "โซนถนนหลังคลัง (ลานหน้าบ้านขยะ-หลังคลัง-ช่วงต่อ CDC)",
        lamps: [
          ...Array.from({ length: 5 }, (_, i) => `G${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `H${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `I${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `K${i + 1}`),
          ...Array.from({ length: 3 }, (_, i) => `L${i + 1}`)
        ].map(name => ({ name, status: "ติดปกติ" }))
      },
      {
        id: "zone3",
        title: "โซนถนนเกาะกลาง DC-CDC (สามแยกและเกาะกลางทั้งหมด)",
        lamps: [
          ...Array.from({ length: 3 }, (_, i) => `M${i + 1}`),
          ...Array.from({ length: 3 }, (_, i) => `N${i + 1}`),
          ...Array.from({ length: 3 }, (_, i) => `P${i + 1}`),
          ...Array.from({ length: 3 }, (_, i) => `Q${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `R${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `S${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `T${i + 1}`),
          ...Array.from({ length: 4 }, (_, i) => `U${i + 1}`)
        ].map(name => ({ name, status: "ติดปกติ" }))
      },
      {
        id: "zone4",
        title: "โซนถนนลานจอดเทรลเลอร์",
        lamps: [
          ...Array.from({ length: 5 }, (_, i) => `V${i + 1}`)
        ].map(name => ({ name, status: "ติดปกติ" }))
      },
      {
        id: "zone5",
        title: "โซนถนนหลังช็อปวิศวกรรม",
        lamps: [
          ...Array.from({ length: 6 }, (_, i) => `Y${i + 1}`)
        ].map(name => ({ name, status: "ติดปกติ" }))
      },
      {
        id: "zone6",
        title: "โซนลานจอดคอย DC",
        lamps: [
          ...Array.from({ length: 8 }, (_, i) => String(i + 211)),
          ...Array.from({ length: 2 }, (_, i) => String(i + 221)),
          ...Array.from({ length: 8 }, (_, i) => String(i + 231)),
          ...Array.from({ length: 8 }, (_, i) => String(i + 241)),
          ...Array.from({ length: 5 }, (_, i) => String(i + 251)),
          ...Array.from({ length: 5 }, (_, i) => String(i + 261)),
          ...Array.from({ length: 4 }, (_, i) => String(i + 271))
        ].map(name => ({ name, status: "ติดปกติ" }))
      }
    ];

    function App() {
      const assignerList = ["เกรียงศักดิ์", "ณรงค์", "รัฐชานนท์"];
      const operatorList = ["ณรงค์", "รัฐชานนท์", "บัญชา", "วสุพล", "ศรายุทธ", "พิพัฒน์", "ศรราม เอี่ยมอาจ", "วงศธร", "เกรียงศักดิ์"];

      // --- State จัดการข้อมูลหลักใบงาน ---
      const [formData, setFormData] = useState({
        assigner: "เกรียงศักดิ์", // Default เกรียงศักดิ์
        operator1: "",
        operator2: "",
        operator3: "",
        operator4: "",
        pmDate: new Date().toISOString().split('T')[0],
        startTime: "",
        endTime: "",
        summaryText: "",
        overallStatus: "ปกติ",
      });

      // --- State จัดการคำตอบโคมไฟ (จัดเก็บและควบคุมการเปิด-ปิด Accordion) ---
      const [zones, setZones] = useState(() => {
        const saved = localStorage.getItem("pm_streetlights_zones");
        return saved ? JSON.parse(saved) : initialZonesData;
      });
      const [expandedZones, setExpandedZones] = useState({
        zone1: true, // เปิดโซนแรกไว้เป็น Default
        zone2: false,
        zone3: false,
        zone4: false,
        zone5: false,
        zone6: false
      });

      const [isSubmitting, setIsSubmitting] = useState(false);
      const [submitStatus, setSubmitStatus] = useState(null); // 'success', 'error'
      const [customError, setCustomError] = useState("");
      const [searchTerm, setSearchTerm] = useState("");

      // --- ตัวจัดการเพิ่ม/ลบรายการตรวจสอบโคมไฟแบบยืดหยุ่น ---
      const [isManageModalOpen, setIsManageModalOpen] = useState(false);
      const [editableZones, setEditableZones] = useState([]);
      const [selectedZoneId, setSelectedZoneId] = useState("zone1");
      const [newLampName, setNewLampName] = useState("");

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
      };

      const toggleZone = (zoneId) => {
        setExpandedZones(prev => ({ ...prev, [zoneId]: !prev[zoneId] }));
      };

      // เปลี่ยนค่าสถานะโคมไฟรายดวง
      const handleLampStatusChange = (zoneId, lampName, nextStatus) => {
        setZones(prev => prev.map(zone => {
          if (zone.id === zoneId) {
            return {
              ...zone,
              lamps: zone.lamps.map(lamp => 
                lamp.name === lampName ? { ...lamp, status: nextStatus } : lamp
              )
            };
          }
          return zone;
        }));
      };

      // ตั้งค่าสถานะพร้อมกันทั้งโซน (ติดปกติ / ไม่ติด)
      const setZoneAllStatus = (zoneId, nextStatus) => {
        setZones(prev => prev.map(zone => {
          if (zone.id === zoneId) {
            return {
              ...zone,
              lamps: zone.lamps.map(lamp => ({ ...lamp, status: nextStatus }))
            };
          }
          return zone;
        }));
      };

      // --- การจัดการแก้ไขรายการโคมไฟหน้างาน ---
      const openManageModal = () => {
        setEditableZones(zones.map(z => ({ ...z, lamps: [...z.lamps] })));
        setNewLampName("");
        setIsManageModalOpen(true);
      };

      const handleAddLamp = (e) => {
        e.preventDefault();
        if (!newLampName.trim()) return;
        
        setEditableZones(prev => prev.map(zone => {
          if (zone.id === selectedZoneId) {
            // ป้องกันการใส่ชื่อโคมไฟซ้ำกันในโซนเดียวกัน
            if (zone.lamps.some(l => l.name.toLowerCase() === newLampName.trim().toLowerCase())) {
              alert("มีโคมไฟรหัสนี้ในโซนปัจจุบันแล้วครับ");
              return zone;
            }
            return {
              ...zone,
              lamps: [...zone.lamps, { name: newLampName.trim().toUpperCase(), status: "ติดปกติ" }]
            };
          }
          return zone;
        }));
        setNewLampName("");
      };

      const handleRemoveLamp = (zoneId, lampName) => {
        setEditableZones(prev => prev.map(zone => {
          if (zone.id === zoneId) {
            return {
              ...zone,
              lamps: zone.lamps.filter(l => l.name !== lampName)
            };
          }
          return zone;
        }));
      };

      const saveSettings = () => {
        setZones(editableZones);
        localStorage.setItem("pm_streetlights_zones", JSON.stringify(editableZones));
        setIsManageModalOpen(false);
      };

      // หาจำนวนโคมไฟทั้งหมด และสรุปยอด
      const statsSummary = useMemo(() => {
        let total = 0;
        let normal = 0;
        let faulty = 0;
        zones.forEach(z => {
          z.lamps.forEach(l => {
            total++;
            if (l.status === "ติดปกติ") normal++;
            else faulty++;
          });
        });
        return { total, normal, faulty };
      }, [zones]);

      // --- บันทึกส่งข้อมูลใบงานเข้ากูเกิลชีตส่วนกลาง ---
      const handleSubmit = async (e) => {
        e.preventDefault();
        setCustomError("");
        setSubmitStatus(null);

        if (!formData.startTime || !formData.endTime) {
          setCustomError("กรุณาระบุ 'เวลาเริ่ม' และ 'เวลาสิ้นสุด' เพื่อความถูกต้องของใบรายงาน");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        if (!formData.operator1 && !formData.operator2 && !formData.operator3 && !formData.operator4) {
          setCustomError("กรุณาระบุรายชื่อช่าง 'ผู้ปฏิบัติงาน' ร่วมทีมอย่างน้อย 1 คน");
          window.scrollTo({ top: 0, behavior: "smooth" });
          return;
        }

        setIsSubmitting(true);

        const payload = {
          action: "saveStreetLights",
          timestamp: new Date().toLocaleString('th-TH'),
          ...formData,
          zones: zones // ส่งข้อมูลโคมไฟแยกโซนอย่างละเอียดเข้าไปประมวลผลปลายทาง
        };

        try {
          await fetch(GOOGLE_WEB_APP_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: new URLSearchParams({ data: JSON.stringify(payload) })
          });

          setSubmitStatus('success');
          window.scrollTo({ top: 0, behavior: "smooth" });

          // รีเซ็ตเฉพาะข้อมูลเวลากรอกและ สรุปผล
          setFormData(prev => ({
            ...prev,
            operator1: "", operator2: "", operator3: "", operator4: "",
            startTime: "", endTime: "", summaryText: "", overallStatus: "ปกติ"
          }));
          setZones(initialZonesData); // รีเซ็ตโคมไฟเป็นปกติทั้งหมด

        } catch (error) {
          console.error("Submit Error:", error);
          setSubmitStatus('error');
          setCustomError("ไม่สามารถซิงก์ข้อมูลไปที่เซิร์ฟเวอร์กูเกิลได้ชั่วคราว กรุณาตรวจสอบอินเทอร์เน็ตหน้างาน");
          window.scrollTo({ top: 0, behavior: "smooth" });
        } finally {
          setIsSubmitting(false);
        }
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col justify-between">
          
          <div>
            {/* Header คลีนพรีเมียม สเปก บริษัท ซีพีออลล์ จำกัด (มหาชน) */}
            <header className="bg-white shadow-sm border-b-4 border-green-600 sticky top-0 z-30">
              <div className="p-4">
                <div className="flex items-center justify-between">
                  <span className="bg-green-600 text-white text-[10px] font-black px-2 py-0.5 rounded">CP ALL</span>
                  <span className="text-[10px] text-slate-400 font-bold flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3 h-3 mr-1 text-slate-400">
                      <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                      <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                    ระบบมือถือหน้างาน
                  </span>
                </div>
                <h1 className="text-md font-extrabold text-slate-900 mt-1">บริษัท ซีพีออลล์ จำกัด (มหาชน)</h1>
                <h2 className="text-xs font-bold text-slate-600 mt-0.5 flex items-center">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 mr-1.5 w-3 h-3">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                    <polyline points="14 2 14 8 20 8"></polyline>
                    <line x1="16" y1="13" x2="8" y2="13"></line>
                    <line x1="16" y1="17" x2="8" y2="17"></line>
                    <polyline points="10 9 9 9 8 9"></polyline>
                  </svg>
                  Check Sheet การบำรุงรักษาเครื่องจักร/อุปกรณ์
                </h2>
                
                <div className="grid grid-cols-3 gap-1 mt-2.5 pt-2 border-t border-slate-100 text-[10px] text-slate-500 font-semibold">
                  <div>รหัส: <span className="text-slate-800 font-bold">B3-FM-10-01-06</span></div>
                  <div className="text-center">ปรับปรุงครั้งที่: <span className="text-slate-800 font-bold">0</span></div>
                  <div className="text-right">ประกาศใช้: <span className="text-slate-800 font-bold">1 เม.ย. 2560</span></div>
                </div>
              </div>
            </header>

            {/* ส่วนหลักของหน้าแอปพลิเคชัน */}
            <main className="p-4 space-y-5 animate-fadeIn">
              
              {/* ส่วนหัวเตือนบันทึกผลสำเร็จ/ไม่สำเร็จ */}
              {submitStatus === 'success' && (
                <div className="bg-green-100 border-2 border-green-400 text-green-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-green-600 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <polyline points="22 4 12 14.01 9 11.01" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">บันทึกส่งข้อมูลสำเร็จ!</p>
                    <p className="text-xs mt-0.5 font-semibold">รายงาน PM โคมไฟส่องสว่างจัดเก็บบันทึกบนกูเกิลชีตเรียบร้อยแล้ว</p>
                  </div>
                </div>
              )}

              {customError && (
                <div className="bg-red-100 border-2 border-red-400 text-red-800 p-4 rounded-2xl flex items-start shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 w-4 h-4 mr-2 shrink-0 mt-0.5">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="8" x2="12" y2="12" />
                    <line x1="12" y1="16" x2="12.01" y2="16" />
                  </svg>
                  <div>
                    <p className="font-bold text-sm">การกรอกข้อมูลไม่ถูกต้อง</p>
                    <p className="text-xs mt-0.5 font-bold leading-relaxed">{customError}</p>
                  </div>
                </div>
              )}

              {/* การแสดงผลข้อมูล Dashboard ย่อยเพื่อเช็คสถานะการ PM โคมไฟ */}
              <section className="bg-white rounded-3xl p-4 shadow-sm border border-slate-100 grid grid-cols-3 gap-2 text-center">
                <div className="p-2 bg-slate-50 rounded-xl border border-slate-100">
                  <span className="text-[9px] font-bold text-slate-400 block uppercase">โคมทั้งหมด</span>
                  <span className="text-lg font-black text-slate-800">{statsSummary.total}</span>
                </div>
                <div className="p-2 bg-green-50/50 rounded-xl border border-green-100">
                  <span className="text-[9px] font-bold text-green-600 block uppercase">💡 ติดปกติ</span>
                  <span className="text-lg font-black text-green-700">{statsSummary.normal}</span>
                </div>
                <div className="p-2 bg-red-50/50 rounded-xl border border-red-100">
                  <span className="text-[9px] font-bold text-red-500 block uppercase">⚠️ ไม่ติด</span>
                  <span className="text-lg font-black text-red-600">{statsSummary.faulty}</span>
                </div>
              </section>

              <form onSubmit={handleSubmit} className="space-y-5">
                
                {/* 1. ข้อมูลสเปกอุปกรณ์และประเภท */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-green-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <circle cx="12" cy="12" r="3" />
                      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
                    </svg>
                    <span>ข้อมูลงานตรวจเช็คหลัก</span>
                  </div>

                  <div className="grid grid-cols-2 gap-3 text-xs">
                    <div>
                      <span className="text-slate-400 font-semibold">เครื่องจักร/อุปกรณ์</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">โคมไฟส่องสว่างถนนและลานจอด</p>
                    </div>
                    <div>
                      <span className="text-slate-400 font-semibold">ความถี่แผนงาน</span>
                      <p className="font-bold text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100">รอบประจำเดือน</p>
                    </div>
                  </div>

                  <div>
                    <span className="text-xs text-slate-400 font-semibold">สถานที่ปฏิบัติการ</span>
                    <p className="font-bold text-xs text-slate-800 mt-1 px-3 py-2 bg-slate-50 rounded-xl border border-slate-100 flex items-center">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-red-500 mr-2 w-3 h-3 shrink-0">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
                        <circle cx="12" cy="10" r="3" />
                      </svg>
                      ถนนและลานจอดรถรอบคลัง DC-CDC
                    </p>
                  </div>

                  {/* วันที่ทำ PM */}
                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">วันที่ทำ PM</label>
                    <div className="flex items-center border rounded-xl px-3 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3.5 h-3.5">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                      </svg>
                      <input 
                        type="date" 
                        name="pmDate" 
                        value={formData.pmDate} 
                        onChange={handleInputChange} 
                        required 
                        className="w-full py-1.5 text-xs outline-none bg-transparent font-bold" 
                      />
                    </div>
                  </div>

                  {/* เวลาปฏิบัติงาน */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาเริ่ม</label>
                      <div className="flex items-center border rounded-xl px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3 h-3 shrink-0">
                          <circle cx="12" cy="12" r="10" />
                          <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input 
                          type="time" 
                          name="startTime" 
                          value={formData.startTime} 
                          onChange={handleInputChange} 
                          className="w-full py-1.5 text-xs outline-none bg-transparent" 
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs text-slate-400 mb-1 font-bold">เวลาสิ้นสุด</label>
                      <div className="flex items-center border rounded-xl px-2 py-1 bg-white focus-within:ring-2 focus-within:ring-green-500">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-2 w-3 h-3 shrink-0">
                          <circle cx="12" cy="12" r="10" />
                          <polyline points="12 6 12 12 16 14" />
                        </svg>
                        <input 
                          type="time" 
                          name="endTime" 
                          value={formData.endTime} 
                          onChange={handleInputChange} 
                          className="w-full py-1.5 text-xs outline-none bg-transparent" 
                        />
                      </div>
                    </div>
                  </div>
                </section>

                {/* 2. ทีมช่างผู้ร่วมตรวจปฏิบัติการ */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-blue-700 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
                      <circle cx="9" cy="7" r="4" />
                      <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
                      <path d="M16 3.13a4 4 0 0 1 0 7.75" />
                    </svg>
                    <span>ทีมงานที่ปฏิบัติการ</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้มอบหมายงาน</label>
                    <input 
                      list="assigners" 
                      name="assigner" 
                      value={formData.assigner} 
                      onChange={handleInputChange} 
                      placeholder="พิมพ์หรือค้นหาชื่อผู้มอบหมาย..."
                      className="w-full p-2 text-xs border rounded-xl bg-slate-50/30 focus:bg-white focus:ring-2 focus:ring-blue-500 outline-none font-bold"
                    />
                    <datalist id="assigners">
                      {assignerList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-400 mb-1 font-bold">ผู้ปฏิบัติงาน (ใส่ได้สูงสุด 4 คน)</label>
                    <div className="grid grid-cols-2 gap-2 mt-1">
                      {[1, 2, 3, 4].map(num => (
                        <div key={num} className="flex items-center border rounded-xl px-2 bg-white focus-within:ring-2 focus-within:ring-blue-500">
                          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 mr-1.5 w-3 h-3 shrink-0">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                          </svg>
                          <input 
                            list="operators" 
                            name={`operator${num}`} 
                            value={formData[`operator${num}`]} 
                            onChange={handleInputChange}
                            placeholder={`คนที่ ${num}`}
                            className="w-full py-2.5 text-xs outline-none bg-transparent font-semibold"
                          />
                        </div>
                      ))}
                    </div>
                    <datalist id="operators">
                      {operatorList.map((name, idx) => <option key={idx} value={name} />)}
                    </datalist>
                  </div>
                </section>

                {/* 3. รายการตรวจสอบโคมไฟ 6 โซนใหญ่ (แบบ Accordion) */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center justify-between border-b pb-2">
                    <div className="flex items-center text-teal-700 font-bold text-xs">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-1.5">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="2" x2="12" y2="4" />
                        <line x1="12" y1="20" x2="12" y2="22" />
                        <line x1="2" y1="12" x2="4" y2="12" />
                        <line x1="20" y1="12" x2="22" y2="12" />
                      </svg>
                      <span>รายการโคมไฟส่องสว่างถนน ({statsSummary.total} จุด)</span>
                    </div>

                    <button
                      type="button"
                      onClick={openManageModal}
                      className="flex items-center text-[10px] text-teal-600 bg-teal-50 border border-teal-100 px-2.5 py-1 rounded-lg hover:bg-teal-100 font-bold transition-all"
                    >
                      ปรับเปลี่ยนโคม ⚙️
                    </button>
                  </div>

                  <div className="space-y-3">
                    {zones.map((zone) => {
                      const isOpen = expandedZones[zone.id];
                      // คำนวณจำนวนโคมที่เสียหายภายในโซนนั้นๆ
                      const faultyInZone = zone.lamps.filter(l => l.status === "ไม่ติด").length;

                      return (
                        <div key={zone.id} className="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-slate-50/50">
                          {/* ส่วนหัว Accordion */}
                          <div 
                            onClick={() => toggleZone(zone.id)}
                            className="p-3 bg-white hover:bg-slate-50 cursor-pointer flex items-center justify-between transition-all"
                          >
                            <div className="space-y-0.5 max-w-[80%]">
                              <h4 className="text-xs font-extrabold text-slate-800 leading-tight">{zone.title}</h4>
                              <p className="text-[9px] text-slate-400 font-semibold flex items-center">
                                <span>จำนวน: {zone.lamps.length} โคม</span>
                                {faultyInZone > 0 && (
                                  <span className="text-red-500 font-bold ml-2">⚠️ ชำรุด {faultyInZone} โคม</span>
                                )}
                              </p>
                            </div>
                            <div className="flex items-center space-x-2 shrink-0">
                              <span className="text-xs text-slate-400">{isOpen ? "▲" : "▼"}</span>
                            </div>
                          </div>

                          {/* ส่วนเนื้อหารายการโคมไฟภายในโซน */}
                          {isOpen && (
                            <div className="p-3 bg-white border-t border-slate-100 space-y-3">
                              {/* ทางลัดภายในโซน */}
                              <div className="flex justify-end space-x-1.5 text-[9px] border-b pb-2">
                                <button
                                  type="button"
                                  onClick={() => setZoneAllStatus(zone.id, 'ติดปกติ')}
                                  className="px-2 py-1 text-green-700 bg-green-50 hover:bg-green-100 border border-green-200 rounded font-bold transition-all"
                                >
                                  ติดปกติทุกโคมในโซนนี้
                                </button>
                                <button
                                  type="button"
                                  onClick={() => setZoneAllStatus(zone.id, 'ไม่ติด')}
                                  className="px-2 py-1 text-red-700 bg-red-50 hover:bg-red-100 border border-red-200 rounded font-bold transition-all"
                                >
                                  ไม่ติดทุกโคมในโซนนี้
                                </button>
                              </div>

                              {/* รายชื่อโคมไฟในโซน เรียงแถวแบบ Grid 4 คอลัมน์เพื่อความสะดวกและประหยัดพื้นที่บนมือถือ */}
                              <div className="grid grid-cols-3 gap-1.5 pt-1">
                                {zone.lamps.map(lamp => (
                                  <div 
                                    key={lamp.name} 
                                    className={`p-2 rounded-xl border flex flex-col justify-between items-center text-center transition-all ${lamp.status === 'ติดปกติ' ? 'bg-green-50/20 border-green-200' : 'bg-red-50/50 border-red-300'}`}
                                  >
                                    <span className="text-[10px] font-black text-slate-800">{lamp.name}</span>
                                    
                                    {/* เช็คบ็อกซ์ธรรมดาแบบคลิกเพื่อสลับค่า (ติดปกติ / ไม่ติด) */}
                                    <div className="mt-1.5 w-full">
                                      <button
                                        type="button"
                                        onClick={() => handleLampStatusChange(zone.id, lamp.name, lamp.status === 'ติดปกติ' ? 'ไม่ติด' : 'ติดปกติ')}
                                        className={`w-full py-1 text-[8px] font-bold rounded-lg border transition-all ${lamp.status === 'ติดปกติ' ? 'bg-green-500 text-white border-green-600' : 'bg-red-500 text-white border-red-600'}`}
                                      >
                                        {lamp.status === 'ติดปกติ' ? "🟢 ติดปกติ" : "🔴 ไม่ติด"}
                                      </button>
                                    </div>
                                  </div>
                                ))}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </section>

                {/* 4. สรุปผลการตรวจ PM */}
                <section className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 space-y-4">
                  <div className="flex items-center text-orange-600 font-bold border-b pb-2 text-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                      <polyline points="14 2 14 8 20 8"></polyline>
                      <line x1="16" y1="13" x2="8" y2="13"></line>
                      <line x1="16" y1="17" x2="8" y2="17"></line>
                      <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                    <span>สรุปผลการ PM</span>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-2 font-bold">สรุปผลภาพรวม</label>
                    <div className="flex gap-2">
                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ปกติ"
                          checked={formData.overallStatus === "ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ปกติ" }))}
                          className="w-3.5 h-3.5 text-green-600 border-slate-300 focus:ring-green-500" 
                        />
                        <span>🟢 ปกติ</span>
                      </label>

                      <label className="flex-1 flex items-center justify-center space-x-2 p-2.5 border border-slate-200 rounded-xl cursor-pointer bg-white text-xs font-bold text-slate-700 hover:bg-slate-50 transition-all select-none">
                        <input 
                          type="radio" 
                          name="overallStatus" 
                          value="ไม่ปกติ"
                          checked={formData.overallStatus === "ไม่ปกติ"}
                          onChange={() => setFormData(p => ({ ...p, overallStatus: "ไม่ปกติ" }))}
                          className="w-3.5 h-3.5 text-red-600 border-slate-300 focus:ring-red-500" 
                        />
                        <span>🔴 พบจุดไม่ปกติ</span>
                      </label>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs text-slate-500 mb-1 font-bold">รายละเอียดสรุปเพิ่มเติม / รายการชำรุดที่พบเจอ</label>
                    <textarea 
                      name="summaryText" 
                      value={formData.summaryText} 
                      onChange={handleInputChange}
                      rows="3" 
                      className="w-full p-3 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none text-xs"
                      placeholder="ระบุชื่อโคมไฟ หรือโซนที่ไม่สว่างพร้อมจุดตรวจสอบ..."
                    ></textarea>
                  </div>
                </section>

                {/* 5. ปุ่มยืนยันการส่งข้อมูลเข้า Google Sheets */}
                <div className="bg-white p-3.5 rounded-3xl shadow-sm border border-slate-100">
                  <button 
                    type="submit" 
                    disabled={isSubmitting}
                    className={`w-full py-3.5 rounded-xl font-bold text-sm text-white shadow-md flex justify-center items-center transition-all ${isSubmitting ? 'bg-slate-400 cursor-not-allowed' : 'bg-green-600 hover:bg-green-700 active:scale-95'}`}
                  >
                    {isSubmitting ? (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="animate-spin mr-2 w-4 h-4">
                          <polyline points="23 4 23 10 17 10" />
                          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                        </svg>
                        กำลังตรวจสอบและส่งรายงาน...
                      </span>
                    ) : (
                      <span className="flex items-center">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-3.5 h-3.5 mr-2">
                          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                          <polyline points="17 21 17 13 7 13 7 21" />
                          <polyline points="7 3 7 8 15 8" />
                        </svg>
                        <span>ยืนยันส่งรายงาน PM เข้าคลาวด์ Sheets</span>
                      </span>
                    )}
                  </button>
                </div>

              </form>
            </main>
          </div>

          <footer className="text-center text-[10px] text-slate-400 font-medium my-4">
            <p>© 2026 CP ALL DC MAHACHAI ENGINEERING DEPARTMENT</p>
          </footer>

          {/* POPUP สำหรับการตั้งค่าแก้ไขรายการโคมไฟแบบยืดหยุ่น */}
          {isManageModalOpen && (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-2xl w-full max-w-sm max-h-[80vh] flex flex-col shadow-2xl overflow-hidden">
                <div className="bg-slate-100 p-4 border-b border-slate-200 flex justify-between items-center">
                  <div>
                    <h3 className="font-bold text-slate-800 text-xs">แก้ไขรายชื่อโคมไฟถนน</h3>
                    <p className="text-[9px] text-slate-500">สามารถเลือกโซน และเพิ่ม/ลบรหัสโคมไฟได้</p>
                  </div>
                  <button type="button" onClick={() => setIsManageModalOpen(false)}>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="text-slate-400 w-5 h-5">
                      <line x1="18" y1="6" x2="6" y2="18" />
                      <line x1="6" y1="6" x2="18" y2="18" />
                    </svg>
                  </button>
                </div>

                {/* เลือกโซนที่ต้องการจัดการ */}
                <div className="p-3 bg-slate-50 border-b">
                  <label className="block text-[10px] font-bold text-slate-400 mb-1">เลือกโซนที่ต้องการปรับแต่ง</label>
                  <select 
                    value={selectedZoneId}
                    onChange={(e) => setSelectedZoneId(e.target.value)}
                    className="w-full p-2 text-xs border rounded-lg bg-white outline-none font-bold"
                  >
                    {editableZones.map(z => <option key={z.id} value={z.id}>{z.title}</option>)}
                  </select>
                </div>

                <form onSubmit={handleAddLamp} className="p-3 border-b bg-slate-50/50 flex space-x-2">
                  <input
                    type="text"
                    placeholder="รหัสโคมไฟใหม่ เช่น Z1..."
                    value={newLampName}
                    onChange={(e) => setNewLampName(e.target.value)}
                    className="flex-1 px-3 py-2 text-xs border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none bg-white"
                  />
                  <button type="submit" className="px-3.5 py-2 bg-teal-600 text-white text-xs font-bold rounded-lg flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="mr-1 w-3.5 h-3.5">
                      <line x1="12" y1="5" x2="12" y2="19" />
                      <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    เพิ่ม
                  </button>
                </form>

                <div className="flex-1 overflow-y-auto p-3 space-y-2 no-scrollbar">
                  {editableZones.find(z => z.id === selectedZoneId)?.lamps.map((lamp, idx) => (
                    <div key={lamp.name} className="flex items-center justify-between bg-slate-50 p-2 rounded-lg border">
                      <div className="flex items-center space-x-2">
                        <span className="text-[10px] font-bold text-slate-400 w-6 text-center">#{idx + 1}</span>
                        <span className="text-xs font-bold text-slate-700">{lamp.name}</span>
                      </div>
                      <button 
                        type="button" 
                        onClick={() => handleRemoveLamp(selectedZoneId, lamp.name)} 
                        className="p-1 hover:text-red-500 text-slate-400"
                      >
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4">
                          <polyline points="3 6 5 6 21 6" />
                          <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                        </svg>
                      </button>
                    </div>
                  )) || <p className="text-center text-slate-400 text-xs py-10">ไม่พบข้อมูลในระบบ</p>}
                </div>

                <div className="bg-slate-100 p-3 flex justify-end space-x-2 border-t">
                  <button type="button" onClick={() => setIsManageModalOpen(false)} className="px-3 py-2 text-xs text-slate-500 font-bold">
                    ยกเลิก
                  </button>
                  <button type="button" onClick={saveSettings} className="px-4 py-2 bg-green-600 text-white text-xs font-bold rounded-lg shadow-sm">
                    ตกลง & บันทึกคำสั่ง
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
